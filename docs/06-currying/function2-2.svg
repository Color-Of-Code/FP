    </g>
    <g class="action-node">
      <title>curry: transforms a multi-arg function into a chain of single-arg functions</title>
      <rect x="225.8" y="40" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="285.8" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">curry</text>
      <g class="pin pin-in">
