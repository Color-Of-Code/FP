  <rect width="928" height="179" fill="white"/>
  <text x="464" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Currying: (a,b) ⟶ c  ⟹  a ⟶ (b ⟶ c)</text>
  <g transform="translate(0,28) scale(1)">
