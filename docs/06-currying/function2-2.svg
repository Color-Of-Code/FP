<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 856 179" width="856" height="179">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="856" height="179" fill="white"/>
  <text x="428" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Currying: (a,b) ⟶ c  ⟹  a ⟶ (b ⟶ c)</text>
  <g transform="translate(0,28) scale(1)">
    <rect x="0" y="0" width="856" height="151" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L115.2,0 L115.2,12 L105.2,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="57.6" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» curry</text>
    </g>
    <g class="edge hof-edge">
      <path d="M146.0,62.0 L195.0,62.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
      <text x="176.5" y="56" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">curry</text>
    </g>
    <g class="edge">
      <path d="M339.0,56.0 L347.0,56.0 Q353.0,56.0 353.0,62.0 L353.0,82.0 Q353.0,86.0 357.0,86.0 L361.0,86.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M483.0,86.0 L546.0,86.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="520.5" y="80" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">apply a</text>
    </g>
    <g class="edge">
      <path d="M146.0,114.0 L542.0,114.0 Q548.0,114.0 548.0,108.0 L548.0,101.0 L548.0,101.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M690.0,90.0 L698.0,90.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M335.0,72.0 L357.0,72.0 Q363.0,72.0 363.0,66.0 L363.0,64.0 Q363.0,58.0 369.0,58.0 L542.0,58.0 Q548.0,58.0 548.0,64.0 L548.0,72.0 Q548.0,75.0 551.0,75.0 L554.0,75.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowOpen)" stroke-dasharray="6,4"/>
    </g>
    <g class="action-node">
      <title>curry: transforms a multi-arg function into a chain of single-arg functions</title>
      <rect x="215" y="40" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="275" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">curry</text>
      <g class="pin pin-in">
        <rect x="211" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="221" y="62" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">f2</text>
      </g>
      <g class="pin pin-out">
        <rect x="331" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="329" y="62" text-anchor="end" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">curried</text>
      </g>
    </g>
    <g class="action-node">
      <title>Apply the first argument a, yielding the specialised function</title>
      <rect x="566" y="68" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="626" y="90" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">applyA</text>
      <g class="pin pin-in">
        <rect x="562" y="78.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="572" y="82.66666666666667" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">curried</text>
      </g>
      <g class="pin pin-in">
        <rect x="562" y="93.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="572" y="97.33333333333333" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">a</text>
      </g>
      <g class="pin pin-out">
        <rect x="682" y="86" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="680" y="90" text-anchor="end" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">f1</text>
      </g>
    </g>
    <g class="object-node hof">
      <title>(a,b) ⟶ c — original multi-argument function, flowing in as a data token</title>
      <rect x="36" y="43" width="110" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="91" y="55" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="91" y="69" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">(a,b) ⟶ c</text>
    </g>
    <g class="object-node">
      <title>a ⟶ (b ⟶ c) — the curried form, itself a function</title>
      <rect x="373" y="67" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="428" y="86" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">a ⟶ (b ⟶ c)</text>
    </g>
    <g class="object-node">
      <rect x="36" y="95" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="91" y="114" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">a</text>
    </g>
    <g class="object-node">
      <title>b ⟶ c — the specialised function with a already applied</title>
      <rect x="710" y="71" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="765" y="90" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">b ⟶ c</text>
    </g>
  </g>
</svg>
