    <g class="edge">
      <path d="M156.8,114.0 L614.0,114.0 Q620.0,114.0 620.0,108.0 L620.0,102.0 Q620.0,101.0 621.0,101.0 L622.0,101.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
