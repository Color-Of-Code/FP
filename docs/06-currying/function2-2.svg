      </g>
    </g>
    <g class="action-node">
      <title>Apply the first argument a, yielding the specialised function</title>
      <rect x="638" y="68" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="698" y="90" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">applyA</text>
      <g class="pin pin-in">
        <rect x="634" y="78.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="644" y="82.66666666666667" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">curried</text>
      </g>
      <g class="pin pin-in">
        <rect x="634" y="93.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="644" y="97.33333333333333" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">a</text>
      </g>
      <g class="pin pin-out">
        <rect x="754" y="86" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="752" y="90" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">f1</text>
      </g>
    </g>
    <g class="object-node hof">
      <title>(a,b) ⟶ c — original multi-argument function, flowing in as a data token</title>
      <rect x="36.00000000000001" y="43" width="120.8" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="96.4" y="55" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="96.4" y="69" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f2 : (a,b) ⟶ c</text>
    </g>
    <g class="object-node">
      <title>a ⟶ (b ⟶ c) — the curried form, itself a function</title>
      <rect x="383.8" y="67" width="171.20000000000002" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="469.40000000000003" y="86" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">curried : a ⟶ (b ⟶ c)</text>
