    </g>
    <g class="object-node">
      <title>a ⟶ (b ⟶ c) — the curried form, itself a function</title>
      <rect x="373.8" y="49" width="171.20000000000002" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="459.40000000000003" y="68" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">curried : a ⟶ (b ⟶ c)</text>
