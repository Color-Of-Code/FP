        <text x="231.8" y="62" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">f2</text>
      </g>
      <g class="pin pin-out">
        <rect x="341.8" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
