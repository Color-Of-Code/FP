<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 988.4 139" width="988.4" height="139">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="988.4" height="139" fill="white"/>
  <text x="494.2" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Without bind: manual nested loop and probability arithmetic</text>
  <g transform="translate(0,28) scale(1)">
    <rect x="0" y="0" width="988.4" height="111" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L152.4,0 L152.4,12 L142.4,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="76.2" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» coinThenDie</text>
    </g>
    <g class="edge">
      <path d="M149.6,62.0 L153.6,62.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M297.6,62.0 L415.6,62.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="364.6" y="56" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">for (face, p_coin)</text>
    </g>
    <g class="edge">
      <path d="M559.6,71.0 L667.6,71.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="621.6" y="65" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">p_coin * p_score</text>
    </g>
    <g class="edge">
      <path d="M811.6,71.0 L819.6,71.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="action-node">
      <title>for (face, p_coin) in coin — opens an outer loop; the inner loop over the die's conditional distribution is implied inside multiply.</title>
      <rect x="173.60000000000002" y="40" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="233.60000000000002" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">outer</text>
      <g class="pin pin-in">
        <rect x="169.60000000000002" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="179.60000000000002" y="62" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">coin</text>
      </g>
      <g class="pin pin-out">
        <rect x="289.6" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>p_coin * p_score — multiply marginal × conditional by hand. Off-by-one here is invisible until totals don't sum to one.</title>
      <rect x="435.6" y="49" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="495.6" y="71" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">multiply</text>
      <g class="pin pin-in">
        <rect x="431.6" y="59.666666666666664" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="441.6" y="63.666666666666664" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">pCoin</text>
      </g>
      <g class="pin pin-in">
        <rect x="431.6" y="74.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="441.6" y="78.33333333333333" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">pScore</text>
      </g>
      <g class="pin pin-out">
        <rect x="551.6" y="67" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>Flatten the nested [[ (Int, Float) ]] back into a single distribution.</title>
      <rect x="687.6" y="49" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="747.6" y="71" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">flatten</text>
      <g class="pin pin-in">
        <rect x="683.6" y="67" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="693.6" y="71" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">nested</text>
      </g>
      <g class="pin pin-out">
        <rect x="803.6" y="67" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="object-node">
      <title>Prob CoinFace — the coin distribution as a list of (face, probability) pairs.</title>
      <rect x="36.00000000000001" y="43" width="113.60000000000001" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="92.80000000000001" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">Prob CoinFace</text>
    </g>
    <g class="object-node">
      <title>[(Int, Float)] — the joint distribution, hand-built.</title>
      <rect x="831.6" y="52" width="120.8" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="892" y="71" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">[(Int, Float)]</text>
    </g>
  </g>
</svg>
