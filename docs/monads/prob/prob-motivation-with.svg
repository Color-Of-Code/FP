      <text x="157.60000000000002" y="124" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">rollDieFn : CoinFace ⟶ Prob Int</text>
    </g>
    <g class="object-node">
