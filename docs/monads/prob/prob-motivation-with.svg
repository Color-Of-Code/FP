    </g>
    <g class="action-node">
      <title>biasedCoin : Prob CoinFace — distribution over the coin outcomes.</title>
      <rect x="151.20000000000002" y="40" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="211.20000000000002" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">biasedCoin</text>
      <g class="pin pin-out">
