    <g class="action-node">
      <title>&gt;&gt;= : applies the conditional distribution to every branch; multiplies probabilities and flattens.</title>
      <rect x="392.20000000000005" y="49" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="452.20000000000005" y="71" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bindRoll</text>
      <g class="pin pin-in">
