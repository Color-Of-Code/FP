    <g class="object-node hof">
      <title>rollDie : CoinFace → Prob Int. HOF argument — its input is CoinFace, not Prob CoinFace.</title>
      <rect x="36.000000000000014" y="98" width="243.20000000000002" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
