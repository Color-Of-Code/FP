<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 918.2 210" width="918.2" height="210">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="918.2" height="210" fill="white"/>
  <text x="459.1" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">With pure + bind: bind multiplies probabilities and flattens the joint distribution</text>
  <g transform="translate(0,28) scale(1)">
    <rect x="0" y="0" width="918.2" height="182" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L152.4,0 L152.4,12 L142.4,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="76.2" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» coinThenDie</text>
    </g>
    <g class="swimlane lane-plain">
      <rect x="6" y="28" width="629" height="85" fill="#f7f9fc" stroke="#bbbbbb" stroke-width="1" rx="4" ry="4"/>
      <rect x="6" y="28" width="629" height="18" fill="#e9eef5" stroke="#bbbbbb" stroke-width="1" rx="4" ry="4"/>
      <text x="16" y="38" text-anchor="start" font-size="10" font-weight="bold" font-family="sans-serif" dominant-baseline="middle" fill="#333">Plain values &amp; functions</text>
    </g>
    <g class="swimlane lane-monad">
      <rect x="6" y="113" width="629" height="77" fill="#f7f9fc" stroke="#bbbbbb" stroke-width="1" rx="4" ry="4"/>
      <rect x="6" y="113" width="629" height="18" fill="#e9eef5" stroke="#bbbbbb" stroke-width="1" rx="4" ry="4"/>
      <text x="16" y="123" text-anchor="start" font-size="10" font-weight="bold" font-family="sans-serif" dominant-baseline="middle" fill="#333">Prob monad</text>
    </g>
    <g class="edge">
      <path d="M156.0,156.0 L233.0,156.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="202.5" y="150" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">Prob CoinFace</text>
    </g>
    <g class="edge">
      <path d="M365.0,156.0 L517.0,156.0 Q523.0,156.0 523.0,150.0 L523.0,104.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="446" y="150" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">runProb</text>
    </g>
    <g class="edge hof-edge">
      <path d="M309.0,92.0 L309.0,118.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="action-node">
      <title>biasedCoin : Prob CoinFace — distribution over the coin outcomes.</title>
      <rect x="36" y="134" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="96" y="156" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">biasedCoin</text>
      <g class="pin pin-out">
        <rect x="152" y="152" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>&gt;&gt;= : applies the conditional distribution to every branch; multiplies probabilities and flattens.</title>
      <rect x="249" y="134" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="309" y="156" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bindRoll</text>
      <g class="pin pin-in">
        <rect x="245" y="152" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
      <g class="pin pin-in">
        <rect x="305" y="130" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
      <g class="pin pin-out">
        <rect x="365" y="152" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="object-node hof">
      <title>rollDie : CoinFace → Prob Int. HOF argument — its input is CoinFace, not Prob CoinFace.</title>
      <rect x="187.39999999999998" y="54" width="243.20000000000002" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="309" y="66" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="309" y="80" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">rollDieFn : CoinFace ⟶ Prob Int</text>
    </g>
    <g class="object-node">
      <title>Prob Int — the joint distribution. bind has multiplied probabilities and flattened the nested list automatically.</title>
      <rect x="441" y="54" width="164" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="523" y="73" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">outResult : Prob Int</text>
    </g>
  </g>
</svg>
