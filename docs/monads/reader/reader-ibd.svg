<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 631.2 246" width="631.2" height="246">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="631.2" height="246" fill="white"/>
  <text x="315.6" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">bind :: Reader r a ⟶ (a ⟶ Reader r b) ⟶ Reader r b</text>
  <text x="315.6" y="35" text-anchor="middle" font-size="11" font-weight="normal" font-family="sans-serif" fill="#555">also called: flatMap, &gt;&gt;=</text>
  <g transform="translate(0,44) scale(1)">
    <rect x="0" y="0" width="631.2" height="202" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-block">
      <path d="M0,0 L171,0 L171,12 L161,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="85.5" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«block» ReaderBindContext</text>
    </g>
    <g class="edge">
      <path d="M248.4,153.0 L253.4,153.0 Q258.4,153.0 258.4,148.0 L258.4,112.0 L258.4,112.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge hof-edge">
      <path d="M248.4,101.0 L256.4,101.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M248.4,49.0 L253.4,49.0 Q258.4,49.0 258.4,54.0 L258.4,90.0 L258.4,90.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M388.4,101.0 L392.4,101.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="object-node">
      <title>Reader r a — a computation waiting for env r; when run with r it produces a</title>
      <rect x="91.6" y="134" width="156.8" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="170" y="153" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ra_val : Reader r a</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ Reader r b) — continuation: given a, produces a new computation waiting for r</title>
      <rect x="69.99999999999999" y="82" width="178.4" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="159.2" y="94" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="159.2" y="108" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f_val : a ⟶ Reader r b</text>
    </g>
    <g class="object-node">
      <title>r — the shared read-only environment. bind supplies THE SAME r to ra and to f(a). It is never modified.</title>
      <rect x="138.4" y="30" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="193.4" y="49" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">r_env : r</text>
    </g>
    <g class="action-node">
      <title>bind ra f = \\r -&gt; f (ra r) r\nRun ra with env r to get a. Pass a to f. Run f(a) with the SAME env r.</title>
      <rect x="268.4" y="79" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="328.4" y="101" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bind : ReaderBindOp</text>
    </g>
    <g class="object-node">
      <title>Reader r b — the composed computation; when run with r it produces b</title>
      <rect x="404.4" y="82" width="156.8" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="482.79999999999995" y="101" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">rb_val : Reader r b</text>
    </g>
  </g>
</svg>
