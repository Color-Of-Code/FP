      </g>
    </g>
    <g class="action-node">
      <title>Run rb(env): supply THE SAME env to f(a) — env is unchanged from step 1. Key difference from State.</title>
      <rect x="821.6" y="88" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="881.6" y="110" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">run_rb</text>
      <g class="pin pin-in">
        <rect x="817.6" y="98.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="827.6" y="102.66666666666667" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">rb</text>
      </g>
      <g class="pin pin-in">
        <rect x="817.6" y="113.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="827.6" y="117.33333333333333" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">env</text>
