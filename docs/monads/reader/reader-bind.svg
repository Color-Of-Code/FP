        <text x="641.6" y="120" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">rb</text>
      </g>
    </g>
    <g class="action-node">
      <title>Run rb(env): supply THE SAME env to f(a) — env is unchanged from step 1. Key difference from State.</title>
      <rect x="831.6" y="140" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="891.6" y="162" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">run_rb</text>
      <g class="pin pin-in">
        <rect x="827.6" y="150.66666666666666" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="837.6" y="154.66666666666666" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">rb</text>
