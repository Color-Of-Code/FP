        <text x="306" y="68" text-anchor="end" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">a</text>
      </g>
    </g>
    <g class="action-node">
      <title>Apply f(a): build the next computation Reader r b from result a</title>
      <rect x="517.6" y="46" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="577.6" y="68" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">apply_f</text>
      <g class="pin pin-in">
        <rect x="513.6" y="56.666666666666664" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="523.6" y="60.666666666666664" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">a</text>
      </g>
      <g class="pin pin-in">
        <rect x="513.6" y="71.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
