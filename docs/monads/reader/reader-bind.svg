        <rect x="947.6" y="158" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="945.6" y="162" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">b</text>
      </g>
    </g>
    <g class="object-node">
      <title>Reader r a — a suspended computation: a function r ⟶ a, not yet executed</title>
      <rect x="36" y="40" width="128" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="100" y="59" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ra : Reader r a</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ Reader r b) — given result a, builds the next computation r ⟶ b</title>
      <rect x="340" y="139" width="149.6" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="414.8" y="151" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="414.8" y="165" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ Reader r b</text>
    </g>
    <g class="object-node">
      <title>r — the shared read-only environment. The SAME instance flows to both run_ra and run_rb. It is NEVER modified.</title>
      <rect x="54" y="166" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="109" y="185" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">env : r</text>
    </g>
    <g class="object-node">
      <title>a — the result of running ra with the environment</title>
      <rect x="359.8" y="87" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="414.8" y="106" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">a : a</text>
    </g>
    <g class="object-node">
      <title>Reader r b — the second computation (not yet run)</title>
      <rect x="675.6" y="139" width="128" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="739.6" y="158" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">rb : Reader r b</text>
    </g>
    <g class="object-node">
      <title>b — the final result. The environment was never modified throughout.</title>
      <rect x="975.5999999999999" y="143" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1030.6" y="162" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">b : b</text>
