    </g>
    <g class="object-node">
      <title>Reader r a — a suspended computation: a function r ⟶ a, not yet executed</title>
      <rect x="36" y="40" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="91" y="59" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">Reader r a</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ Reader r b) — given result a, builds the next computation r ⟶ b</title>
      <rect x="322" y="96" width="120.8" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="382.4" y="108" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="382.4" y="122" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">a ⟶ Reader r b</text>
    </g>
    <g class="object-node">
      <title>r — the shared read-only environment. The SAME instance flows to both run_ra and run_rb. It is NEVER modified.</title>
      <rect x="36" y="123" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="91" y="142" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">r</text>
    </g>
    <g class="object-node">
