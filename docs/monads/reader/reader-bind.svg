        <rect x="937.6" y="106" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="935.6" y="110" text-anchor="end" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">b</text>
      </g>
    </g>
    <g class="object-node">
      <title>Reader r a — a suspended computation: a function r ⟶ a, not yet executed</title>
      <rect x="36" y="40" width="128" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="100" y="59" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ra : Reader r a</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ Reader r b) — given result a, builds the next computation r ⟶ b</title>
      <rect x="340" y="96" width="149.6" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="414.8" y="108" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="414.8" y="122" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ Reader r b</text>
    </g>
    <g class="object-node">
      <title>r — the shared read-only environment. The SAME instance flows to both run_ra and run_rb. It is NEVER modified.</title>
      <rect x="54" y="123" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="109" y="142" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">env : r</text>
    </g>
    <g class="object-node">
      <title>Reader r b — the second computation (not yet run)</title>
      <rect x="665.6" y="87" width="128" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="729.6" y="106" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">rb : Reader r b</text>
    </g>
    <g class="object-node">
      <title>b — the final result. The environment was never modified throughout.</title>
      <rect x="965.6" y="91" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1020.6" y="110" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">b : b</text>
    </g>
