    </g>
    <g class="action-node">
      <title>getHost(config) — needs only config.host but takes the whole record.</title>
      <rect x="174" y="49" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="234" y="71" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">getHost</text>
