<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 843 139" width="843" height="139">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="843" height="139" fill="white"/>
  <text x="421.5" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">With Reader: environment supplied once at the top</text>
  <g transform="translate(0,28) scale(1)">
    <rect x="0" y="0" width="843" height="111" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L133.8,0 L133.8,12 L123.80000000000001,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="66.9" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» buildUrl</text>
    </g>
    <g class="edge">
      <path d="M168.0,71.0 L240.0,71.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="210" y="65" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">&gt;&gt;= bind</text>
    </g>
    <g class="edge">
      <path d="M380.0,71.0 L452.0,71.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="422" y="65" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">&gt;&gt;= bind</text>
    </g>
    <g class="edge">
      <path d="M592.0,62.0 L685.0,62.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="646.5" y="56" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">runReader env</text>
    </g>
    <g class="action-node">
      <title>asks (.host) — projects the host field out of the implicit Config environment.</title>
      <rect x="44" y="49" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="104" y="71" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">asksHost</text>
      <g class="pin pin-in">
        <rect x="40" y="67" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="50" y="71" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">env</text>
      </g>
      <g class="pin pin-out">
        <rect x="160" y="67" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="158" y="71" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">host</text>
      </g>
    </g>
    <g class="action-node">
      <title>asks (.port) — projects the port field out of the implicit Config environment.  bind chains it after asksHost without rethreading the config.</title>
      <rect x="256" y="49" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="316" y="71" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">asksPort</text>
      <g class="pin pin-in">
        <rect x="252" y="67" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="262" y="71" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">env</text>
      </g>
      <g class="pin pin-out">
        <rect x="372" y="67" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="370" y="71" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">portNum</text>
      </g>
    </g>
    <g class="action-node">
      <title>buildUrl(host, port) — pure assembly of the URL.  No need to receive the environment at all.</title>
      <rect x="468" y="40" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="528" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">buildUrl</text>
      <g class="pin pin-in">
        <rect x="464" y="50.666666666666664" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="474" y="54.666666666666664" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">host</text>
      </g>
      <g class="pin pin-in">
        <rect x="464" y="65.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="474" y="69.33333333333333" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">portNum</text>
      </g>
      <g class="pin pin-out">
        <rect x="584" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="582" y="62" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">url</text>
      </g>
    </g>
    <g class="object-node">
      <title>URL — final value.  runReader env supplies the environment exactly once at the top of the chain.</title>
      <rect x="697" y="43" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="752" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">url : URL</text>
    </g>
  </g>
</svg>
