<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1487.8 210" width="1487.8" height="210">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="1487.8" height="210" fill="white"/>
  <text x="743.9" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">With pure + bind: env supplied once at the top; bind feeds it to every step</text>
  <g transform="translate(0,28) scale(1)">
    <rect x="0" y="0" width="1487.8" height="182" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L133.8,0 L133.8,12 L123.80000000000001,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="66.9" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» buildUrl</text>
    </g>
    <g class="swimlane lane-plain">
      <rect x="6" y="28" width="1475.8" height="71" fill="#f7f9fc" stroke="#bbbbbb" stroke-width="1" rx="4" ry="4"/>
      <rect x="6" y="28" width="1475.8" height="18" fill="#e9eef5" stroke="#bbbbbb" stroke-width="1" rx="4" ry="4"/>
      <text x="16" y="38" text-anchor="start" font-size="10" font-weight="bold" font-family="sans-serif" dominant-baseline="middle" fill="#333">Plain values &amp; functions</text>
    </g>
    <g class="swimlane lane-monad">
      <rect x="6" y="99" width="1475.8" height="77" fill="#f7f9fc" stroke="#bbbbbb" stroke-width="1" rx="4" ry="4"/>
      <rect x="6" y="99" width="1475.8" height="18" fill="#e9eef5" stroke="#bbbbbb" stroke-width="1" rx="4" ry="4"/>
      <text x="16" y="109" text-anchor="start" font-size="10" font-weight="bold" font-family="sans-serif" dominant-baseline="middle" fill="#333">Reader monad</text>
    </g>
    <g class="edge">
      <path d="M160.0,142.0 L568.8,142.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="370.4" y="136" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">Reader Config String</text>
    </g>
    <g class="edge">
      <path d="M708.8,142.0 L1088.8,142.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="904.8" y="136" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">Reader Config (String, Int)</text>
    </g>
    <g class="edge">
      <path d="M1228.8,142.0 L1236.8,142.0 Q1242.8,142.0 1242.8,136.0 L1242.8,60.0 Q1242.8,54.0 1248.8,54.0 L1329.3,54.0 Q1331.8,54.0 1331.8,56.5 L1331.8,59.0 L1331.8,59.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="1287.3" y="48" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">runReader env</text>
    </g>
    <g class="edge hof-edge">
      <path d="M644.8,79.0 L644.8,104.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge hof-edge">
      <path d="M1164.8,79.0 L1164.8,104.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="action-node">
      <title>asks (.host) : Reader Config String — projects host out of the implicit env.</title>
      <rect x="36" y="120" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="96" y="142" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">asksHost</text>
      <g class="pin pin-out">
        <rect x="152" y="138" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>&gt;&gt;= : runs asksHost with env, then runs the continuation (which itself returns a Reader) with the SAME env.</title>
      <rect x="584.8" y="120" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="644.8" y="142" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bindHost</text>
      <g class="pin pin-in">
        <rect x="580.8" y="138" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="590.8" y="142" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">ma</text>
      </g>
      <g class="pin pin-in">
        <rect x="640.8" y="116" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="644.8" y="114" text-anchor="middle" dominant-baseline="alphabetic" font-size="8" font-family="sans-serif" fill="#555">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="700.8" y="138" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>&gt;&gt;= : final bind — turns the (host, port) pair into the URL via build, lifted with pure.</title>
      <rect x="1104.8" y="120" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="1164.8" y="142" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bindPair</text>
      <g class="pin pin-in">
        <rect x="1100.8" y="138" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="1110.8" y="142" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">ma</text>
      </g>
      <g class="pin pin-in">
        <rect x="1160.8" y="116" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="1164.8" y="114" text-anchor="middle" dominant-baseline="alphabetic" font-size="8" font-family="sans-serif" fill="#555">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="1220.8" y="138" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="object-node hof">
      <title>λhost. asksPort &gt;&gt;= λport. pure (host, port). HOF argument — captures host in scope while running asksPort under the same env.</title>
      <rect x="458.4" y="40" width="372.8" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="644.8" y="52" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="644.8" y="66" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">readPortFn : String ⟶ Reader Config (String, Int)</text>
    </g>
    <g class="object-node hof">
      <title>λ(host, port). pure (build host port). HOF argument — wraps the pure URL back into Reader.</title>
      <rect x="992.8" y="40" width="344" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="1164.8" y="52" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="1164.8" y="66" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">pureUrlFn : (String, Int) ⟶ Reader Config URL</text>
    </g>
    <g class="object-node">
      <title>URL — final value. runReader env supplies the environment exactly once at the top of the chain.</title>
      <rect x="1341.8" y="40" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1396.8" y="59" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">url : URL</text>
    </g>
  </g>
</svg>
