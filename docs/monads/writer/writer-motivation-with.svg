        <rect x="290" y="138" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>&gt;&gt;= : runs step1 on the unwrapped value; concatenates the existing log with step1's log.</title>
