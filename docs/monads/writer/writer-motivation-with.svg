<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 905.8 130" width="905.8" height="130">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="905.8" height="130" fill="white"/>
  <text x="452.9" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">With Writer: log accumulation is automatic</text>
  <g transform="translate(0,28) scale(1)">
    <rect x="0" y="0" width="905.8" height="102" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L152.4,0 L152.4,12 L142.4,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="76.2" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» writerChain</text>
    </g>
    <g class="edge">
      <path d="M168.0,62.0 L240.0,62.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="210" y="56" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">&gt;&gt;= bind</text>
    </g>
    <g class="edge">
      <path d="M380.0,62.0 L452.0,62.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="422" y="56" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">&gt;&gt;= bind</text>
    </g>
    <g class="edge">
      <path d="M592.0,62.0 L665.0,62.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="636.5" y="56" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">runWriter</text>
    </g>
    <g class="action-node">
      <title>step1 :: A → Writer w R1.  Step appends to the log via tell; the log itself is never visible in the user code.</title>
      <rect x="44" y="40" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="104" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">step1</text>
      <g class="pin pin-in">
        <rect x="40" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="50" y="62" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">x</text>
      </g>
      <g class="pin pin-out">
        <rect x="160" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="158" y="62" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">result</text>
      </g>
    </g>
    <g class="action-node">
      <title>step2 :: R1 → Writer w R2.  bind concatenates this step's log onto step1's automatically.</title>
      <rect x="256" y="40" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="316" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">step2</text>
      <g class="pin pin-in">
        <rect x="252" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="262" y="62" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">r1</text>
      </g>
      <g class="pin pin-out">
        <rect x="372" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="370" y="62" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">result</text>
      </g>
    </g>
    <g class="action-node">
      <title>step3 :: R2 → Writer w R3.  Same again — the log just accumulates.</title>
      <rect x="468" y="40" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="528" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">step3</text>
      <g class="pin pin-in">
        <rect x="464" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="474" y="62" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">r2</text>
      </g>
      <g class="pin pin-out">
        <rect x="584" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="582" y="62" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">result</text>
      </g>
    </g>
    <g class="object-node">
      <title>runWriter returns the final value and the combined log in order.  Drops are impossible by construction.</title>
      <rect x="677" y="43" width="192.8" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="773.4" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">outResult : (r3, log123)</text>
    </g>
  </g>
</svg>
