  <rect width="1762.2" height="210" fill="white"/>
  <text x="881.1" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">With pure + bind: log accumulation is automatic via the Monoid for w</text>
