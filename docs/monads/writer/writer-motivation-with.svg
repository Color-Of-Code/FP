      <text x="91" y="59" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">x : A</text>
    </g>
    <g class="object-node hof">
      <title>step1 : A → Writer w R1. HOF argument — its input is A, not Writer w A, so it cannot sit on the main flow.</title>
      <rect x="510" y="40" width="200" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
