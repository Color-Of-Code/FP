      </g>
    </g>
    <g class="action-node">
      <title>step2(r1, log1) → (r2, log1 ++ entries2). Passing log0 instead of log1 silently drops entries.</title>
      <rect x="442.8" y="55" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="502.8" y="77" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">step2</text>
      <g class="pin pin-in">
        <rect x="438.8" y="65.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="448.8" y="69.66666666666667" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">r1</text>
      </g>
      <g class="pin pin-in">
        <rect x="438.8" y="80.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="448.8" y="84.33333333333333" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">log1</text>
