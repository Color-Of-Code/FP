    </g>
    <g class="edge">
      <path d="M344.8,68.0 L426.8,68.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
