<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 916.4 148" width="916.4" height="148">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="916.4" height="148" fill="white"/>
  <text x="458.2" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Without Writer: log threaded as an explicit variable</text>
  <g transform="translate(0,28)">
    <rect x="0" y="0" width="916.4" height="120" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L152.4,0 L152.4,12 L142.4,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="76.2" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» writerChain</text>
    </g>
    <g class="edge">
      <path d="M168.0,62.0 L250.0,62.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="215" y="56" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">(r1, log1)</text>
    </g>
    <g class="edge">
      <path d="M390.0,71.0 L472.0,71.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="437" y="65" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">(r2, log2)</text>
    </g>
    <g class="edge">
      <path d="M612.0,80.0 L690.0,80.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="659" y="74" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">(r3, log3)</text>
    </g>
    <g class="action-node">
      <title>step1(x) → (r1, log1).  Returns the value and the log entries it produced.</title>
      <rect x="44" y="40" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="104" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">step1</text>
      <g class="pin pin-in">
        <rect x="40" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="50" y="62" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">x</text>
      </g>
      <g class="pin pin-out">
        <rect x="160" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="158" y="62" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">result</text>
      </g>
    </g>
    <g class="action-node">
      <title>step2(r1, log1) → (r2, log2).  Must accept and return the running log.  Passing log1 instead of log2 silently drops entries.</title>
      <rect x="266" y="49" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="326" y="71" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">step2</text>
      <g class="pin pin-in">
        <rect x="262" y="59.666666666666664" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="272" y="63.666666666666664" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">r1</text>
      </g>
      <g class="pin pin-in">
        <rect x="262" y="74.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="272" y="78.33333333333333" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">log1</text>
      </g>
      <g class="pin pin-out">
        <rect x="382" y="67" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="380" y="71" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">result</text>
      </g>
    </g>
    <g class="action-node">
      <title>step3(r2, log2) → (r3, log3).  Same plumbing repeated.  Adding a step means adding two more parameters everywhere it is called from.</title>
      <rect x="488" y="58" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="548" y="80" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">step3</text>
      <g class="pin pin-in">
        <rect x="484" y="68.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="494" y="72.66666666666667" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">r2</text>
      </g>
      <g class="pin pin-in">
        <rect x="484" y="83.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="494" y="87.33333333333333" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">log2</text>
      </g>
      <g class="pin pin-out">
        <rect x="604" y="76" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="602" y="80" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">result</text>
      </g>
    </g>
    <g class="object-node">
      <title>(r3, log3) — the caller is responsible for unpacking both.</title>
      <rect x="702" y="61" width="178.4" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="791.2" y="80" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">outResult : (r3, log3)</text>
    </g>
  </g>
</svg>
