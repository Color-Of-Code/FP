      <g class="pin pin-out">
        <rect x="558.8" y="73" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>step3(r2, log2) → (r3, log2 ++ entries3). Same plumbing repeated. Adding a step means adding two more parameters everywhere it is called from.</title>
      <rect x="664.8" y="64" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="724.8" y="86" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">step3</text>
      <g class="pin pin-in">
        <rect x="660.8" y="74.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="670.8" y="78.66666666666667" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">r2</text>
      </g>
      <g class="pin pin-in">
        <rect x="660.8" y="89.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="670.8" y="93.33333333333333" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">log2</text>
