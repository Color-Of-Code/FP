      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="1117.6" height="176" fill="white"/>
  <text x="558.8" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Without bind: log threaded as an explicit second parameter at every step</text>
