      <text x="840.8" y="80" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">(r3, log123)</text>
    </g>
    <g class="action-node">
      <title>step1(x, log0) → (r1, log0 ++ entries1). Must accept and return the running log.</title>
      <rect x="220.8" y="46" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="280.8" y="68" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">step1</text>
      <g class="pin pin-in">
        <rect x="216.8" y="56.666666666666664" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="226.8" y="60.666666666666664" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">x</text>
