      <rect x="36" y="92" width="156.8" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="114.4" y="111" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">emptyLog : Log = []</text>
    </g>
    <g class="object-node">
      <title>(r3, log123) — caller unpacks both.</title>
      <rect x="888.8" y="67" width="192.8" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="985.1999999999999" y="86" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">outResult : (R3, log123)</text>
    </g>
