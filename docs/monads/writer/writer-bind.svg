    </g>
    <g class="edge">
      <path d="M628.0,78.0 L636.0,78.0 Q642.0,78.0 642.0,84.0 L642.0,151.0 Q642.0,157.0 648.0,157.0 L660.0,157.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
