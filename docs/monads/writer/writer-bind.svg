    <g class="edge hof-edge">
      <path d="M456.0,120.0 L461.0,120.0 Q466.0,120.0 466.0,115.0 L466.0,84.0 Q466.0,83.0 467.0,83.0 L468.0,83.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M608.0,61.0 L626.0,61.0 Q632.0,61.0 632.0,67.0 L632.0,115.0 L632.0,115.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M608.0,76.0 L616.0,76.0 Q622.0,76.0 622.0,82.0 L622.0,166.0 Q622.0,170.0 626.0,170.0 L630.0,170.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M752.0,115.0 L774.0,115.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M599.0,142.0 L756.0,142.0 Q762.0,142.0 762.0,136.0 L762.0,133.0 Q762.0,127.0 768.0,127.0 L774.0,127.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M752.0,170.0 L766.0,170.0 Q772.0,170.0 772.0,164.0 L772.0,140.0 Q772.0,139.0 773.0,139.0 L774.0,139.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M914.0,125.0 L922.0,125.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M290.0,94.0 L302.0,94.0 Q308.0,94.0 308.0,88.0 L308.0,46.0 Q308.0,40.0 314.0,40.0 L460.0,40.0 Q466.0,40.0 466.0,46.0 L466.0,54.0 Q466.0,57.0 469.0,57.0 L472.0,57.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowOpen)" stroke-dasharray="6,4"/>
    </g>
    <g class="edge">
      <path d="M604.0,87.0 L756.0,87.0 Q762.0,87.0 762.0,93.0 L762.0,101.0 Q762.0,107.0 768.0,107.0 L778.0,107.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowOpen)" stroke-dasharray="6,4"/>
    </g>
    <g class="action-node">
      <title>Pattern-match the pair: extract a (for f) and w1 (for the log combiner)</title>
      <rect x="170" y="57" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="230" y="79" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">extract</text>
      <g class="pin pin-in">
        <rect x="166" y="75" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="176" y="79" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">wa</text>
      </g>
      <g class="pin pin-out">
        <rect x="286" y="67.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="284" y="71.66666666666667" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">a_val</text>
      </g>
      <g class="pin pin-out">
        <rect x="286" y="82.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="284" y="86.33333333333333" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">w1</text>
      </g>
    </g>
    <g class="action-node">
      <title>Apply f(a): produces (b, w2) — the result value b and a new log fragment w2</title>
      <rect x="484" y="50" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="544" y="72" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">apply</text>
      <g class="pin pin-in">
        <rect x="480" y="60.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="490" y="64.66666666666667" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">a_val</text>
      </g>
      <g class="pin pin-in">
        <rect x="480" y="75.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="490" y="79.33333333333333" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="600" y="60.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="598" y="64.66666666666667" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">b_val</text>
      </g>
      <g class="pin pin-out">
        <rect x="600" y="75.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="598" y="79.33333333333333" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">w2</text>
      </g>
    </g>
    <g class="action-node">
      <title>Return (b, w1 &lt;&gt; w2) — result b with both log fragments combined using monoid append</title>
      <rect x="790" y="103" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="850" y="125" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">combine</text>
      <g class="pin pin-in">
        <rect x="786" y="110" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="796" y="114" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">b_val</text>
      </g>
      <g class="pin pin-in">
        <rect x="786" y="121" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="796" y="125" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">w1</text>
      </g>
      <g class="pin pin-in">
        <rect x="786" y="132" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="796" y="136" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">w2</text>
      </g>
      <g class="pin pin-out">
        <rect x="906" y="121" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="904" y="125" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">result</text>
      </g>
    </g>
    <g class="object-node">
      <title>(a, w1) — result a paired with the first log fragment w1</title>
      <rect x="36" y="60" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="91" y="79" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">wa : (a, w1)</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ (b, w2)) — the continuation; produces result b AND a new log fragment w2</title>
      <rect x="328" y="101" width="128" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="392" y="113" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="392" y="127" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ (b, w2)</text>
    </g>
    <g class="object-node">
      <title>a — the value to pass to f</title>
      <rect x="337" y="49" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="392" y="68" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">a_val : a</text>
    </g>
    <g class="object-node">
      <title>w — the first log fragment. Flows DIRECTLY to combine, bypassing apply. It must not be dropped.</title>
      <rect x="489" y="123" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="544" y="142" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">w1 : w</text>
    </g>
    <g class="object-node">
      <title>b — the result value from f(a)</title>
      <rect x="642" y="96" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="697" y="115" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">b_val : b</text>
    </g>
    <g class="object-node">
      <title>w — the second log fragment, produced by f(a). Combined with w1 from the first step.</title>
      <rect x="642" y="151" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="697" y="170" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">w2 : w</text>
    </g>
    <g class="object-node">
      <title>(b, w1&lt;&gt;w2) — the final result: value b and the complete accumulated log</title>
      <rect x="934" y="106" width="164" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1016" y="125" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">result : (b, w1&lt;&gt;w2)</text>
    </g>
  </g>
</svg>
