    </g>
    <g class="edge">
      <path d="M782.0,157.0 L796.0,157.0 Q802.0,157.0 802.0,151.0 L802.0,127.0 Q802.0,126.0 803.0,126.0 L804.0,126.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M944.0,112.0 L952.0,112.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M308.0,77.0 L330.0,77.0 Q336.0,77.0 336.0,71.0 L336.0,65.0 Q336.0,59.0 342.0,59.0 L492.0,59.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowOpen)" stroke-dasharray="6,4"/>
    </g>
    <g class="edge">
      <path d="M624.0,89.0 L646.0,89.0 Q652.0,89.0 652.0,83.0 L652.0,80.0 Q652.0,74.0 658.0,74.0 L786.0,74.0 Q792.0,74.0 792.0,80.0 L792.0,88.0 Q792.0,94.0 798.0,94.0 L808.0,94.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowOpen)" stroke-dasharray="6,4"/>
    </g>
    <g class="action-node">
      <title>Pattern-match the pair: extract a (for f) and w1 (for the log combiner)</title>
      <rect x="188" y="40" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="248" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">extract</text>
      <g class="pin pin-in">
        <rect x="184" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="194" y="62" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">wa</text>
      </g>
      <g class="pin pin-out">
        <rect x="304" y="50.666666666666664" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="302" y="54.666666666666664" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">a_val</text>
      </g>
      <g class="pin pin-out">
        <rect x="304" y="65.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="302" y="69.33333333333333" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">w1</text>
      </g>
    </g>
    <g class="action-node">
      <title>Apply f(a): produces (b, w2) — the result value b and a new log fragment w2</title>
      <rect x="504" y="52" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="564" y="74" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">apply</text>
      <g class="pin pin-in">
        <rect x="500" y="62.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="510" y="66.66666666666667" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">a_val</text>
      </g>
      <g class="pin pin-in">
        <rect x="500" y="77.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="510" y="81.33333333333333" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="620" y="62.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="618" y="66.66666666666667" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">b_val</text>
      </g>
      <g class="pin pin-out">
        <rect x="620" y="77.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="618" y="81.33333333333333" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">w2</text>
      </g>
    </g>
    <g class="action-node">
      <title>Return (b, w1 &lt;&gt; w2) — result b with both log fragments combined using monoid append</title>
      <rect x="820" y="90" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="880" y="112" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">combine</text>
      <g class="pin pin-in">
        <rect x="816" y="97" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="826" y="101" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">b_val</text>
      </g>
      <g class="pin pin-in">
        <rect x="816" y="108" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="826" y="112" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">w1</text>
      </g>
      <g class="pin pin-in">
        <rect x="816" y="119" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="826" y="123" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">w2</text>
      </g>
      <g class="pin pin-out">
        <rect x="936" y="108" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="934" y="112" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">result</text>
      </g>
    </g>
    <g class="object-node">
      <title>(a, w1) — result a paired with the first log fragment w1</title>
      <rect x="54" y="43" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="109" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">wa : (a, w1)</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ (b, w2)) — the continuation; produces result b AND a new log fragment w2</title>
      <rect x="36" y="95" width="128" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="100" y="107" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="100" y="121" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ (b, w2)</text>
    </g>
    <g class="object-node">
      <title>a — the value to pass to f</title>
      <rect x="356" y="68" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="411" y="87" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">a_val : a</text>
    </g>
    <g class="object-node">
      <title>w — the first log fragment. Flows DIRECTLY to combine, bypassing apply. It must not be dropped.</title>
      <rect x="509" y="110" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="564" y="129" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">w1 : w</text>
    </g>
    <g class="object-node">
      <title>b — the result value from f(a)</title>
      <rect x="672" y="83" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="727" y="102" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">b_val : b</text>
    </g>
    <g class="object-node">
      <title>w — the second log fragment, produced by f(a). Combined with w1 from the first step.</title>
      <rect x="672" y="138" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="727" y="157" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">w2 : w</text>
    </g>
    <g class="object-node">
      <title>(b, w1&lt;&gt;w2) — the final result: value b and the complete accumulated log</title>
      <rect x="964" y="93" width="164" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1046" y="112" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">result : (b, w1&lt;&gt;w2)</text>
    </g>
  </g>
</svg>
