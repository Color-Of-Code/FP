      <path d="M466.0,87.0 L471.0,87.0 Q476.0,87.0 476.0,82.0 L476.0,76.0 Q476.0,70.0 482.0,70.0 L488.0,70.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
