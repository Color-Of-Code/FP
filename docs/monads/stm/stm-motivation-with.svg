<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 926.4 234" width="926.4" height="234">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="926.4" height="234" fill="white"/>
  <text x="463.2" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">With pure + bind: STM actions compose freely; runtime commits atomically or retries</text>
  <g transform="translate(0,28) scale(1)">
    <rect x="0" y="0" width="926.4" height="206" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L133.8,0 L133.8,12 L123.80000000000001,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="66.9" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» transfer</text>
    </g>
    <g class="edge">
      <path d="M253.6,62.0 L320.6,62.0 Q326.6,62.0 326.6,68.0 L326.6,98.0 Q326.6,99.0 327.6,99.0 L328.6,99.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="292.1" y="56" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">STM Int</text>
    </g>
    <g class="edge">
      <path d="M468.6,108.0 L536.6,108.0 Q537.6,108.0 537.6,109.0 L537.6,109.0 Q537.6,110.0 538.6,110.0 L539.6,110.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="505.1" y="102" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">STM Int</text>
    </g>
    <g class="edge">
      <path d="M679.6,119.0 L757.6,119.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="726.6" y="113" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">atomically</text>
    </g>
    <g class="edge hof-edge">
      <path d="M257.6,117.0 L328.6,117.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge hof-edge">
      <path d="M249.6,169.0 L261.6,169.0 Q267.6,169.0 267.6,163.0 L267.6,144.0 Q267.6,138.0 273.6,138.0 L532.6,138.0 Q537.6,138.0 537.6,133.0 L537.6,129.0 Q537.6,128.0 538.6,128.0 L539.6,128.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="action-node">
      <title>readTVar accountA : STM Int — STM action. Read tracked, not committed alone.</title>
      <rect x="129.6" y="40" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="189.6" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">readA</text>
      <g class="pin pin-out">
        <rect x="245.6" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>&gt;&gt;= : sequences writeA(-delta) and the readB step. Reads/writes accumulate in the transaction.</title>
      <rect x="344.6" y="86" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="404.6" y="108" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bindWriteA</text>
      <g class="pin pin-in">
        <rect x="340.6" y="96.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="350.6" y="100.66666666666667" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">ma</text>
      </g>
      <g class="pin pin-in">
        <rect x="340.6" y="111.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="350.6" y="115.33333333333333" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="460.6" y="104" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>&gt;&gt;= : sequences writeB(+delta). Final step before commit.</title>
      <rect x="555.6" y="97" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="615.6" y="119" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bindWriteB</text>
      <g class="pin pin-in">
        <rect x="551.6" y="107.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="561.6" y="111.66666666666667" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">ma</text>
      </g>
      <g class="pin pin-in">
        <rect x="551.6" y="122.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="561.6" y="126.33333333333333" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="671.6" y="115" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="object-node hof">
      <title>λaVal. writeTVar accountA (aVal - delta) &gt;&gt; readTVar accountB. HOF argument — captures aVal in scope.</title>
      <rect x="36.000000000000014" y="98" width="221.6" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="146.8" y="110" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="146.8" y="124" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">writeAThenFn : Int ⟶ STM Int</text>
    </g>
    <g class="object-node hof">
      <title>λbVal. writeTVar accountB (bVal + delta). HOF argument — captures bVal.</title>
      <rect x="64.00000000000001" y="150" width="185.6" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="156.8" y="162" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="156.8" y="176" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">writeBFn : Int ⟶ STM ()</text>
    </g>
    <g class="object-node">
      <title>atomically — commits all four operations as one unit, or restarts the whole transaction on conflict. No deadlock possible.</title>
      <rect x="769.6" y="100" width="120.8" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="830" y="119" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">commit : IO ()</text>
    </g>
  </g>
</svg>
