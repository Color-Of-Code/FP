      <text x="538.1" y="102" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">STM b</text>
    </g>
    <g class="edge">
      <path d="M697.6,96.0 L705.6,96.0 Q711.6,96.0 711.6,102.0 L711.6,140.0 L711.6,140.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M831.6,140.0 L836.6,140.0 Q841.6,140.0 841.6,135.0 L841.6,129.0 Q841.6,128.0 842.6,128.0 L843.6,128.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M983.6,113.0 L1250.6,113.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="1125.1" y="107" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">commit — all writes visible atomically</text>
    </g>
    <g class="edge">
      <path d="M983.6,131.0 L991.6,131.0 Q997.6,131.0 997.6,137.0 L997.6,159.0 Q997.6,165.0 1003.6,165.0 L1250.6,165.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="1130.1" y="159" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">conflict — discard writes, restart entire chain</text>
    </g>
    <g class="edge">
      <path d="M297.6,74.0 L350.6,74.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowOpen)" stroke-dasharray="6,4"/>
    </g>
    <g class="edge">
      <path d="M482.6,99.0 L497.1,99.0 Q500.6,99.0 500.6,95.5 L500.6,95.5 Q500.6,92.0 504.1,92.0 L561.6,92.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowOpen)" stroke-dasharray="6,4"/>
    </g>
    <g class="edge">
      <path d="M693.6,112.0 L847.6,112.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowOpen)" stroke-dasharray="6,4"/>
    </g>
    <g class="action-node">
      <title>Run sa: read/write TVars; result is tentative until atomically commits</title>
      <rect x="177.60000000000002" y="42" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="237.60000000000002" y="64" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">run_sa</text>
      <g class="pin pin-in">
        <rect x="173.60000000000002" y="60" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="183.60000000000002" y="64" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">sa</text>
      </g>
      <g class="pin pin-out">
        <rect x="293.6" y="60" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="291.6" y="64" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">a</text>
      </g>
    </g>
    <g class="action-node">
      <title>Apply f(a): build the next atomic action STM b — a not-yet-run TVar action</title>
      <rect x="362.6" y="67" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="422.6" y="89" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">build</text>
      <g class="pin pin-in">
        <rect x="358.6" y="77.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="368.6" y="81.66666666666667" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">a</text>
      </g>
      <g class="pin pin-in">
        <rect x="358.6" y="92.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="368.6" y="96.33333333333333" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="478.6" y="85" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="476.6" y="89" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">sb</text>
      </g>
    </g>
    <g class="action-node">
      <title>Run f(a): read/write TVars; all writes still tentative</title>
      <rect x="573.6" y="80" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="633.6" y="102" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">run_sb</text>
      <g class="pin pin-in">
        <rect x="569.6" y="98" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="579.6" y="102" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">sb</text>
      </g>
      <g class="pin pin-out">
        <rect x="689.6" y="98" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="687.6" y="102" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">b</text>
      </g>
    </g>
    <g class="action-node">
      <title>atomically: check for TVar conflicts.\n  No conflict  → commit all writes at once; b is visible to other threads\n  Conflict     → discard ALL tentative writes; restart the entire chain from run_sa</title>
      <rect x="859.6" y="100" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="919.6" y="122" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">commit</text>
      <g class="pin pin-in">
        <rect x="855.6" y="118" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="865.6" y="122" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">b_in</text>
      </g>
      <g class="pin pin-out">
        <rect x="975.6" y="110.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="973.6" y="114.66666666666667" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">b_out</text>
      </g>
      <g class="pin pin-out">
        <rect x="975.6" y="125.33333333333334" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="973.6" y="129.33333333333334" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">retry</text>
      </g>
    </g>
    <g class="object-node">
      <title>STM a — an atomic action that reads/writes TVars. Not yet executed.</title>
      <rect x="39.60000000000001" y="40" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="94.60000000000001" y="59" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">sa : STM a</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ STM b) — given result a, builds the next atomic action</title>
      <rect x="36.00000000000001" y="92" width="113.60000000000001" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="92.80000000000001" y="104" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="92.80000000000001" y="118" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ STM b</text>
    </g>
    <g class="object-node">
      <title>b — the result value (still tentative, not yet committed)</title>
      <rect x="721.6" y="121" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="776.6" y="140" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">b_raw : b</text>
    </g>
    <g class="object-node">
      <title>b — the committed result. All TVar writes from run_sa and run_sb are now atomically visible.</title>
      <rect x="1262.6" y="94" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1317.6" y="113" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">b : b</text>
    </g>
    <g class="object-node">
      <title>Retry path — the entire transaction restarts. No partial state is visible to other threads.</title>
      <rect x="1262.6" y="146" width="113.60000000000001" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1319.3999999999999" y="165" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">retry : STM b</text>
    </g>
  </g>
</svg>
