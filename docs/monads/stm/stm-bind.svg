      <text x="1297.1" y="129" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">commit — all writes visible atomically</text>
    </g>
    <g class="edge">
      <path d="M1155.6,153.0 L1163.6,153.0 Q1169.6,153.0 1169.6,159.0 L1169.6,181.0 Q1169.6,187.0 1175.6,187.0 L1422.6,187.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="1302.1" y="181" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">conflict — discard writes, restart entire chain</text>
    </g>
    <g class="edge">
      <path d="M293.6,72.0 L435.6,72.0 Q441.6,72.0 441.6,78.0 L441.6,86.0 Q441.6,89.0 444.6,89.0 L447.6,89.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowOpen)" stroke-dasharray="6,4"/>
    </g>
    <g class="edge">
      <path d="M579.6,114.0 L733.6,114.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowOpen)" stroke-dasharray="6,4"/>
    </g>
    <g class="edge">
      <path d="M865.6,134.0 L1019.6,134.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowOpen)" stroke-dasharray="6,4"/>
    </g>
    <g class="action-node">
      <title>Run sa: read/write TVars; result is tentative until atomically commits</title>
      <rect x="173.60000000000002" y="40" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="233.60000000000002" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">run_sa</text>
      <g class="pin pin-in">
        <rect x="169.60000000000002" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="179.60000000000002" y="62" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">sa</text>
      </g>
      <g class="pin pin-out">
        <rect x="289.6" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="287.6" y="62" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">a</text>
      </g>
    </g>
    <g class="action-node">
      <title>Apply f(a): build the next atomic action STM b</title>
      <rect x="459.6" y="82" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="519.6" y="104" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">build</text>
      <g class="pin pin-in">
        <rect x="455.6" y="92.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="465.6" y="96.66666666666667" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">a</text>
      </g>
      <g class="pin pin-in">
        <rect x="455.6" y="107.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="465.6" y="111.33333333333333" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="575.6" y="100" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="573.6" y="104" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">sb</text>
      </g>
    </g>
    <g class="action-node">
      <title>Run f(a): read/write TVars; all writes still tentative</title>
      <rect x="745.6" y="102" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="805.6" y="124" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">run_sb</text>
      <g class="pin pin-in">
        <rect x="741.6" y="120" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="751.6" y="124" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">sb</text>
      </g>
      <g class="pin pin-out">
        <rect x="861.6" y="120" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="859.6" y="124" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">b</text>
      </g>
    </g>
    <g class="action-node">
      <title>atomically: check for TVar conflicts.\n  No conflict  → commit all writes at once; b is visible to other threads\n  Conflict     → discard ALL tentative writes; restart the entire chain from run_sa</title>
      <rect x="1031.6" y="122" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="1091.6" y="144" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">commit</text>
      <g class="pin pin-in">
        <rect x="1027.6" y="140" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="1037.6" y="144" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">b_in</text>
      </g>
      <g class="pin pin-out">
        <rect x="1147.6" y="132.66666666666666" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="1145.6" y="136.66666666666666" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">b_out</text>
      </g>
      <g class="pin pin-out">
        <rect x="1147.6" y="147.33333333333334" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="1145.6" y="151.33333333333334" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">retry</text>
      </g>
    </g>
    <g class="object-node">
      <title>STM a — an atomic action that reads/writes TVars. Not yet executed.</title>
      <rect x="39.60000000000001" y="43" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="94.60000000000001" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">sa : STM a</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ STM b) — given result a, builds the next atomic action</title>
      <rect x="36.00000000000001" y="108" width="113.60000000000001" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="92.80000000000001" y="120" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="92.80000000000001" y="134" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ STM b</text>
    </g>
    <g class="object-node">
      <title>a — the value produced by sa (tentative)</title>
      <rect x="321.6" y="81" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="376.6" y="100" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">a : a</text>
    </g>
    <g class="object-node">
      <title>STM b — the next atomic action</title>
      <rect x="607.6" y="123" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="662.6" y="142" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">sb : STM b</text>
    </g>
    <g class="object-node">
      <title>b — the result value (still tentative, not yet committed)</title>
      <rect x="893.6" y="143" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="948.6" y="162" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">b_raw : b</text>
    </g>
    <g class="object-node">
      <title>b — the committed result. All TVar writes from run_sa and run_sb are now atomically visible.</title>
      <rect x="1434.6" y="116" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1489.6" y="135" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">b : b</text>
    </g>
    <g class="object-node">
      <title>Retry path — the entire transaction restarts. No partial state is visible to other threads.</title>
      <rect x="1434.6" y="168" width="113.60000000000001" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1491.3999999999999" y="187" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">retry : STM b</text>
    </g>
  </g>
</svg>
