  <rect width="1412.1999999999998" height="247" fill="white"/>
  <text x="706.0999999999999" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">STM bind: sequence two TVar actions; atomically commits or retries the whole chain</text>
  <text x="706.0999999999999" y="35" text-anchor="middle" font-size="11" font-weight="normal" font-family="sans-serif" fill="#555">also called: &gt;&gt;=</text>
  <g transform="translate(0,44) scale(1)">
    <rect x="0" y="0" width="1412.1999999999998" height="203" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L109,0 L109,12 L99,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="54.5" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» bind</text>
    </g>
    <g class="edge">
      <path d="M149.6,59.0 L157.1,59.0 Q159.6,59.0 159.6,61.5 L159.6,63.0 Q159.6,64.0 160.6,64.0 L161.6,64.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
