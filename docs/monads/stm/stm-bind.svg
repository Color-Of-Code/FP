    <g class="edge">
      <path d="M301.6,58.0 L309.6,58.0 Q315.6,58.0 315.6,64.0 L315.6,77.0 Q315.6,83.0 321.6,83.0 L343.6,83.0 Q344.6,83.0 344.6,84.0 L344.6,84.0 Q344.6,85.0 345.6,85.0 L346.6,85.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="330.1" y="77" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">a</text>
    </g>
    <g class="edge hof-edge">
      <path d="M149.6,111.0 L339.1,111.0 Q344.6,111.0 344.6,105.5 L344.6,101.0 Q344.6,100.0 345.6,100.0 L346.6,100.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
