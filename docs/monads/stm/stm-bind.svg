    </g>
    <g class="edge hof-edge">
      <path d="M431.6,152.0 L445.6,152.0 Q451.6,152.0 451.6,146.0 L451.6,99.0 Q451.6,98.0 452.6,98.0 L453.6,98.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M593.6,81.0 L601.6,81.0 Q607.6,81.0 607.6,87.0 L607.6,125.0 L607.6,125.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
