<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1502 245" width="1502" height="245">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="1502" height="245" fill="white"/>
  <text x="751" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">STM bind: sequence two TVar actions; atomically commits or retries the whole chain</text>
  <text x="751" y="35" text-anchor="middle" font-size="11" font-weight="normal" font-family="sans-serif" fill="#555">also called: &gt;&gt;=</text>
  <g transform="translate(0,44) scale(1)">
    <rect x="0" y="0" width="1502" height="201" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L109,0 L109,12 L99,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="54.5" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» bind</text>
    </g>
    <g class="edge">
      <path d="M146.0,62.0 L150.0,62.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M294.0,56.0 L302.0,56.0 Q308.0,56.0 308.0,62.0 L308.0,75.0 Q308.0,81.0 314.0,81.0 L437.0,81.0 Q438.0,81.0 438.0,82.0 L438.0,83.0 L438.0,83.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="373" y="75" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">a</text>
    </g>
    <g class="edge hof-edge">
      <path d="M428.0,134.0 L433.0,134.0 Q438.0,134.0 438.0,129.0 L438.0,98.0 L438.0,98.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M580.0,81.0 L598.0,81.0 Q604.0,81.0 604.0,87.0 L604.0,100.0 Q604.0,106.0 610.0,106.0 L647.0,106.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="631.5" y="100" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">STM b</text>
    </g>
    <g class="edge">
      <path d="M791.0,94.0 L799.0,94.0 Q805.0,94.0 805.0,100.0 L805.0,138.0 L805.0,138.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M925.0,138.0 L930.0,138.0 Q935.0,138.0 935.0,133.0 L935.0,126.0 L935.0,126.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M1077.0,111.0 L1344.0,111.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="1218.5" y="105" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">commit — all writes visible atomically</text>
    </g>
    <g class="edge">
      <path d="M1077.0,129.0 L1085.0,129.0 Q1091.0,129.0 1091.0,135.0 L1091.0,157.0 Q1091.0,163.0 1097.0,163.0 L1344.0,163.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="1223.5" y="157" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">conflict — discard writes, restart entire chain</text>
    </g>
    <g class="edge">
      <path d="M290.0,72.0 L444.0,72.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowOpen)" stroke-dasharray="6,4"/>
    </g>
    <g class="edge">
      <path d="M576.0,97.0 L590.5,97.0 Q594.0,97.0 594.0,93.5 L594.0,93.5 Q594.0,90.0 597.5,90.0 L655.0,90.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowOpen)" stroke-dasharray="6,4"/>
    </g>
    <g class="edge">
      <path d="M787.0,110.0 L941.0,110.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowOpen)" stroke-dasharray="6,4"/>
    </g>
    <g class="action-node">
      <title>Run sa: read/write TVars; result is tentative until atomically commits</title>
      <rect x="170" y="40" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="230" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">run_sa</text>
      <g class="pin pin-in">
        <rect x="166" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="176" y="62" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">sa</text>
      </g>
      <g class="pin pin-out">
        <rect x="286" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="284" y="62" text-anchor="end" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">a</text>
      </g>
    </g>
    <g class="action-node">
      <title>Apply f(a): build the next atomic action STM b — a not-yet-run TVar action</title>
      <rect x="456" y="65" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="516" y="87" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">build</text>
      <g class="pin pin-in">
        <rect x="452" y="75.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="462" y="79.66666666666667" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">a</text>
      </g>
      <g class="pin pin-in">
        <rect x="452" y="90.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="462" y="94.33333333333333" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="572" y="83" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="570" y="87" text-anchor="end" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">sb</text>
      </g>
    </g>
    <g class="action-node">
      <title>Run f(a): read/write TVars; all writes still tentative</title>
      <rect x="667" y="78" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="727" y="100" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">run_sb</text>
      <g class="pin pin-in">
        <rect x="663" y="96" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="673" y="100" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">sb</text>
      </g>
      <g class="pin pin-out">
        <rect x="783" y="96" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="781" y="100" text-anchor="end" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">b</text>
      </g>
    </g>
    <g class="action-node">
      <title>atomically: check for TVar conflicts.\n  No conflict  → commit all writes at once; b is visible to other threads\n  Conflict     → discard ALL tentative writes; restart the entire chain from run_sa</title>
      <rect x="953" y="98" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="1013" y="120" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">commit</text>
      <g class="pin pin-in">
        <rect x="949" y="116" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="959" y="120" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">b_in</text>
      </g>
      <g class="pin pin-out">
        <rect x="1069" y="108.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="1067" y="112.66666666666667" text-anchor="end" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">b_out</text>
      </g>
      <g class="pin pin-out">
        <rect x="1069" y="123.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="1067" y="127.33333333333333" text-anchor="end" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">retry</text>
      </g>
    </g>
    <g class="object-node">
      <title>STM a — an atomic action that reads/writes TVars. Not yet executed.</title>
      <rect x="36" y="43" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="91" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">STM a</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ STM b) — given result a, builds the next atomic action</title>
      <rect x="318" y="115" width="110" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="373" y="127" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="373" y="141" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">a ⟶ STM b</text>
    </g>
    <g class="object-node">
      <title>b — the result value (still tentative, not yet committed)</title>
      <rect x="815" y="119" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="870" y="138" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">b</text>
    </g>
    <g class="object-node">
      <title>b — the committed result. All TVar writes from run_sa and run_sb are now atomically visible.</title>
      <rect x="1356" y="92" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1411" y="111" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">b</text>
    </g>
    <g class="object-node">
      <title>Retry path — the entire transaction restarts. No partial state is visible to other threads.</title>
      <rect x="1356" y="144" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1411" y="163" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">STM b</text>
    </g>
  </g>
</svg>
