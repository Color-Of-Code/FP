  <rect width="1594.1999999999998" height="252" fill="white"/>
  <text x="797.0999999999999" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">STM bind: sequence two TVar actions; atomically commits or retries the whole chain</text>
  <text x="797.0999999999999" y="35" text-anchor="middle" font-size="11" font-weight="normal" font-family="sans-serif" fill="#555">also called: &gt;&gt;=</text>
  <g transform="translate(0,44)">
    <rect x="0" y="0" width="1594.1999999999998" height="208" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
