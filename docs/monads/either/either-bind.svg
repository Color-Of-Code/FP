<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1112 330" width="1112" height="330">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="1112" height="330" fill="white"/>
  <text x="556" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Either bind</text>
  <text x="556" y="35" text-anchor="middle" font-size="11" font-weight="normal" font-family="sans-serif" fill="#555">also called: andThen / and_then, Bind, flatMap, &gt;&gt;=</text>
  <g transform="translate(0,44) scale(1)">
    <rect x="0" y="0" width="1112" height="286" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L109,0 L109,12 L99,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="54.5" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» bind</text>
    </g>
    <g class="edge">
      <path d="M220.0,161.0 L225.0,161.0 Q230.0,161.0 230.0,156.0 L230.0,119.0 L230.0,119.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M270.0,108.0 L579.0,108.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="430.5" y="102" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">Right a0  (a0 : a)</text>
    </g>
    <g class="edge hof-edge">
      <path d="M571.0,161.0 L576.0,161.0 Q581.0,161.0 581.0,156.0 L581.0,123.0 L581.0,123.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M723.0,112.0 L890.0,112.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="814.5" y="106" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">f(a0) — Right b' or Left e'</text>
    </g>
    <g class="edge">
      <path d="M270.0,119.0 L275.0,119.0 Q280.0,119.0 280.0,124.0 L280.0,242.0 Q280.0,248.0 286.0,248.0 L575.0,248.0 Q581.0,248.0 581.0,242.0 L581.0,230.0 L581.0,230.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="430.5" y="242" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">Left e0  (e0 : e, f skipped)</text>
    </g>
    <g class="edge">
      <path d="M723.0,224.0 L886.0,224.0 Q892.0,224.0 892.0,218.0 L892.0,112.0 L892.0,112.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="809.5" y="218" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">Left e0 : Either e b</text>
    </g>
    <g class="edge">
      <path d="M932.0,112.0 L936.0,112.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge note-attachment">
      <path d="M220.0,108.0 L240.0,108.0" fill="none" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="3,3" stroke-linejoin="round" stroke-linecap="round"/>
    </g>
    <g class="edge note-attachment">
      <path d="M571.0,214.0 L599.0,214.0" fill="none" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="3,3" stroke-linejoin="round" stroke-linecap="round"/>
    </g>
    <g class="edge note-attachment">
      <path d="M571.0,67.0 L581.0,67.0 L581.0,97.0 L599.0,97.0" fill="none" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="3,3" stroke-linejoin="round" stroke-linecap="round"/>
    </g>
    <g class="action-node">
      <title>Apply f(a0).  f returns Either e b directly (Right b' or Left e').  bind does NOT inspect f's result — whatever f returned is forwarded unchanged.  This is what makes bind compositional: a Left arising inside f propagates exactly the same way as a Left arising before f.</title>
      <rect x="599" y="90" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="659" y="112" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">apply_f</text>
      <g class="pin pin-in">
        <rect x="595" y="100.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="605" y="104.66666666666667" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">a0</text>
      </g>
      <g class="pin pin-in">
        <rect x="595" y="115.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="605" y="119.33333333333333" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="715" y="108" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="713" y="112" text-anchor="end" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">eb</text>
      </g>
    </g>
    <g class="action-node">
      <title>Re-tag the Left constructor: the runtime VALUE Left e0 stays bit-identical, but the static type widens from Left e to Either e b so it unifies with the Right branch's output type at the merge.  No allocation, no transformation — only the type changes.</title>
      <rect x="599" y="202" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="659" y="224" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">widen</text>
      <g class="pin pin-in">
        <rect x="595" y="220" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="605" y="224" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">e0</text>
      </g>
      <g class="pin pin-out">
        <rect x="715" y="220" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="713" y="224" text-anchor="end" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">eLeft</text>
      </g>
    </g>
    <g class="object-node">
      <title>Either e a — the input.  Either Right a0 (success carrying a value of type a) or Left e0 (failure carrying an error value of type e).</title>
      <rect x="92" y="142" width="128" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="156" y="161" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ea : Either e a</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ Either e b) — the continuation.  Invoked ONLY on the Right branch.  Skipped entirely when ea is Left.</title>
      <rect x="421.4" y="142" width="149.6" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="496.2" y="154" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="496.2" y="168" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ Either e b</text>
    </g>
    <g class="object-node">
      <title>Either e b — the single result of bind.  Carries either f's output (when ea was Right) or the original error e0 (when ea was Left).</title>
      <rect x="948" y="93" width="128" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1012" y="112" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ec : Either e b</text>
    </g>
    <g class="decision-node">
      <title>Pattern match on the sum-type constructor.\n  Right a0 → a0 : a flows directly into f (no separate unwrap step).\n  Left  e0 → e0 : e flows directly into widen; the right branch is skipped.\nExactly one branch fires per invocation; the runtime never executes both.</title>
      <polygon points="255,99 269,113 255,127 241,113" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
    </g>
    <g class="merge-node">
      <title>Merge node — both branches produce a value of the SAME type Either e b.  Exactly one inflow fires per invocation; the merge is a control-flow join, not a runtime choice.</title>
      <polygon points="917,98 931,112 917,126 903,112" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
    </g>
    <g class="note-node">
      <polygon points="36,88 210,88 220,98 220,128 36,128" fill="#fffde7" stroke="#fbc02d" stroke-width="1.25"/>
      <polygon points="210,88 210,98 220,98" fill="#fff59d" stroke="#fbc02d" stroke-width="1.25"/>
      <text x="128" y="103.8" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">Pattern match short-circuits:</text>
      <text x="128" y="117.8" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">Left skips f entirely.</text>
    </g>
    <g class="note-node">
      <polygon points="290,194 561,194 571,204 571,234 290,234" fill="#fffde7" stroke="#fbc02d" stroke-width="1.25"/>
      <polygon points="561,194 561,204 571,204" fill="#fff59d" stroke="#fbc02d" stroke-width="1.25"/>
      <text x="430.5" y="209.8" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">Type widens, value preserved bit-identical.</text>
      <text x="430.5" y="223.8" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">This is what 'error preserved verbatim' means.</text>
    </g>
    <g class="note-node">
      <polygon points="325,40 561,40 571,50 571,94 325,94" fill="#fffde7" stroke="#fbc02d" stroke-width="1.25"/>
      <polygon points="561,40 561,50 571,50" fill="#fff59d" stroke="#fbc02d" stroke-width="1.25"/>
      <text x="448" y="55.8" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">Whatever f returns (Right b' or Left e')</text>
      <text x="448" y="69.8" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">is forwarded UNCHANGED — bind never</text>
      <text x="448" y="83.8" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">inspects or rewraps f's result.</text>
    </g>
  </g>
</svg>
