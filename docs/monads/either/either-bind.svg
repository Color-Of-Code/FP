<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1112 313" width="1112" height="313">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="1112" height="313" fill="white"/>
  <text x="556" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Either bind</text>
  <text x="556" y="35" text-anchor="middle" font-size="11" font-weight="normal" font-family="sans-serif" fill="#555">also called: andThen / and_then, Bind, flatMap, &gt;&gt;=</text>
  <g transform="translate(0,44)">
    <rect x="0" y="0" width="1112" height="269" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L109,0 L109,12 L99,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="54.5" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» bind</text>
    </g>
    <g class="edge">
      <path d="M220.0,113.0 L228.0,113.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M270.0,113.0 L275.0,113.0 Q280.0,113.0 280.0,118.0 L280.0,198.0 Q280.0,204.0 286.0,204.0 L583.0,204.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="435.5" y="198" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">Right a0  (a0 : a)</text>
    </g>
    <g class="edge hof-edge">
      <path d="M220.0,232.0 L575.0,232.0 Q581.0,232.0 581.0,226.0 L581.0,220.0 Q581.0,219.0 582.0,219.0 L583.0,219.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M723.0,208.0 L886.0,208.0 Q892.0,208.0 892.0,202.0 L892.0,96.0 L892.0,96.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="809.5" y="202" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">f(a0) — Right b' or Left e'</text>
    </g>
    <g class="edge">
      <path d="M270.0,102.0 L583.0,102.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="430.5" y="96" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">Left e0  (e0 : e, f skipped)</text>
    </g>
    <g class="edge">
      <path d="M723.0,96.0 L890.0,96.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="814.5" y="90" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">Left e0 : Either e b</text>
    </g>
    <g class="edge">
      <path d="M932.0,96.0 L936.0,96.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge note-attachment">
      <path d="M220.0,60.0 L230.0,60.0 L230.0,102.0 L240.0,102.0" fill="none" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="3,3" stroke-linejoin="round" stroke-linecap="round"/>
    </g>
    <g class="edge note-attachment">
      <path d="M571.0,68.0 L581.0,68.0 L581.0,86.0 L599.0,86.0" fill="none" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="3,3" stroke-linejoin="round" stroke-linecap="round"/>
    </g>
    <g class="edge note-attachment">
      <path d="M571.0,163.0 L581.0,163.0 L581.0,193.0 L599.0,193.0" fill="none" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="3,3" stroke-linejoin="round" stroke-linecap="round"/>
    </g>
    <g class="action-node">
      <title>Apply f(a0).  f returns Either e b directly (Right b' or Left e').  bind does NOT inspect f's result — whatever f returned is forwarded unchanged.  This is what makes bind compositional: a Left arising inside f propagates exactly the same way as a Left arising before f.</title>
      <rect x="599" y="186" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="659" y="208" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">apply_f</text>
      <g class="pin pin-in">
        <rect x="595" y="196.66666666666666" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="605" y="200.66666666666666" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">a0</text>
      </g>
      <g class="pin pin-in">
        <rect x="595" y="211.33333333333334" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="605" y="215.33333333333334" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="715" y="204" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="713" y="208" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">eb</text>
      </g>
    </g>
    <g class="action-node">
      <title>Re-tag the Left constructor: the runtime VALUE Left e0 stays bit-identical, but the static type widens from Left e to Either e b so it unifies with the Right branch's output type at the merge.  No allocation, no transformation — only the type changes.</title>
      <rect x="599" y="74" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="659" y="96" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">widen</text>
      <g class="pin pin-in">
        <rect x="595" y="92" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="605" y="96" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">e0</text>
      </g>
      <g class="pin pin-out">
        <rect x="715" y="92" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="713" y="96" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">eLeft</text>
      </g>
    </g>
    <g class="object-node">
      <title>Either e a — the input.  Either Right a0 (success carrying a value of type a) or Left e0 (failure carrying an error value of type e).</title>
      <rect x="92" y="94" width="128" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="156" y="113" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ea : Either e a</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ Either e b) — the continuation.  Invoked ONLY on the Right branch.  Skipped entirely when ea is Left.</title>
      <rect x="70.39999999999999" y="213" width="149.6" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="145.2" y="225" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="145.2" y="239" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ Either e b</text>
    </g>
    <g class="object-node">
      <title>Either e b — the single result of bind.  Carries either f's output (when ea was Right) or the original error e0 (when ea was Left).</title>
      <rect x="948" y="77" width="128" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1012" y="96" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ec : Either e b</text>
    </g>
    <g class="decision-node">
      <title>Pattern match on the sum-type constructor.\n  Right a0 → a0 : a flows directly into f (no separate unwrap step).\n  Left  e0 → e0 : e flows directly into widen; the right branch is skipped.\nExactly one branch fires per invocation; the runtime never executes both.</title>
      <polygon points="255,93 269,107 255,121 241,107" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
    </g>
    <g class="merge-node">
      <title>Merge node — both branches produce a value of the SAME type Either e b.  Exactly one inflow fires per invocation; the merge is a control-flow join, not a runtime choice.</title>
      <polygon points="917,82 931,96 917,110 903,96" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
    </g>
    <g class="note-node">
      <polygon points="36,40 210,40 220,50 220,80 36,80" fill="#fffde7" stroke="#fbc02d" stroke-width="1.25"/>
      <polygon points="210,40 210,50 220,50" fill="#fff59d" stroke="#fbc02d" stroke-width="1.25"/>
      <text x="128" y="55.8" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">Pattern match short-circuits:</text>
      <text x="128" y="69.8" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">Left skips f entirely.</text>
    </g>
    <g class="note-node">
      <polygon points="290,48 561,48 571,58 571,88 290,88" fill="#fffde7" stroke="#fbc02d" stroke-width="1.25"/>
      <polygon points="561,48 561,58 571,58" fill="#fff59d" stroke="#fbc02d" stroke-width="1.25"/>
      <text x="430.5" y="63.8" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">Type widens, value preserved bit-identical.</text>
      <text x="430.5" y="77.8" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">This is what 'error preserved verbatim' means.</text>
    </g>
    <g class="note-node">
      <polygon points="325,136 561,136 571,146 571,190 325,190" fill="#fffde7" stroke="#fbc02d" stroke-width="1.25"/>
      <polygon points="561,136 561,146 571,146" fill="#fff59d" stroke="#fbc02d" stroke-width="1.25"/>
      <text x="448" y="151.8" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">Whatever f returns (Right b' or Left e')</text>
      <text x="448" y="165.8" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">is forwarded UNCHANGED — bind never</text>
      <text x="448" y="179.8" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">inspects or rewraps f's result.</text>
    </g>
  </g>
</svg>
