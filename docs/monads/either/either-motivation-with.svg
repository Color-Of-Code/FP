    <g class="object-node">
      <title>Raw input — for example a request body or untrusted user data.</title>
      <rect x="36" y="40" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="91" y="59" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">raw : String</text>
    </g>
    <g class="object-node hof">
      <title>parse : String → Either e Parsed. HOF argument — its input is String, not Either e String, so it cannot sit on the main flow.</title>
      <rect x="542.4" y="40" width="264.8" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="674.8" y="52" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="674.8" y="66" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">parseFn : String ⟶ Either e Parsed</text>
    </g>
    <g class="object-node hof">
      <title>validate : Parsed → Either e Valid. Same: supplied to bind as the continuation.</title>
      <rect x="990.4" y="40" width="279.2" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="1130" y="52" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="1130" y="66" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">validateFn : Parsed ⟶ Either e Valid</text>
    </g>
    <g class="object-node hof">
      <title>save : Valid → Either e Saved. Same: supplied to bind as the continuation.</title>
      <rect x="1427.6000000000001" y="40" width="243.20000000000002" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="1549.2" y="52" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="1549.2" y="66" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">saveFn : Valid ⟶ Either e Saved</text>
    </g>
    <g class="object-node">
      <title>Either e Saved — Right on the happy path; the very first Left otherwise.</title>
      <rect x="1731.2" y="40" width="185.6" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1824" y="59" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">eSaved : Either e Saved</text>
    </g>
