    </g>
    <g class="action-node">
      <title>pure : String → Either e String. Lifts the plain value so the chain can start uniformly with bind.</title>
      <rect x="174" y="120" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="234" y="142" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">pureRaw</text>
      <g class="pin pin-in">
        <rect x="170" y="138" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="180" y="142" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">a</text>
      </g>
      <g class="pin pin-out">
        <rect x="290" y="138" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>&gt;&gt;= : takes Either e String and (String → Either e Parsed). Right-path runs parse; Left propagates.</title>
      <rect x="614.8" y="120" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="674.8" y="142" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bindParse</text>
