  <rect width="1952.8" height="210" fill="white"/>
  <text x="976.4" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">With pure + bind: Left propagates automatically; every step has the same shape</text>
