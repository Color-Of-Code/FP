  <rect width="1775.6000000000001" height="210" fill="white"/>
  <text x="887.8000000000001" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">With pure + bind: Left propagates automatically; every step has the same shape</text>
  <g transform="translate(0,28) scale(1)">
    <rect x="0" y="0" width="1775.6000000000001" height="182" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
