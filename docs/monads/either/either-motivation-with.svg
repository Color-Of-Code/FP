      <text class="action-label" x="1151.2" y="165" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bindSave</text>
      <g class="pin pin-in">
        <rect x="1087.2" y="153.66666666666666" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
