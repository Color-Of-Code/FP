      <text x="351" y="56" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">Parsed | Error</text>
    </g>
    <g class="edge">
      <path d="M425.0,77.0 L425.0,114.0 Q425.0,120.0 431.0,120.0 L1313.0,120.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
