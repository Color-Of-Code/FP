    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="1527.8" height="186" fill="white"/>
  <text x="763.9" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Without Either: explicit error guard at every step</text>
  <g transform="translate(0,28) scale(1)">
    <rect x="0" y="0" width="1527.8" height="158" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
