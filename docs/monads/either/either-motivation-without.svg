      <text x="501.5" y="56" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">parsed : Parsed</text>
    </g>
    <g class="edge">
      <path d="M689.0,62.0 L782.0,62.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="743.5" y="56" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">Valid | Error</text>
    </g>
    <g class="edge">
      <path d="M815.0,77.0 L815.0,114.0 Q815.0,120.0 821.0,120.0 L1313.0,120.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="819" y="98.5" text-anchor="start" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">Error</text>
    </g>
    <g class="edge">
      <path d="M836.0,62.0 L929.0,62.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="886.5" y="56" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">valid : Valid</text>
    </g>
    <g class="edge">
      <path d="M1069.0,62.0 L1166.0,62.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="1125.5" y="56" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">Saved | Error</text>
    </g>
    <g class="edge">
      <path d="M1199.0,77.0 L1199.0,114.0 Q1199.0,120.0 1205.0,120.0 L1313.0,120.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="1203" y="98.5" text-anchor="start" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">Error</text>
    </g>
    <g class="edge">
      <path d="M1220.0,62.0 L1359.0,62.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="1295.5" y="56" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">saved : Saved</text>
    </g>
    <g class="edge">
      <path d="M1355.0,120.0 L1359.0,120.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="action-node">
      <title>parse(raw) — may return Error if the input is malformed.</title>
      <rect x="170" y="40" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="230" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">parse</text>
      <g class="pin pin-in">
        <rect x="166" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="176" y="62" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">raw</text>
      </g>
      <g class="pin pin-out">
        <rect x="286" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="284" y="62" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">result</text>
      </g>
    </g>
    <g class="action-node">
      <title>validate(parsed) — may return Error if a business rule is violated.</title>
      <rect x="565" y="40" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="625" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">validate</text>
      <g class="pin pin-in">
        <rect x="561" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="571" y="62" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">parsed</text>
      </g>
      <g class="pin pin-out">
        <rect x="681" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="679" y="62" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">result</text>
      </g>
    </g>
    <g class="action-node">
      <title>save(valid) — may return Error on a database / IO failure.</title>
      <rect x="945" y="40" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="1005" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">save</text>
      <g class="pin pin-in">
        <rect x="941" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="951" y="62" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">valid</text>
      </g>
      <g class="pin pin-out">
        <rect x="1061" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="1059" y="62" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">result</text>
      </g>
    </g>
    <g class="object-node">
      <title>The raw input — for example a request body or untrusted user data.</title>
      <rect x="36" y="43" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="91" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">raw : String</text>
    </g>
    <g class="object-node">
      <title>Error — returned when any step failed.  Caller must also inspect this and decide what to do.</title>
      <rect x="1371" y="101" width="120.8" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1431.4" y="120" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">errOut : Error</text>
    </g>
    <g class="object-node">
      <title>Saved — the happy-path result, reached only when all three checks pass.</title>
      <rect x="1371" y="43" width="113.60000000000001" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1427.8" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">saved : Saved</text>
    </g>
    <g class="decision-node">
      <title>Error guard #1: pattern-matches Parsed | Error.  The error branch joins errorRail; the value branch carries 'parsed : Parsed' to validate.</title>
      <polygon points="425,48 445,62 425,76 405,62" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
      <text x="425" y="62" text-anchor="middle" font-size="9" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">err?</text>
    </g>
    <g class="decision-node">
      <title>Error guard #2: same pattern repeated.  Skipping this is a latent bug.</title>
      <polygon points="815,48 835,62 815,76 795,62" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
      <text x="815" y="62" text-anchor="middle" font-size="9" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">err?</text>
    </g>
    <g class="decision-node">
      <title>Error guard #3: yet another check.  Business logic is buried in guards.</title>
      <polygon points="1199,48 1219,62 1199,76 1179,62" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
      <text x="1199" y="62" text-anchor="middle" font-size="9" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">err?</text>
    </g>
    <g class="merge-node">
      <title>Any Error terminates the chain here — three separate error paths converge.</title>
      <polygon points="1340,106 1354,120 1340,134 1326,120" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
    </g>
  </g>
</svg>
