<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320.2 186" width="1320.2" height="186">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="1320.2" height="186" fill="white"/>
  <text x="660.1" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Without Parser: remaining input threaded by hand</text>
  <g transform="translate(0,28) scale(1)">
    <rect x="0" y="0" width="1320.2" height="158" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L152.4,0 L152.4,12 L142.4,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="76.2" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» digitLetter</text>
    </g>
    <g class="edge">
      <path d="M156.8,62.0 L164.8,62.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M304.8,62.0 L437.8,62.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="379.3" y="56" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">(Char, String) | null</text>
    </g>
    <g class="edge">
      <path d="M473.8,77.0 L473.8,108.0 Q473.8,114.0 479.8,114.0 L1011.8,114.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="477.8" y="95.5" text-anchor="start" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">null</text>
    </g>
    <g class="edge">
      <path d="M497.8,62.0 L575.8,62.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="540.8" y="56" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">(d, rest1)</text>
    </g>
    <g class="edge">
      <path d="M715.8,62.0 L848.8,62.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="790.3" y="56" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">(Char, String) | null</text>
    </g>
    <g class="edge">
      <path d="M884.8,77.0 L884.8,108.0 Q884.8,114.0 890.8,114.0 L1011.8,114.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="888.8" y="95.5" text-anchor="start" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">null</text>
    </g>
    <g class="edge">
      <path d="M908.8,62.0 L1057.8,62.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="989.3" y="56" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">((d, l), rest2)</text>
    </g>
    <g class="edge">
      <path d="M1053.8,114.0 L1057.8,114.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="action-node">
      <title>parseDigit(input) → (Char, String) or null.  Returns the consumed character and the leftover.</title>
      <rect x="180.8" y="40" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="240.8" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">parseDigit</text>
      <g class="pin pin-in">
        <rect x="176.8" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="186.8" y="62" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">input</text>
      </g>
      <g class="pin pin-out">
        <rect x="296.8" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="294.8" y="62" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">result</text>
      </g>
    </g>
    <g class="action-node">
      <title>parseLetter(rest1) → (Char, String) or null.  Must be called with the leftover from parseDigit, never the original input.</title>
      <rect x="591.8" y="40" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="651.8" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">parseLetter</text>
      <g class="pin pin-in">
        <rect x="587.8" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="597.8" y="62" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">input</text>
      </g>
      <g class="pin pin-out">
        <rect x="707.8" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="705.8" y="62" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">result</text>
      </g>
    </g>
    <g class="object-node">
      <title>input : String — the full input string, threaded through the whole chain.</title>
      <rect x="36.00000000000001" y="43" width="120.8" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="96.4" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">input : String</text>
    </g>
    <g class="object-node">
      <title>((d, l), rest2) — caller is responsible for unpacking the value and the remaining input.</title>
      <rect x="1069.8" y="43" width="214.4" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1177" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">outResult : ((d, l), rest2)</text>
    </g>
    <g class="object-node">
      <title>null — a plausible parse failure value indistinguishable from a real returned value of null.</title>
      <rect x="1069.8" y="95" width="113.60000000000001" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1126.6" y="114" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">failed : null</text>
    </g>
    <g class="decision-node">
      <title>Null guard #1: skip and you'll feed null to parseLetter.</title>
      <polygon points="473.8,48 496.8,62 473.8,76 450.8,62" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
      <text x="473.8" y="62" text-anchor="middle" font-size="9" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">null?</text>
    </g>
    <g class="decision-node">
      <title>Null guard #2: skip and you'll return garbage.</title>
      <polygon points="884.8,48 907.8,62 884.8,76 861.8,62" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
      <text x="884.8" y="62" text-anchor="middle" font-size="9" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">null?</text>
    </g>
    <g class="merge-node">
      <title>Any null short-circuits the whole chain.</title>
      <polygon points="1038.8,100 1052.8,114 1038.8,128 1024.8,114" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
    </g>
  </g>
</svg>
