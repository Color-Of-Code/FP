    <g class="edge">
      <path d="M308.8,139.0 L326.8,139.0 Q332.8,139.0 332.8,145.0 L332.8,200.0 Q332.8,206.0 338.8,206.0 L483.0,206.0 Q488.0,206.0 488.0,201.0 L488.0,200.6 Q488.0,196.0 492.6,196.0 L497.2,196.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M465.4,127.0 L490.0,127.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
