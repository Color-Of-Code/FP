    <g class="action-node">
      <title>Run pa(input): on success produces (a, rest); on failure produces Nothing</title>
      <rect x="199.2" y="139" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="259.2" y="161" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">run_pa</text>
      <g class="pin pin-in">
        <rect x="195.2" y="149.66666666666666" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="205.2" y="153.66666666666666" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">pa</text>
      </g>
      <g class="pin pin-in">
        <rect x="195.2" y="164.33333333333334" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="205.2" y="168.33333333333334" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">input</text>
