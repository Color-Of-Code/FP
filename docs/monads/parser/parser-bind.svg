      <g class="pin pin-out">
        <rect x="315.2" y="168" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="313.2" y="172" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">fail</text>
      </g>
    </g>
    <g class="action-node">
      <title>Apply f(a): build Parser b from the parsed value a</title>
      <rect x="515.2" y="160" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="575.2" y="182" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">apply_f</text>
      <g class="pin pin-in">
        <rect x="511.20000000000005" y="170.66666666666666" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="521.2" y="174.66666666666666" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">a_val</text>
      </g>
      <g class="pin pin-in">
        <rect x="511.20000000000005" y="185.33333333333334" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="521.2" y="189.33333333333334" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">f</text>
