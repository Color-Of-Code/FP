        <rect x="930.8000000000001" y="202.66666666666666" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="928.8000000000001" y="206.66666666666666" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">b</text>
      </g>
      <g class="pin pin-out">
        <rect x="930.8000000000001" y="217.33333333333334" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="928.8000000000001" y="221.33333333333334" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">rest2</text>
      </g>
    </g>
    <g class="object-node">
      <title>Parser a — a function String ⟶ Maybe (a, String): consumes a prefix, returns (a, rest) or Nothing</title>
      <rect x="57.59999999999997" y="99" width="113.60000000000001" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="114.39999999999998" y="118" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">pa : Parser a</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ Parser b) — the next parser, built from the parsed value a</title>
      <rect x="36" y="203" width="135.2" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="103.6" y="215" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="103.6" y="229" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ Parser b</text>
    </g>
    <g class="object-node">
      <title>String — the full input. pa consumes a prefix; rest is passed forward (like State monad).</title>
      <rect x="50.399999999999984" y="151" width="120.8" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="110.79999999999998" y="170" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">input : String</text>
    </g>
    <g class="object-node">
      <title>a — the parsed value. Passed to f to build the next parser.</title>
      <rect x="367.2" y="176" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="422.2" y="195" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">a_val : a</text>
    </g>
    <g class="object-node">
      <title>String — unconsumed input after pa ran. Flows to run_pb (not input). This is the State-like threading.</title>
      <rect x="518.4" y="218" width="113.60000000000001" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="575.1999999999999" y="237" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">rest : String</text>
    </g>
    <g class="object-node">
      <title>Parser b — the second parser</title>
      <rect x="673.2" y="191" width="113.60000000000001" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="730" y="210" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">pb : Parser b</text>
    </g>
    <g class="object-node">
      <title>b — the final parsed value</title>
      <rect x="962.8000000000001" y="186" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1017.8000000000001" y="205" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">b : b</text>
    </g>
    <g class="object-node">
      <title>String — input still unconsumed after both parsers ran</title>
      <rect x="962.8000000000001" y="238" width="120.8" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1023.2" y="257" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">rest2 : String</text>
    </g>
    <g class="object-node">
      <title>Nothing — pa failed. No (a, rest) was produced.</title>
      <rect x="36" y="40" width="142.4" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="107.2" y="59" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">fail_in : Nothing</text>
    </g>
    <g class="object-node">
      <title>Nothing — propagated unchanged. f is never called. (Same short-circuit as Maybe bind.)</title>
      <rect x="259.4" y="40" width="149.6" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="334.2" y="59" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">fail_out : Nothing</text>
    </g>
  </g>
