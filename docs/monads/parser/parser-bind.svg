      <g class="pin pin-out">
        <rect x="631.2" y="178" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="629.2" y="182" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">pb</text>
      </g>
    </g>
    <g class="action-node">
      <title>Run pb(rest): parse b from the REMAINING input, not from the original input</title>
      <rect x="814.8000000000001" y="192" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="874.8000000000001" y="214" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">run_pb</text>
      <g class="pin pin-in">
        <rect x="810.8000000000001" y="202.66666666666666" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="820.8000000000001" y="206.66666666666666" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">pb</text>
