<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1047 188" width="1047" height="188">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="1047" height="188" fill="white"/>
  <text x="523.5" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Without bind: one nested loop level per Cartesian dimension</text>
  <g transform="translate(0,28) scale(1)">
    <rect x="0" y="0" width="1047" height="160" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L140,0 L140,12 L130,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="70" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» cartesian</text>
    </g>
    <g class="edge">
      <path d="M146.0,111.0 L154.0,111.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M298.0,111.0 L385.0,111.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="349.5" y="105" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">for x in xs</text>
    </g>
    <g class="edge">
      <path d="M146.0,59.0 L151.0,59.0 Q156.0,59.0 156.0,64.0 L156.0,74.0 Q156.0,80.0 162.0,80.0 L381.0,80.0 Q387.0,80.0 387.0,86.0 L387.0,111.0 L387.0,111.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M529.0,111.0 L612.0,111.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="578.5" y="105" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">for y in ys</text>
    </g>
    <g class="edge">
      <path d="M756.0,120.0 L889.0,120.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="830.5" y="114" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">result.append((x, y))</text>
    </g>
    <g class="action-node">
      <title>for x in xs — outer loop opens scope for x.</title>
      <rect x="174" y="89" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="234" y="111" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">outer</text>
      <g class="pin pin-in">
        <rect x="170" y="107" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="180" y="111" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">xs</text>
      </g>
      <g class="pin pin-out">
        <rect x="290" y="107" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>for y in ys — inner loop nested inside; each extra dimension means one more nesting level.</title>
      <rect x="405" y="89" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="465" y="111" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">inner</text>
      <g class="pin pin-in">
        <rect x="401" y="107" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="411" y="111" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">ys</text>
      </g>
      <g class="pin pin-out">
        <rect x="521" y="107" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>result.append((x, y)) — manual mutation of a shared accumulator. Easy to forget; easy to break.</title>
      <rect x="632" y="98" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="692" y="120" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">append</text>
      <g class="pin pin-in">
        <rect x="628" y="108.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="638" y="112.66666666666667" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">x</text>
      </g>
      <g class="pin pin-in">
        <rect x="628" y="123.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="638" y="127.33333333333333" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">y</text>
      </g>
      <g class="pin pin-out">
        <rect x="748" y="116" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="object-node">
      <title>xs : [A] — the first list, iterated by the outer loop.</title>
      <rect x="36" y="92" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="91" y="111" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">[A]</text>
    </g>
    <g class="object-node">
      <title>ys : [B] — the second list, iterated by the inner loop for every x.</title>
      <rect x="36" y="40" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="91" y="59" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">[B]</text>
    </g>
    <g class="object-node">
      <title>[(A, B)] — the result list built by side effect. Adding a 3rd dimension means rewriting the whole structure.</title>
      <rect x="901" y="101" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="956" y="120" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">[(A, B)]</text>
    </g>
  </g>
</svg>
