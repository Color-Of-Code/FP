<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 999.4 195" width="999.4" height="195">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="999.4" height="195" fill="white"/>
  <text x="499.7" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">With List: one bind per dimension</text>
  <text x="499.7" y="35" text-anchor="middle" font-size="11" font-weight="normal" font-family="sans-serif" fill="#555">flat pipeline</text>
  <g transform="translate(0,44)">
    <rect x="0" y="0" width="999.4" height="151" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L140,0 L140,12 L130,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="70" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» cartesian</text>
    </g>
    <g class="edge">
      <path d="M146.0,111.0 L158.0,111.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M298.0,111.0 L374.0,111.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="342" y="105" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">&gt;&gt;= x -&gt;</text>
    </g>
    <g class="edge">
      <path d="M146.0,59.0 L151.0,59.0 Q156.0,59.0 156.0,64.0 L156.0,74.0 Q156.0,80.0 162.0,80.0 L366.0,80.0 Q372.0,80.0 372.0,86.0 L372.0,110.0 Q372.0,111.0 373.0,111.0 L374.0,111.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M514.0,111.0 L586.0,111.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="556" y="105" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">&gt;&gt;= y -&gt;</text>
    </g>
    <g class="edge">
      <path d="M726.0,102.0 L809.0,102.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="775.5" y="96" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">pure (x, y)</text>
    </g>
    <g class="action-node">
      <title>xs &gt;&gt;= \\x -&gt; ...  Iterates over xs, binding each element to the local name x.</title>
      <rect x="174" y="89" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="234" y="111" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bindX</text>
      <g class="pin pin-in">
        <rect x="170" y="107" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="180" y="111" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">xs</text>
      </g>
      <g class="pin pin-out">
        <rect x="290" y="107" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="288" y="111" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">x</text>
      </g>
    </g>
    <g class="action-node">
      <title>ys &gt;&gt;= \\y -&gt; ...  Iterates over ys for each x, binding to y.</title>
      <rect x="390" y="89" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="450" y="111" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bindY</text>
      <g class="pin pin-in">
        <rect x="386" y="107" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="396" y="111" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">ys</text>
      </g>
      <g class="pin pin-out">
        <rect x="506" y="107" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="504" y="111" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">y</text>
      </g>
    </g>
    <g class="action-node">
      <title>pure (x, y) — lifts a single pair back into the list monad.</title>
      <rect x="602" y="80" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="662" y="102" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">pair</text>
      <g class="pin pin-in">
        <rect x="598" y="90.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="608" y="94.66666666666667" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">x</text>
      </g>
      <g class="pin pin-in">
        <rect x="598" y="105.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="608" y="109.33333333333333" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">y</text>
      </g>
      <g class="pin pin-out">
        <rect x="718" y="98" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="716" y="102" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">result</text>
      </g>
    </g>
    <g class="object-node">
      <title>xs : [A] — the first list.</title>
      <rect x="36" y="92" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="91" y="111" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">xs : [A]</text>
    </g>
    <g class="object-node">
      <title>ys : [B] — the second list.</title>
      <rect x="36" y="40" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="91" y="59" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ys : [B]</text>
    </g>
    <g class="object-node">
      <title>[(A, B)] — the Cartesian product as a flat list.  Each new dimension is one more &gt;&gt;= line.</title>
      <rect x="821" y="83" width="142.4" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="892.2" y="102" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">result : [(A, B)]</text>
    </g>
  </g>
</svg>
