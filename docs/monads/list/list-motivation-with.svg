  <rect width="822.8" height="422" fill="white"/>
  <text x="411.4" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">With pure + bind: nested binds = nested loops; one bind per Cartesian axis</text>
  <g transform="translate(0,28) scale(1)">
    <rect x="0" y="0" width="822.8" height="394" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L140,0 L140,12 L130,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="70" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» cartesian</text>
    </g>
    <g class="swimlane lane-plain">
      <rect x="6" y="28" width="810.8" height="143" fill="#f7f9fc" stroke="#bbbbbb" stroke-width="1" rx="4" ry="4"/>
      <rect x="6" y="28" width="810.8" height="18" fill="#e9eef5" stroke="#bbbbbb" stroke-width="1" rx="4" ry="4"/>
      <text x="16" y="38" text-anchor="start" font-size="10" font-weight="bold" font-family="sans-serif" dominant-baseline="middle" fill="#333">Plain values &amp; functions</text>
    </g>
    <g class="swimlane lane-monad">
      <rect x="6" y="171" width="810.8" height="217" fill="#f7f9fc" stroke="#bbbbbb" stroke-width="1" rx="4" ry="4"/>
      <rect x="6" y="171" width="810.8" height="18" fill="#e9eef5" stroke="#bbbbbb" stroke-width="1" rx="4" ry="4"/>
      <text x="16" y="181" text-anchor="start" font-size="10" font-weight="bold" font-family="sans-serif" dominant-baseline="middle" fill="#333">List monad</text>
    </g>
    <g class="edge">
      <path d="M146.0,203.0 L151.0,203.0 Q156.0,203.0 156.0,208.0 L156.0,230.0 Q156.0,236.0 162.0,236.0 L348.4,236.0 Q354.4,236.0 354.4,242.0 L354.4,348.0 Q354.4,354.0 360.4,354.0 L366.4,354.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="255.2" y="230" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">[A]</text>
    </g>
    <g class="edge hof-edge">
      <path d="M442.4,223.0 L442.4,316.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M506.4,354.0 L524.4,354.0 Q530.4,354.0 530.4,348.0 L530.4,234.0 Q530.4,228.0 536.4,228.0 L628.4,228.0 Q634.4,228.0 634.4,222.0 L634.4,209.3 L634.4,209.3" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="530.4" y="285" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">[(A, B)]</text>
    </g>
    <g class="edge">
      <path d="M146.0,59.0 L151.0,59.0 Q156.0,59.0 156.0,64.0 L156.0,86.0 Q156.0,92.0 162.0,92.0 L348.4,92.0 Q354.4,92.0 354.4,98.0 L354.4,141.0 Q354.4,142.0 355.4,142.0 L356.4,142.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="255.2" y="86" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">[B]</text>
    </g>
    <g class="edge hof-edge">
      <path d="M432.4,79.0 L432.4,104.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M506.4,286.0 L514.4,286.0 Q520.4,286.0 520.4,280.0 L520.4,204.0 Q520.4,198.0 526.4,198.0 L633.7,198.0 Q634.4,198.0 634.4,197.3 L634.4,196.7 L634.4,196.7" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="577.4" y="192" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">(via inner bind)</text>
    </g>
    <g class="action-node">
      <title>&gt;&gt;= : applies outerFn to every element of xs and concatenates the results.</title>
      <rect x="382.4" y="332" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="442.4" y="354" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bindOuter</text>
      <g class="pin pin-in">
        <rect x="378.4" y="350" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="388.4" y="354" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">ma</text>
      </g>
      <g class="pin pin-in">
        <rect x="438.4" y="328" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="442.4" y="326" text-anchor="middle" dominant-baseline="alphabetic" font-size="8" font-family="sans-serif" fill="#555">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="498.4" y="350" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>&gt;&gt;= : the inner bind that lives inside outerFn — applies innerFn to every element of ys.</title>
      <rect x="372.4" y="120" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="432.4" y="142" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bindInner</text>
      <g class="pin pin-in">
        <rect x="368.4" y="138" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="378.4" y="142" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">ma</text>
      </g>
      <g class="pin pin-in">
        <rect x="428.4" y="116" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="432.4" y="114" text-anchor="middle" dominant-baseline="alphabetic" font-size="8" font-family="sans-serif" fill="#555">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="488.4" y="138" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>pure : (A, B) → [(A, B)]. Lifts the single pair (x, y) into a singleton list.</title>
      <rect x="382.4" y="264" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="442.4" y="286" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">purePair</text>
      <g class="pin pin-in">
        <rect x="378.4" y="282" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="388.4" y="286" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">a</text>
      </g>
      <g class="pin pin-out">
        <rect x="498.4" y="282" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="object-node">
      <title>[A] — first list. Outer iteration.</title>
      <rect x="36" y="184" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="91" y="203" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">xs : [A]</text>
    </g>
    <g class="object-node">
      <title>[B] — second list. Inner iteration (under each x).</title>
      <rect x="36" y="40" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="91" y="59" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ys : [B]</text>
    </g>
    <g class="object-node hof">
      <title>λx. ys &gt;&gt;= λy. pure (x, y). HOF argument to the outer bind — its input is A, not [A].</title>
      <rect x="353.2" y="184" width="178.4" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="442.4" y="196" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="442.4" y="210" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">outerFn : A ⟶ [(A, B)]</text>
    </g>
    <g class="object-node hof">
      <title>λy. pure (x, y). HOF argument to the inner bind — captures x from outerFn's scope.</title>
      <rect x="343.2" y="40" width="178.4" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="432.4" y="52" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="432.4" y="66" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">innerFn : B ⟶ [(A, B)]</text>
    </g>
    <g class="object-node">
      <title>[(A, B)] — the Cartesian product as a flat list. One more axis = one more bind line.</title>
      <rect x="644.4" y="184" width="142.4" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="715.6" y="203" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">result : [(A, B)]</text>
    </g>
  </g>
</svg>
