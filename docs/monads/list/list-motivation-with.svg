<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 703.8 328" width="703.8" height="328">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="703.8" height="328" fill="white"/>
  <text x="351.9" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">With pure + bind: nested binds = nested loops; one bind per Cartesian axis</text>
  <g transform="translate(0,28) scale(1)">
    <rect x="0" y="0" width="703.8" height="300" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L140,0 L140,12 L130,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="70" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» cartesian</text>
    </g>
    <g class="edge">
      <path d="M214.4,211.0 L254.4,211.0 Q259.4,211.0 259.4,216.0 L259.4,220.0 Q259.4,221.0 260.4,221.0 L261.4,221.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="236.89999999999998" y="205" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">[A]</text>
    </g>
    <g class="edge hof-edge">
      <path d="M214.4,263.0 L253.4,263.0 Q259.4,263.0 259.4,257.0 L259.4,240.0 Q259.4,239.0 260.4,239.0 L261.4,239.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M401.4,230.0 L509.4,230.0 Q515.4,230.0 515.4,224.0 L515.4,172.0 L515.4,172.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="460.4" y="224" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">[(A, B)]</text>
    </g>
    <g class="edge">
      <path d="M214.4,59.0 L261.4,59.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="241.89999999999998" y="53" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">[B]</text>
    </g>
    <g class="edge hof-edge">
      <path d="M214.4,111.0 L253.4,111.0 Q259.4,111.0 259.4,105.0 L259.4,78.0 Q259.4,77.0 260.4,77.0 L261.4,77.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M401.4,172.0 L513.4,172.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="465.4" y="166" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">(via inner bind)</text>
    </g>
    <g class="action-node">
      <title>&gt;&gt;= : applies outerFn to every element of xs and concatenates the results.</title>
      <rect x="277.4" y="208" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="337.4" y="230" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bindOuter</text>
      <g class="pin pin-in">
        <rect x="273.4" y="218.66666666666666" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="283.4" y="222.66666666666666" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">ma</text>
      </g>
      <g class="pin pin-in">
        <rect x="273.4" y="233.33333333333334" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="283.4" y="237.33333333333334" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="393.4" y="226" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>&gt;&gt;= : the inner bind that lives inside outerFn — applies innerFn to every element of ys.</title>
      <rect x="277.4" y="46" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="337.4" y="68" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bindInner</text>
      <g class="pin pin-in">
        <rect x="273.4" y="56.666666666666664" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="283.4" y="60.666666666666664" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">ma</text>
      </g>
      <g class="pin pin-in">
        <rect x="273.4" y="71.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="283.4" y="75.33333333333333" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="393.4" y="64" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>pure : (A, B) → [(A, B)]. Lifts the single pair (x, y) into a singleton list.</title>
      <rect x="277.4" y="150" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="337.4" y="172" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">purePair</text>
      <g class="pin pin-in">
        <rect x="273.4" y="168" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="283.4" y="172" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">a</text>
      </g>
      <g class="pin pin-out">
        <rect x="393.4" y="168" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="object-node">
      <title>[A] — first list. Outer iteration.</title>
      <rect x="104.4" y="192" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="159.4" y="211" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">xs : [A]</text>
    </g>
    <g class="object-node">
      <title>[B] — second list. Inner iteration (under each x).</title>
      <rect x="104.4" y="40" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="159.4" y="59" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ys : [B]</text>
    </g>
    <g class="object-node hof">
      <title>λx. ys &gt;&gt;= λy. pure (x, y). HOF argument to the outer bind — its input is A, not [A].</title>
      <rect x="36" y="244" width="178.4" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="125.2" y="256" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="125.2" y="270" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">outerFn : A ⟶ [(A, B)]</text>
    </g>
    <g class="object-node hof">
      <title>λy. pure (x, y). HOF argument to the inner bind — captures x from outerFn's scope.</title>
      <rect x="36" y="92" width="178.4" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="125.2" y="104" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="125.2" y="118" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">innerFn : B ⟶ [(A, B)]</text>
    </g>
    <g class="object-node">
      <title>[(A, B)] — the Cartesian product as a flat list. One more axis = one more bind line.</title>
      <rect x="525.4" y="153" width="142.4" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="596.6" y="172" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">result : [(A, B)]</text>
    </g>
  </g>
</svg>
