<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 715.2 350" width="715.2" height="350">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="715.2" height="350" fill="white"/>
  <text x="357.6" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">(&gt;&gt;=) :: Reader r a ⟶ (a ⟶ Reader r b) ⟶ Reader r b</text>
  <g transform="translate(0,28)">
    <rect x="0" y="0" width="715.2" height="322" rx="4" fill="#f8f8ff" stroke="#6666c0" stroke-width="2"/>
    <text x="357.6" y="18" text-anchor="middle" font-size="12" font-weight="bold" font-family="sans-serif" fill="#333">«block» ReaderBindContext</text>
    <g class="edge">
      <path d="M268.4,213.0 L273.4,213.0 Q278.4,213.0 278.4,208.0 L278.4,178.0 Q278.4,172.0 284.4,172.0 L296.4,172.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge hof-edge">
      <path d="M268.4,161.0 L296.4,161.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M268.4,109.0 L273.4,109.0 Q278.4,109.0 278.4,114.0 L278.4,144.0 Q278.4,150.0 284.4,150.0 L296.4,150.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M428.4,161.0 L456.4,161.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="object-node">
      <title>Reader r a — a computation waiting for env r; when run with r it produces a</title>
      <rect x="111.6" y="194" width="156.8" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="190" y="213" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ra_val : Reader r a</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ Reader r b) — continuation: given a, produces a new computation waiting for r</title>
      <rect x="89.99999999999999" y="142" width="178.4" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="179.2" y="154" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="179.2" y="168" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f_val : a ⟶ Reader r b</text>
    </g>
    <g class="object-node">
      <title>r — the shared read-only environment. bind supplies THE SAME r to ra and to f(a). It is never modified.</title>
      <rect x="158.4" y="90" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="213.4" y="109" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">r_env : r</text>
    </g>
    <g class="action-node">
      <title>bind ra f = \\r -&gt; f (ra r) r\nRun ra with env r to get a. Pass a to f. Run f(a) with the SAME env r.</title>
      <rect x="308.4" y="139" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="368.4" y="161" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bind : ReaderBindOp</text>
    </g>
    <g class="object-node">
      <title>Reader r b — the composed computation; when run with r it produces b</title>
      <rect x="468.4" y="142" width="156.8" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="546.8" y="161" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">rb_val : Reader r b</text>
    </g>
  </g>
</svg>
