<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 686.4 350" width="686.4" height="350">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#424242" stroke-width="1.5"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="686.4" height="350" fill="white"/>
  <text x="343.2" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">(&gt;&gt;=) :: Parser a ⟶ (a ⟶ Parser b) ⟶ Parser b</text>
  <g transform="translate(0,28)">
    <rect x="0" y="0" width="686.4" height="322" rx="4" fill="#f8f8ff" stroke="#6666c0" stroke-width="2"/>
    <text x="343.2" y="18" text-anchor="middle" font-size="12" font-weight="bold" font-family="sans-serif" fill="#333">«block» ParserBindContext</text>
    <g class="edge">
      <path d="M254.0,213.0 L264.0,213.0 L264.0,172.0 L283.5,172.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge hof-edge">
      <path d="M254.0,161.0 L283.5,161.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M254.0,109.0 L264.0,109.0 L264.0,150.0 L283.5,150.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M414.0,161.0 L443.5,161.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="object-node">
      <title>Parser a = String ⟶ Maybe (a, String) — run on input; succeeds with (a, rest) or fails with Nothing</title>
      <rect x="111.60000000000001" y="194" width="142.4" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="182.8" y="213" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">pa_val : Parser a</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ Parser b) — given parsed value a, constructs the next parser (runs on the remaining input)</title>
      <rect x="90" y="142" width="164" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="172" y="154" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="172" y="168" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f_val : a ⟶ Parser b</text>
    </g>
    <g class="object-node">
      <title>String — the unconsumed remainder after pa_val runs. bind threads it into f(a). Nothing short-circuits (like Maybe).</title>
      <rect x="140.39999999999998" y="90" width="113.60000000000001" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="197.2" y="109" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">rest : String</text>
    </g>
    <g class="action-node">
      <title>bind p f = \\input -&gt;\n  case p(input) of\n    Nothing       -&gt; Nothing        -- propagate failure\n    Just (a, rest) -&gt; f a rest      -- thread rest into next parser</title>
      <rect x="294" y="139" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="354" y="161" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bind : ParserBindOp</text>
    </g>
    <g class="object-node">
      <title>Parser b — the composed parser; on success returns (b, rest2) where rest2 is what f(a) didn't consume</title>
      <rect x="454.00000000000006" y="142" width="142.4" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="525.2" y="161" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">pb_val : Parser b</text>
    </g>
  </g>
</svg>
