<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 646.4 246" width="646.4" height="246">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="646.4" height="246" fill="white"/>
  <text x="323.2" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">bind :: Parser a ⟶ (a ⟶ Parser b) ⟶ Parser b</text>
  <text x="323.2" y="35" text-anchor="middle" font-size="11" font-weight="normal" font-family="sans-serif" fill="#555">also called: flatMap, Bind, &gt;&gt;=</text>
  <g transform="translate(0,44)">
    <rect x="0" y="0" width="646.4" height="202" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-block">
      <path d="M0,0 L171,0 L171,12 L161,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="85.5" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«block» ParserBindContext</text>
    </g>
    <g class="edge">
      <path d="M234.0,153.0 L239.0,153.0 Q244.0,153.0 244.0,148.0 L244.0,118.0 Q244.0,112.0 250.0,112.0 L262.0,112.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge hof-edge">
      <path d="M234.0,101.0 L262.0,101.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M234.0,49.0 L239.0,49.0 Q244.0,49.0 244.0,54.0 L244.0,84.0 Q244.0,90.0 250.0,90.0 L262.0,90.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M394.0,101.0 L422.0,101.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="object-node">
      <title>Parser a = String ⟶ Maybe (a, String) — run on input; succeeds with (a, rest) or fails with Nothing</title>
      <rect x="91.60000000000001" y="134" width="142.4" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="162.8" y="153" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">pa_val : Parser a</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ Parser b) — given parsed value a, constructs the next parser (runs on the remaining input)</title>
      <rect x="70" y="82" width="164" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="152" y="94" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="152" y="108" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f_val : a ⟶ Parser b</text>
    </g>
    <g class="object-node">
      <title>String — the unconsumed remainder after pa_val runs. bind threads it into f(a). Nothing short-circuits (like Maybe).</title>
      <rect x="120.39999999999998" y="30" width="113.60000000000001" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="177.2" y="49" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">rest : String</text>
    </g>
    <g class="action-node">
      <title>bind p f = \\input -&gt;\n  case p(input) of\n    Nothing       -&gt; Nothing        -- propagate failure\n    Just (a, rest) -&gt; f a rest      -- thread rest into next parser</title>
      <rect x="274" y="79" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="334" y="101" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bind : ParserBindOp</text>
    </g>
    <g class="object-node">
      <title>Parser b — the composed parser; on success returns (b, rest2) where rest2 is what f(a) didn't consume</title>
      <rect x="434" y="82" width="142.4" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="505.2" y="101" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">pb_val : Parser b</text>
    </g>
  </g>
</svg>
