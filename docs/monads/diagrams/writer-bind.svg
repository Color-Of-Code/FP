    </g>
    <g class="edge hof-edge">
      <path d="M490.0,128.0 L495.0,128.0 Q500.0,128.0 500.0,123.0 L500.0,97.0 Q500.0,91.0 506.0,91.0 L522.0,91.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
