      <path d="M324.0,130.0 L336.0,130.0 Q342.0,130.0 342.0,124.0 L342.0,74.0 Q342.0,68.0 348.0,68.0 L504.0,68.0 Q510.0,68.0 510.0,74.0 L510.0,87.0 Q510.0,93.0 516.0,93.0 L536.0,93.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowOpen)" stroke-dasharray="6,4"/>
