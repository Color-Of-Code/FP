  <g class="action-node"><title>Pattern-match the pair: extract a (for f) and w1 (for the log combiner)</title>
    <rect x="196.0" y="187.0" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
