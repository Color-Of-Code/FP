    </g>
    <g class="action-node">
      <title>Pattern-match the pair: extract a (for f) and w1 (for the log combiner)</title>
      <rect x="204" y="93" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="264" y="115" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">extract</text>
      <g class="pin pin-in">
        <rect x="200" y="111" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="210" y="115" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">wa</text>
      </g>
      <g class="pin pin-out">
        <rect x="320" y="103.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="318" y="107.66666666666667" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">a_val</text>
      </g>
      <g class="pin pin-out">
        <rect x="320" y="118.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="318" y="122.33333333333333" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">w1</text>
      </g>
    </g>
    <g class="action-node">
      <title>Apply f(a): produces (b, w2) — the result value b and a new log fragment w2</title>
      <rect x="548" y="86" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="608" y="108" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">apply</text>
      <g class="pin pin-in">
        <rect x="544" y="96.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="554" y="100.66666666666667" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">a_val</text>
      </g>
      <g class="pin pin-in">
        <rect x="544" y="111.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="554" y="115.33333333333333" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="664" y="96.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="662" y="100.66666666666667" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">b_val</text>
      </g>
      <g class="pin pin-out">
        <rect x="664" y="111.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="662" y="115.33333333333333" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">w2</text>
      </g>
    </g>
    <g class="action-node">
      <title>Return (b, w1 &lt;&gt; w2) — result b with both log fragments combined using monoid append</title>
      <rect x="874" y="144" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="934" y="166" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">combine</text>
      <g class="pin pin-in">
        <rect x="870" y="151" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="880" y="155" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">b_val</text>
      </g>
      <g class="pin pin-in">
        <rect x="870" y="162" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="880" y="166" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">w1</text>
      </g>
      <g class="pin pin-in">
        <rect x="870" y="173" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="880" y="177" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">w2</text>
      </g>
      <g class="pin pin-out">
        <rect x="990" y="162" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="988" y="166" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">result</text>
      </g>
    </g>
    <g class="object-node">
      <title>(a, w1) — result a paired with the first log fragment w1</title>
      <rect x="46" y="96" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="101" y="115" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">wa : (a, w1)</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ (b, w2)) — the continuation; produces result b AND a new log fragment w2</title>
      <rect x="372" y="137" width="128" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="436" y="149" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="436" y="163" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ (b, w2)</text>
    </g>
    <g class="object-node">
      <title>a — the value to pass to f</title>
      <rect x="381" y="85" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="436" y="104" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">a_val : a</text>
    </g>
    <g class="object-node">
      <title>w — the first log fragment. Flows DIRECTLY to combine, bypassing apply. It must not be dropped.</title>
      <rect x="553" y="172" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="608" y="191" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">w1 : w</text>
    </g>
    <g class="object-node">
      <title>b — the result value from f(a)</title>
      <rect x="716" y="137" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="771" y="156" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">b_val : b</text>
    </g>
    <g class="object-node">
      <title>w — the second log fragment, produced by f(a). Combined with w1 from the first step.</title>
      <rect x="716" y="208" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="771" y="227" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">w2 : w</text>
    </g>
    <g class="object-node">
      <title>(b, w1&lt;&gt;w2) — the final result: value b and the complete accumulated log</title>
      <rect x="1042" y="147" width="164" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1124" y="166" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">result : (b, w1&lt;&gt;w2)</text>
    </g>
  </g>
