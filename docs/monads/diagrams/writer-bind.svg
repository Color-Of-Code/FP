    <rect x="192.0" y="205.0" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="202.0" y="209.0" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">wa</text>
    <rect x="312.0" y="197.7" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
