    <text x="310.0" y="216.3" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">w1</text>
  </g>
  <g class="action-node"><title>Apply f(a): produces (b, w2) — the result value b and a new log fragment w2</title>
