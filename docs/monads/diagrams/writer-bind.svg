    <text x="638.0" y="112.3" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">w2</text>
  </g>
  <g class="action-node"><title>Return (b, w1 &lt;&gt; w2) — result b with both log fragments combined using monoid append</title>
    <rect x="834.0" y="127.0" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="894.0" y="149.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">combine</text>
    <rect x="830.0" y="134.0" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="840.0" y="138.0" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">b_val</text>
    <rect x="830.0" y="145.0" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="840.0" y="149.0" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">w1</text>
    <rect x="830.0" y="156.0" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="840.0" y="160.0" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">w2</text>
    <rect x="950.0" y="145.0" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="948.0" y="149.0" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">result</text>
  </g>
  <g class="object-node"><title>(a, w1) — result a paired with the first log fragment w1</title>
    <rect x="46.0" y="190.0" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="101.0" y="209.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">wa : (a, w1)</text>
  </g>
  <g class="object-node hof"><title>(a ⟶ (b, w2)) — the continuation; produces result b AND a new log fragment w2</title>
    <rect x="356.0" y="68.0" width="128" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
    <text x="420.0" y="80.0" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
    <text x="420.0" y="94.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ (b, w2)</text>
  </g>
  <g class="object-node"><title>a — the value to pass to f</title>
    <rect x="365.0" y="226.0" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="420.0" y="245.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">a_val : a</text>
  </g>
  <g class="object-node"><title>w — the first log fragment. Flows DIRECTLY to combine, bypassing apply. It must not be dropped.</title>
    <rect x="684.0" y="190.0" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="739.0" y="209.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">w1 : w</text>
  </g>
  <g class="object-node"><title>b — the result value from f(a)</title>
    <rect x="684.0" y="138.0" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="739.0" y="157.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">b_val : b</text>
  </g>
  <g class="object-node"><title>w — the second log fragment, produced by f(a). Combined with w1 from the first step.</title>
    <rect x="684.0" y="86.0" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="739.0" y="105.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">w2 : w</text>
  </g>
  <g class="object-node"><title>(b, w1&lt;&gt;w2) — the final result: value b and the complete accumulated log</title>
    <rect x="994.0" y="130.0" width="164" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="1076.0" y="149.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">result : (b, w1&lt;&gt;w2)</text>
  </g>
</g>
