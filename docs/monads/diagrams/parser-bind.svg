      <text x="208.4" y="81" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">f skipped</text>
    </g>
    <g class="edge">
      <path d="M334.8,194.0 L352.8,194.0 L352.8,126.0 L528.0,126.0 L528.0,151.0 L555.5,151.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowOpen)" stroke-dasharray="6,4"/>
    </g>
    <g class="edge">
      <path d="M686.0,176.0 L857.6,176.0 L857.6,201.0 L885.1,201.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowOpen)" stroke-dasharray="6,4"/>
    </g>
    <g class="action-node">
      <title>Run pa(input): on success produces (a, rest); on failure produces Nothing</title>
      <rect x="214.8" y="154" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="274.8" y="176" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">run_pa</text>
      <g class="pin pin-in">
        <rect x="210.8" y="164.66666666666666" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="220.8" y="168.66666666666666" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">pa</text>
      </g>
      <g class="pin pin-in">
        <rect x="210.8" y="179.33333333333334" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="220.8" y="183.33333333333334" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">input</text>
      </g>
      <g class="pin pin-out">
        <rect x="330.8" y="161" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="328.8" y="165" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">a_val</text>
      </g>
      <g class="pin pin-out">
        <rect x="330.8" y="172" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="328.8" y="176" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">rest</text>
      </g>
      <g class="pin pin-out">
        <rect x="330.8" y="183" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="328.8" y="187" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">fail</text>
      </g>
    </g>
    <g class="action-node">
      <title>Apply f(a): build Parser b from the parsed value a</title>
      <rect x="566" y="144" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="626" y="166" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">apply_f</text>
      <g class="pin pin-in">
        <rect x="562" y="154.66666666666666" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="572" y="158.66666666666666" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">a_val</text>
      </g>
      <g class="pin pin-in">
        <rect x="562" y="169.33333333333334" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="572" y="173.33333333333334" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="682" y="162" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="680" y="166" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">pb</text>
      </g>
    </g>
    <g class="action-node">
      <title>Run pb(rest): parse b from the REMAINING input, not from the original input</title>
      <rect x="895.6" y="194" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="955.6" y="216" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">run_pb</text>
      <g class="pin pin-in">
        <rect x="891.6" y="204.66666666666666" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="901.6" y="208.66666666666666" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">pb</text>
      </g>
      <g class="pin pin-in">
        <rect x="891.6" y="219.33333333333334" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="901.6" y="223.33333333333334" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">rest</text>
      </g>
      <g class="pin pin-out">
        <rect x="1011.6" y="204.66666666666666" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="1009.6" y="208.66666666666666" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">b</text>
      </g>
      <g class="pin pin-out">
        <rect x="1011.6" y="219.33333333333334" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="1009.6" y="223.33333333333334" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">rest2</text>
      </g>
    </g>
    <g class="object-node">
      <title>Parser a — a function String ⟶ Maybe (a, String): consumes a prefix, returns (a, rest) or Nothing</title>
      <rect x="53.199999999999996" y="148" width="113.60000000000001" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="110" y="167" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">pa : Parser a</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ Parser b) — the next parser, built from the parsed value a</title>
      <rect x="382.79999999999995" y="195" width="135.2" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="450.4" y="207" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="450.4" y="221" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ Parser b</text>
    </g>
    <g class="object-node">
      <title>String — the full input. pa consumes a prefix; rest is passed forward (like State monad).</title>
      <rect x="46.00000000000001" y="200" width="120.8" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="106.4" y="219" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">input : String</text>
    </g>
    <g class="object-node">
      <title>a — the parsed value. Passed to f to build the next parser.</title>
      <rect x="395.4" y="143" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="450.4" y="162" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">a_val : a</text>
    </g>
    <g class="object-node">
      <title>String — unconsumed input after pa ran. Flows to run_pb (not input). This is the State-like threading.</title>
      <rect x="569.2" y="228" width="113.60000000000001" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="626" y="247" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">rest : String</text>
    </g>
    <g class="object-node">
      <title>Parser b — the second parser</title>
      <rect x="734" y="193" width="113.60000000000001" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="790.8" y="212" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">pb : Parser b</text>
    </g>
    <g class="object-node">
      <title>b — the final parsed value</title>
      <rect x="1063.6" y="188" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1118.6" y="207" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">b : b</text>
    </g>
    <g class="object-node">
      <title>String — input still unconsumed after both parsers ran</title>
      <rect x="1063.6" y="240" width="120.8" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1124" y="259" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">rest2 : String</text>
    </g>
    <g class="object-node">
      <title>Nothing — pa failed. No (a, rest) was produced.</title>
      <rect x="46" y="68" width="142.4" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="117.2" y="87" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">fail_in : Nothing</text>
    </g>
    <g class="object-node">
      <title>Nothing — propagated unchanged. f is never called. (Same short-circuit as Maybe bind.)</title>
      <rect x="228.39999999999998" y="68" width="149.6" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="303.2" y="87" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">fail_out : Nothing</text>
    </g>
  </g>
</svg>
