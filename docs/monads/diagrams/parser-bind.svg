    <g class="edge">
      <path d="M1023.6,225.0 L1033.6,225.0 L1033.6,259.0 L1053.1,259.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
