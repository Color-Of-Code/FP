    <g class="action-node">
      <title>Run pa(input): on success produces (a, rest); on failure produces Nothing</title>
      <rect x="204.8" y="126" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="264.8" y="148" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">run_pa</text>
      <g class="pin pin-in">
        <rect x="200.8" y="136.66666666666666" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="210.8" y="140.66666666666666" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">pa</text>
      </g>
      <g class="pin pin-in">
        <rect x="200.8" y="151.33333333333334" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="210.8" y="155.33333333333334" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">input</text>
      </g>
      <g class="pin pin-out">
        <rect x="320.8" y="133" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="318.8" y="137" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">a_val</text>
      </g>
      <g class="pin pin-out">
        <rect x="320.8" y="144" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="318.8" y="148" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">rest</text>
      </g>
      <g class="pin pin-out">
        <rect x="320.8" y="155" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="318.8" y="159" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">fail</text>
      </g>
    </g>
    <g class="action-node">
      <title>Apply f(a): build Parser b from the parsed value a</title>
      <rect x="556" y="116" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="616" y="138" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">apply_f</text>
      <g class="pin pin-in">
        <rect x="552" y="126.66666666666666" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="562" y="130.66666666666666" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">a_val</text>
      </g>
      <g class="pin pin-in">
        <rect x="552" y="141.33333333333334" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="562" y="145.33333333333334" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="672" y="134" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="670" y="138" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">pb</text>
      </g>
    </g>
    <g class="action-node">
      <title>Run pb(rest): parse b from the REMAINING input, not from the original input</title>
      <rect x="885.6" y="166" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="945.6" y="188" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">run_pb</text>
      <g class="pin pin-in">
        <rect x="881.6" y="176.66666666666666" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="891.6" y="180.66666666666666" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">pb</text>
      </g>
      <g class="pin pin-in">
        <rect x="881.6" y="191.33333333333334" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="891.6" y="195.33333333333334" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">rest</text>
      </g>
      <g class="pin pin-out">
        <rect x="1001.6" y="176.66666666666666" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="999.6" y="180.66666666666666" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">b</text>
      </g>
      <g class="pin pin-out">
        <rect x="1001.6" y="191.33333333333334" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="999.6" y="195.33333333333334" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">rest2</text>
      </g>
    </g>
    <g class="object-node">
      <title>Parser a — a function String ⟶ Maybe (a, String): consumes a prefix, returns (a, rest) or Nothing</title>
      <rect x="43.199999999999996" y="120" width="113.60000000000001" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="100" y="139" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">pa : Parser a</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ Parser b) — the next parser, built from the parsed value a</title>
      <rect x="372.79999999999995" y="167" width="135.2" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="440.4" y="179" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="440.4" y="193" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ Parser b</text>
    </g>
    <g class="object-node">
      <title>String — the full input. pa consumes a prefix; rest is passed forward (like State monad).</title>
      <rect x="36.00000000000001" y="172" width="120.8" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="96.4" y="191" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">input : String</text>
    </g>
    <g class="object-node">
      <title>a — the parsed value. Passed to f to build the next parser.</title>
      <rect x="385.4" y="115" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="440.4" y="134" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">a_val : a</text>
    </g>
    <g class="object-node">
      <title>String — unconsumed input after pa ran. Flows to run_pb (not input). This is the State-like threading.</title>
      <rect x="559.2" y="200" width="113.60000000000001" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="616" y="219" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">rest : String</text>
    </g>
    <g class="object-node">
      <title>Parser b — the second parser</title>
      <rect x="724" y="165" width="113.60000000000001" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="780.8" y="184" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">pb : Parser b</text>
    </g>
    <g class="object-node">
      <title>b — the final parsed value</title>
      <rect x="1053.6" y="160" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1108.6" y="179" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">b : b</text>
    </g>
    <g class="object-node">
      <title>String — input still unconsumed after both parsers ran</title>
      <rect x="1053.6" y="212" width="120.8" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1114" y="231" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">rest2 : String</text>
    </g>
    <g class="object-node">
      <title>Nothing — pa failed. No (a, rest) was produced.</title>
      <rect x="36" y="40" width="142.4" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="107.2" y="59" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">fail_in : Nothing</text>
    </g>
    <g class="object-node">
      <title>Nothing — propagated unchanged. f is never called. (Same short-circuit as Maybe bind.)</title>
      <rect x="218.39999999999998" y="40" width="149.6" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="293.2" y="59" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">fail_out : Nothing</text>
    </g>
  </g>
</svg>
