    </g>
    <g class="edge">
      <path d="M694.0,160.0 L704.0,160.0 L704.0,212.0 L723.5,212.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
