  <rect width="1230.4" height="352" fill="white"/>
  <text x="615.2" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Parser bind: thread rest to f(a)  |  Nothing → Nothing  (f skipped)</text>
  <g transform="translate(0,28)">
    <rect x="0" y="0" width="1230.4" height="324" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
