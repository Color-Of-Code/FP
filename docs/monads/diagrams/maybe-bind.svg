<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 816 323" width="816" height="323">
<defs>
  <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#424242"/>
  </marker>
  <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10" fill="none" stroke="#424242" stroke-width="1.5"/>
  </marker>
  <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#00796b"/>
  </marker>
</defs>
<rect width="816" height="323" fill="white"/>
<text x="408.0" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Maybe bind: pattern match unwraps Just or short-circuits Nothing</text>
<g transform="translate(0,28)">
  <rect x="0" y="0" width="816" height="295" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
  <g class="activity-frame-tab">
    <path d="M0,0 L109,0 L109,12 L99,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
    <text x="54.5" y="12.0" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» bind</text>
  </g>
  <g class="edge">
    <path d="M156.0,225.3 C156.0,225.3 185.5,225.3 185.5,225.3" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge">
    <path d="M223.5,225.9 C223.5,225.9 262.5,227.8 262.5,227.8" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    <text x="243.6" y="213.9" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">Just a0</text>
  </g>
  <g class="edge">
    <path d="M383.0,221.0 C383.0,221.0 417.5,215.3 417.5,215.3" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge hof-edge">
    <path d="M360.7,197.0 C380.6,197.0 397.6,230.0 417.5,230.0" fill="none" stroke="#00796b" stroke-width="1.5" marker-end="url(#arrowHof)"/>
    
  </g>
  <g class="edge">
    <path d="M556.0,222.7 C556.0,222.7 582.7,219.2 582.7,219.2" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge">
    <path d="M210.0,239.3 C210.0,271.3 451.9,218.7 582.2,218.7" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    <text x="395.4" y="216.0" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">Nothing (: Maybe b)</text>
  </g>
  <g class="edge">
    <path d="M620.0,218.0 C620.0,218.0 649.5,218.0 649.5,218.0" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>


  <g class="action-node"><title>Apply f(a). Returns Maybe b directly — bind never re-wraps. Wrapping is pure's job.</title>
    <rect x="432.0" y="200.7" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="492.0" y="222.7" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">apply_f</text>
    <rect x="428.0" y="211.3" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="438.0" y="215.3" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">a0</text>
    <rect x="428.0" y="226.0" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="438.0" y="230.0" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">f</text>
    <rect x="548.0" y="218.7" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="546.0" y="222.7" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">mb</text>
  </g>
  <g class="object-node"><title>Maybe a — the input value. Either Just a0 or Nothing.</title>
    <rect x="46.0" y="206.3" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="101.0" y="225.3" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ma : Maybe a</text>
  </g>
  <g class="object-node hof"><title>(a ⟶ Maybe b) — the continuation. Only called when ma is Just a0.</title>
    <rect x="264.0" y="159.0" width="128" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
    <text x="328.0" y="171.0" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
    <text x="328.0" y="185.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ Maybe b</text>
  </g>
  <g class="object-node"><title>a0 — the unwrapped payload, extracted by the Just pattern. No separate unwrap action needed.</title>
    <rect x="273.0" y="211.0" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="328.0" y="230.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">a0 : a</text>
  </g>
  <g class="object-node"><title>Maybe b — the single result of bind.</title>
    <rect x="660.0" y="199.0" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="715.0" y="218.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">mb : Maybe b</text>
  </g>
  <g class="decision-node"><title>Pattern match: simultaneously tests the constructor and destructures the payload.\nJust a0 → a0 is available (no separate unwrap step)\nNothing → skip f entirely</title>
    <polygon points="210.0,211.3 224.0,225.3 210.0,239.3 196.0,225.3" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  </g>
  <g class="merge-node"><title>Merge: both paths produce Maybe b (Just-path result or Nothing short-circuit).</title>
    <polygon points="606.0,204.0 620.0,218.0 606.0,232.0 592.0,218.0" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  </g>

</g>
</svg>