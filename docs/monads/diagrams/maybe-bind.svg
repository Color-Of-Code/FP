<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 584 232" width="584" height="232">
<defs>
  <marker id="arrowFilled" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#424242"/>
  </marker>
  <marker id="arrowOpen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10" fill="none" stroke="#424242" stroke-width="1.5"/>
  </marker>
  <marker id="arrowHof" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#00796b"/>
  </marker>
</defs>
<rect width="584" height="232" fill="white"/>
<text x="292.0" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Maybe bind implementation: Just → f(a)  |  Nothing → Nothing  (f skipped)</text>
<g transform="translate(0,28)">
  <rect x="0" y="0" width="584" height="204" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
  <g class="activity-frame-tab">
    <path d="M0,0 L92.8,0 L102.8,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
    <text x="51.4" y="12.0" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» &gt;&gt;=</text>
  </g>
  <g class="edge">
    <path d="M165.0,130.3 C165.0,130.3 214.0,120.3 214.0,120.3" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge hof-edge">
    <path d="M174.0,97.1 C174.0,97.1 214.0,105.7 214.0,105.7" fill="none" stroke="#00796b" stroke-width="1.5" marker-end="url(#arrowHof)"/>
    
  </g>
  <g class="edge">
    <path d="M334.0,120.3 C334.0,120.3 384.8,128.8 384.8,128.8" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    <text x="361.5" y="111.8" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">Just a  →  f(a)</text>
  </g>
  <g class="edge">
    <path d="M334.0,105.7 C334.0,105.7 374.0,98.7 374.0,98.7" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    <text x="351.8" y="89.4" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">Nothing →  Nothing  (f skipped)</text>
  </g>
  <g class="action-node"><title>Pattern match on ma:\n  Just a  → unwrap a, call f(a), return its result\n  Nothing → return Nothing immediately\nf is never called in the Nothing case.</title>
    <rect x="214.0" y="91.0" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="274.0" y="113.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bind</text>
    <rect x="210.0" y="101.7" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="220.0" y="105.7" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">f</text>
    <rect x="210.0" y="116.3" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="220.0" y="120.3" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">ma</text>
    <rect x="330.0" y="101.7" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="328.0" y="105.7" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">mb_nothing</text>
    <rect x="330.0" y="116.3" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="328.0" y="120.3" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">mb_just</text>
  </g>
  <g class="object-node"><title>Maybe a — the monad value. Can be Just a (has a value) or Nothing (absent).</title>
    <rect x="55.0" y="120.0" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="110.0" y="139.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ma : Maybe a</text>
  </g>
  <g class="object-node hof"><title>(a ⟶ Maybe b) — the continuation. Only invoked when ma is Just a.</title>
    <rect x="46.0" y="68.0" width="128" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
    <text x="110.0" y="80.0" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
    <text x="110.0" y="94.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ Maybe b</text>
  </g>
  <g class="object-node"><title>Maybe b — the result of f(unwrapped a). May itself be Just b or Nothing.</title>
    <rect x="384.8" y="120.0" width="142.4" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="456.0" y="139.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">mb_just : Maybe b</text>
  </g>
  <g class="object-node"><title>Nothing — f was NOT called. The absent value propagates unchanged through the entire chain.</title>
    <rect x="374.0" y="68.0" width="164" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="456.0" y="87.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">mb_nothing : Nothing</text>
  </g>
</g>
</svg>