    <text x="325.1" y="101.5" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">Nothing</text>
  </g>
  <g class="edge">
    <path d="M555.5,106.0 C577.4,106.0 596.2,128.8 618.1,128.8" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge">
