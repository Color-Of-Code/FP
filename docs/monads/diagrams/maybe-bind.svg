<rect width="838.4" height="357.5" fill="white"/>
<text x="419.2" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Maybe &gt;&gt;= : pattern match on ma determines the path</text>
<g transform="translate(0,28)">
  <rect x="0" y="0" width="838.4" height="329.5" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
  <g class="activity-frame-tab">
    <path d="M0,0 L102.8,0 L102.8,12 L92.8,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
    <text x="51.4" y="12.0" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» &gt;&gt;=</text>
  </g>
  <g class="edge">
    <path d="M156.0,87.0 C156.0,87.0 185.5,87.0 185.5,87.0" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge">
    <path d="M212.8,98.2 C227.0,98.2 239.3,261.5 253.5,261.5" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    <text x="245.8" y="176.7" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">Just a</text>
  </g>
  <g class="edge">
    <path d="M392.0,261.5 C404.8,261.5 415.9,189.7 428.7,189.7" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge hof-edge">
    <path d="M354.6,151.5 C380.6,151.5 402.8,204.3 428.7,204.3" fill="none" stroke="#00796b" stroke-width="1.5" marker-end="url(#arrowHof)"/>
    
  </g>
  <g class="edge">
    <path d="M567.2,197.0 C583.2,197.0 596.9,96.0 612.9,96.0" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge">
    <path d="M224.0,87.0 C224.0,87.0 421.5,87.0 421.5,87.0" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    <text x="322.8" y="74.0" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">Nothing</text>
  </g>
  <g class="edge">
    <path d="M574.4,87.0 C574.4,87.0 603.9,87.0 603.9,87.0" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge">
    <path d="M642.4,87.0 C642.4,87.0 671.9,87.0 671.9,87.0" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>


  <g class="action-node"><title>Unwrap: extract the a from Just a.</title>
    <rect x="268.0" y="239.5" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="328.0" y="261.5" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">unwrap</text>
    <rect x="264.0" y="257.5" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="274.0" y="261.5" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">ma</text>
    <rect x="384.0" y="257.5" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="382.0" y="261.5" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">a</text>
  </g>
  <g class="action-node"><title>Apply f(a). Returns Maybe b — may itself be Just b or Nothing.</title>
    <rect x="443.2" y="175.0" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="503.2" y="197.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">apply_f</text>
    <rect x="439.2" y="185.7" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="449.2" y="189.7" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">a</text>
    <rect x="439.2" y="200.3" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="449.2" y="204.3" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">f</text>
    <rect x="559.2" y="193.0" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="557.2" y="197.0" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">mb</text>
  </g>
  <g class="object-node"><title>Maybe a — the input value. Either Just a or Nothing.</title>
    <rect x="46.0" y="68.0" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="101.0" y="87.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ma : Maybe a</text>
  </g>
  <g class="object-node hof"><title>(a ⟶ Maybe b) — the continuation. Only called when ma is Just a.</title>
    <rect x="264.0" y="113.5" width="128" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
    <text x="328.0" y="125.5" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
    <text x="328.0" y="139.5" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ Maybe b</text>
  </g>
  <g class="object-node"><title>Nothing — propagated unchanged. f is never called.</title>
    <rect x="432.0" y="68.0" width="142.4" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="503.2" y="87.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">nothing : Nothing</text>
  </g>
  <g class="object-node"><title>Maybe b — the single result of bind.</title>
    <rect x="682.4" y="68.0" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="737.4" y="87.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">mb : Maybe b</text>
  </g>
  <g class="decision-node"><title>Pattern match: is ma = Just a  or  Nothing?</title>
    <polygon points="210.0,73.0 224.0,87.0 210.0,101.0 196.0,87.0" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  </g>
  <g class="merge-node"><title>Merge: both paths produce Maybe b (Just-path result or Nothing).</title>
    <polygon points="628.4,73.0 642.4,87.0 628.4,101.0 614.4,87.0" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  </g>

</g>
</svg>