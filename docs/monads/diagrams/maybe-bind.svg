<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 832 263" width="832" height="263">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#424242" stroke-width="1.5"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="832" height="263" fill="white"/>
  <text x="416" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Maybe bind: pattern match unwraps Just or short-circuits Nothing</text>
  <g transform="translate(0,28)">
    <rect x="0" y="0" width="832" height="235" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="activity-frame-tab">
      <path d="M0,0 L109,0 L109,12 L99,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="54.5" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» bind</text>
    </g>
    <g class="edge">
      <path d="M156.0,87.0 L185.5,87.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M224.0,92.0 L234.0,92.0 L234.0,118.0 L262.5,118.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="253.5" y="112" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">Just a0</text>
    </g>
    <g class="edge">
      <path d="M383.0,118.0 L421.5,118.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge hof-edge">
      <path d="M392.0,170.0 L402.0,170.0 L402.0,136.0 L421.5,136.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M568.0,127.0 L578.0,127.0 L578.0,92.0 L597.5,92.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M224.0,82.0 L597.5,82.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="416" y="76" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">Nothing (: Maybe b)</text>
    </g>
    <g class="edge">
      <path d="M636.0,87.0 L665.5,87.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="action-node">
      <title>Apply f(a). Returns Maybe b directly — bind never re-wraps. Wrapping is pure's job.</title>
      <rect x="440" y="105" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="500" y="127" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">apply_f</text>
      <g class="pin pin-in">
        <rect x="436" y="115.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="446" y="119.66666666666667" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">a0</text>
      </g>
      <g class="pin pin-in">
        <rect x="436" y="130.33333333333334" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="446" y="134.33333333333334" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="556" y="123" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="554" y="127" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">mb</text>
      </g>
    </g>
    <g class="object-node">
      <title>Maybe a — the input value. Either Just a0 or Nothing.</title>
      <rect x="46" y="68" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="101" y="87" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ma : Maybe a</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ Maybe b) — the continuation. Only called when ma is Just a0.</title>
      <rect x="264" y="151" width="128" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="328" y="163" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="328" y="177" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ Maybe b</text>
    </g>
    <g class="object-node">
      <title>a0 — the unwrapped payload, extracted by the Just pattern. No separate unwrap action needed.</title>
      <rect x="273" y="99" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="328" y="118" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">a0 : a</text>
    </g>
    <g class="object-node">
      <title>Maybe b — the single result of bind.</title>
      <rect x="676" y="68" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="731" y="87" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">mb : Maybe b</text>
    </g>
    <g class="decision-node">
      <title>Pattern match: simultaneously tests the constructor and destructures the payload.\nJust a0 → a0 is available (no separate unwrap step)\nNothing → skip f entirely</title>
      <polygon points="210,73 224,87 210,101 196,87" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
    </g>
    <g class="merge-node">
      <title>Merge: both paths produce Maybe b (Just-path result or Nothing short-circuit).</title>
      <polygon points="622,73 636,87 622,101 608,87" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
    </g>
  </g>
</svg>
