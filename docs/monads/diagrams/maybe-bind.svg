  </g>
  <g class="action-node"><title>Unwrap: extract the a from Just a.</title>
    <rect x="268.0" y="165.5" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="328.0" y="187.5" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">unwrap</text>
    <rect x="264.0" y="183.5" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="274.0" y="187.5" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">ma</text>
    <rect x="384.0" y="183.5" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="382.0" y="187.5" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">a</text>
  </g>
  <g class="action-node"><title>Apply f(a). Returns Maybe b — may itself be Just b or Nothing.</title>
    <rect x="443.2" y="138.0" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="503.2" y="160.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">apply_f</text>
    <rect x="439.2" y="148.7" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="449.2" y="152.7" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">a</text>
    <rect x="439.2" y="163.3" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="449.2" y="167.3" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">f</text>
    <rect x="559.2" y="156.0" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="557.2" y="160.0" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">mb</text>
  </g>
  <g class="object-node"><title>Maybe a — the input value. Either Just a or Nothing.</title>
    <rect x="46.0" y="113.5" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="101.0" y="132.5" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ma : Maybe a</text>
  </g>
  <g class="object-node hof"><title>(a ⟶ Maybe b) — the continuation. Only called when ma is Just a.</title>
    <rect x="264.0" y="113.5" width="128" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
    <text x="328.0" y="125.5" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
    <text x="328.0" y="139.5" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ Maybe b</text>
  </g>
  <g class="object-node"><title>Nothing — propagated unchanged. f is never called.</title>
    <rect x="432.0" y="68.0" width="142.4" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="503.2" y="87.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">nothing : Nothing</text>
  </g>
  <g class="object-node"><title>Maybe b — the single result of bind.</title>
    <rect x="682.4" y="113.5" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="737.4" y="132.5" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">mb : Maybe b</text>
  </g>
  <g class="decision-node"><title>Pattern match: is ma = Just a  or  Nothing?</title>
    <polygon points="210.0,118.5 224.0,132.5 210.0,146.5 196.0,132.5" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  </g>
  <g class="merge-node"><title>Merge: both paths produce Maybe b (Just-path result or Nothing).</title>
    <polygon points="628.4,118.5 642.4,132.5 628.4,146.5 614.4,132.5" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  </g>
</g>
