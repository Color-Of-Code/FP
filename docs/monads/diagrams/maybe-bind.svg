    <text x="51.4" y="12.0" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» &gt;&gt;=</text>
  </g>
  <g class="edge">
    <path d="M156.0,132.5 C156.0,132.5 196.0,132.5 196.0,132.5" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
