    <text x="253.2" y="153.2" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">Just a</text>
  </g>
  <g class="edge">
    <path d="M388.0,187.5 C407.3,187.5 423.9,167.3 443.2,167.3" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge hof-edge">
    <path d="M392.0,142.5 C392.0,142.5 443.2,152.7 443.2,152.7" fill="none" stroke="#00796b" stroke-width="1.5" marker-end="url(#arrowHof)"/>
    
  </g>
  <g class="edge">
    <path d="M563.2,160.0 C582.0,160.0 598.1,135.0 616.9,135.0" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge">
