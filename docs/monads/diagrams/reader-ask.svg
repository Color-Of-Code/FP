  <rect width="478" height="146" fill="white"/>
  <text x="239" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">ask :: Reader r r   (return the environment as the result)</text>
  <text x="239" y="35" text-anchor="middle" font-size="11" font-weight="normal" font-family="sans-serif" fill="#555">primitive</text>
  <g transform="translate(55,44)">
    <rect x="0" y="0" width="368" height="102" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L102.8,0 L102.8,12 L92.8,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="51.4" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» ask</text>
    </g>
    <g class="edge">
      <path d="M160.0,62.0 L192.0,62.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="184" y="56" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">\\r -&gt; r</text>
    </g>
    <g class="action-node">
      <title>Ask: build the function \\r -&gt; r — when run, returns the environment unchanged.</title>
      <rect x="36" y="40" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="96" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ask</text>
