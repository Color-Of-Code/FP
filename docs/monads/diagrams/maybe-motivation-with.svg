    </g>
    <g class="edge">
      <path d="M1330.8,90.0 C1330.8,90.0 1356.3,90.0 1356.3,90.0" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
      <text x="1343.5500000000002" y="77" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">&gt;&gt;= bind</text>
