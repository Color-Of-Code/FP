  <rect width="1826.4" height="186" fill="white"/>
  <text x="913.2" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">With Maybe: bind short-circuits on Nothing automatically</text>
  <g transform="translate(0,28)">
    <rect x="0" y="0" width="1826.4" height="158" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="activity-frame-tab">
      <path d="M0,0 L171,0 L171,12 L161,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="85.5" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» lookupUserCity</text>
    </g>
    <g class="edge">
      <path d="M174.0,90.0 L206.0,90.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M346.0,90.0 L378.0,90.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M568.4,90.0 L600.4,90.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="588.4" y="84" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">&gt;&gt;= bind</text>
    </g>
    <g class="edge">
      <path d="M740.4,90.0 L772.4,90.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M984.4,90.0 L1016.4,90.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="1004.4000000000001" y="84" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">&gt;&gt;= bind</text>
    </g>
    <g class="edge">
      <path d="M1156.4,90.0 L1188.4,90.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M1378.8,90.0 L1410.8,90.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="1398.8000000000002" y="84" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">&gt;&gt;= bind</text>
    </g>
    <g class="edge">
      <path d="M1550.8,90.0 L1582.8,90.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="action-node">
      <title>find_user(id) → Maybe User.  Returns Just user or Nothing.</title>
      <rect x="222" y="68" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="282" y="90" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">findUser</text>
      <g class="pin pin-in">
        <rect x="218" y="86" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="228" y="90" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">userId</text>
      </g>
      <g class="pin pin-out">
        <rect x="338" y="86" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="336" y="90" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">result</text>
      </g>
    </g>
    <g class="action-node">
      <title>find_address(user.address_id) → Maybe Address.\nbind skips this entirely if findUser returned Nothing.</title>
      <rect x="616.4" y="68" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="676.4" y="90" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">findAddress</text>
      <g class="pin pin-in">
        <rect x="612.4" y="86" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="622.4" y="90" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">user</text>
      </g>
      <g class="pin pin-out">
        <rect x="732.4" y="86" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="730.4" y="90" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">result</text>
      </g>
    </g>
    <g class="action-node">
      <title>find_city(address.city_id) → Maybe City.\nbind skips this if any earlier step was Nothing.</title>
      <rect x="1032.4" y="68" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="1092.4" y="90" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">findCity</text>
      <g class="pin pin-in">
        <rect x="1028.4" y="86" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="1038.4" y="90" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">address</text>
      </g>
      <g class="pin pin-out">
        <rect x="1148.4" y="86" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="1146.4" y="90" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">result</text>
      </g>
    </g>
    <g class="action-node">
      <title>pure(city.name) → Maybe String.  Lifts the plain String into Maybe.</title>
      <rect x="1426.8000000000002" y="68" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="1486.8000000000002" y="90" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">liftName</text>
      <g class="pin pin-in">
        <rect x="1422.8000000000002" y="86" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="1432.8000000000002" y="90" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">city</text>
      </g>
      <g class="pin pin-out">
        <rect x="1542.8000000000002" y="86" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="1540.8000000000002" y="90" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">result</text>
      </g>
    </g>
    <g class="object-node">
      <title>The input: a user ID to look up.</title>
      <rect x="46" y="71" width="128" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="110" y="90" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">userId : UserId</text>
    </g>
    <g class="object-node">
      <title>Maybe User — Just the user record, or Nothing.</title>
      <rect x="390" y="71" width="178.4" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="479.2" y="90" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">maybeUser : Maybe User</text>
    </g>
    <g class="object-node">
      <title>Maybe Address — Just the address, or Nothing propagated from above.</title>
      <rect x="784.4" y="71" width="200" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="884.4" y="90" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">maybeAddr : Maybe Address</text>
    </g>
    <g class="object-node">
      <title>Maybe City — Just the city, or Nothing propagated from above.</title>
      <rect x="1200.4" y="71" width="178.4" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1289.6000000000001" y="90" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">maybeCity : Maybe City</text>
    </g>
    <g class="object-node">
      <title>Maybe String — Just city.name on success; Nothing if any step failed.\nNo explicit null checks anywhere in this chain.</title>
      <rect x="1594.8000000000002" y="71" width="185.6" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1687.6000000000001" y="90" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">cityName : Maybe String</text>
    </g>
  </g>
</svg>
