      <path d="M1494.8,90.0 C1494.8,90.0 1520.3,90.0 1520.3,90.0" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="action-node">
      <title>find_user(id) → Maybe User.  Returns Just user or Nothing.</title>
      <rect x="214" y="68" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="274" y="90" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">findUser</text>
      <g class="pin pin-in">
        <rect x="210" y="86" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="220" y="90" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">userId</text>
      </g>
      <g class="pin pin-out">
        <rect x="330" y="86" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="328" y="90" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">result</text>
      </g>
    </g>
    <g class="action-node">
      <title>find_address(user.address_id) → Maybe Address.\nbind skips this entirely if findUser returned Nothing.</title>
      <rect x="592.4" y="68" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="652.4" y="90" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">findAddress</text>
      <g class="pin pin-in">
        <rect x="588.4" y="86" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="598.4" y="90" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">user</text>
      </g>
      <g class="pin pin-out">
        <rect x="708.4" y="86" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="706.4" y="90" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">result</text>
      </g>
    </g>
    <g class="action-node">
      <title>find_city(address.city_id) → Maybe City.\nbind skips this if any earlier step was Nothing.</title>
      <rect x="992.4000000000001" y="68" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="1052.4" y="90" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">findCity</text>
      <g class="pin pin-in">
        <rect x="988.4000000000001" y="86" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="998.4000000000001" y="90" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">address</text>
      </g>
      <g class="pin pin-out">
        <rect x="1108.4" y="86" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="1106.4" y="90" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">result</text>
      </g>
    </g>
    <g class="action-node">
      <title>pure(city.name) → Maybe String.  Lifts the plain String into Maybe.</title>
      <rect x="1370.8000000000002" y="68" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="1430.8000000000002" y="90" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">liftName</text>
      <g class="pin pin-in">
        <rect x="1366.8000000000002" y="86" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="1376.8000000000002" y="90" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">city</text>
      </g>
      <g class="pin pin-out">
        <rect x="1486.8000000000002" y="86" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="1484.8000000000002" y="90" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">result</text>
      </g>
    </g>
    <g class="object-node">
      <title>The input: a user ID to look up.</title>
      <rect x="46" y="71" width="128" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="110" y="90" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">userId : UserId</text>
    </g>
    <g class="object-node">
      <title>Maybe User — Just the user record, or Nothing.</title>
      <rect x="374" y="71" width="178.4" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="463.2" y="90" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">maybeUser : Maybe User</text>
    </g>
    <g class="object-node">
      <title>Maybe Address — Just the address, or Nothing propagated from above.</title>
      <rect x="752.4" y="71" width="200" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="852.4" y="90" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">maybeAddr : Maybe Address</text>
    </g>
    <g class="object-node">
      <title>Maybe City — Just the city, or Nothing propagated from above.</title>
      <rect x="1152.4" y="71" width="178.4" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1241.6000000000001" y="90" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">maybeCity : Maybe City</text>
    </g>
    <g class="object-node">
      <title>Maybe String — Just city.name on success; Nothing if any step failed.\nNo explicit null checks anywhere in this chain.</title>
      <rect x="1530.8000000000002" y="71" width="185.6" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1623.6000000000001" y="90" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">cityName : Maybe String</text>
    </g>
