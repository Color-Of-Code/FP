    <rect x="1530.8" y="71.0" width="185.6" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="1623.6" y="90.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">cityName : Maybe String</text>
