    <text x="110.0" y="90.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">userId : UserId</text>
  </g>
  <g class="object-node"><title>Maybe User — Just the user record, or Nothing.</title>
    <rect x="374.0" y="71.0" width="178.4" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="463.2" y="90.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">maybeUser : Maybe User</text>
  </g>
  <g class="object-node"><title>Maybe Address — Just the address, or Nothing propagated from above.</title>
    <rect x="752.4" y="71.0" width="200" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="852.4" y="90.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">maybeAddr : Maybe Address</text>
  </g>
