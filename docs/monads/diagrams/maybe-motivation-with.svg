  <rect width="1762.4" height="186" fill="white"/>
  <text x="881.2" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">With Maybe: bind short-circuits on Nothing automatically</text>
  <g transform="translate(0,28)">
