<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 715.2 298" width="715.2" height="298">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="715.2" height="298" fill="white"/>
  <text x="357.6" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">(&gt;&gt;=) :: Either e a ⟶ (a ⟶ Either e b) ⟶ Either e b</text>
  <g transform="translate(0,28)">
    <rect x="0" y="0" width="715.2" height="270" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-block">
      <path d="M0,0 L171,0 L171,12 L161,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="85.5" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«block» EitherBindContext</text>
    </g>
    <g class="edge">
      <path d="M268.4,161.0 L273.4,161.0 Q278.4,161.0 278.4,156.0 L278.4,129.0 Q278.4,123.0 284.4,123.0 L296.4,123.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge hof-edge">
      <path d="M268.4,109.0 L296.4,109.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M428.4,116.0 L456.4,116.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="object-node">
      <title>Either e a — Right a (carry a) or Left e (carry error e). Unlike Maybe, the error value is preserved.</title>
      <rect x="111.6" y="142" width="156.8" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="190" y="161" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ma_val : Either e a</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ Either e b) — called only when ma_val is Right a; may itself return Left e</title>
      <rect x="89.99999999999999" y="90" width="178.4" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="179.2" y="102" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="179.2" y="116" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f_val : a ⟶ Either e b</text>
    </g>
    <g class="action-node">
      <title>Right a →  f a          (unwrap, apply, return result)\nLeft e  →  Left e       (short-circuit: skip f, propagate the error value unchanged)</title>
      <rect x="308.4" y="94" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="368.4" y="116" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bind : EitherBindOp</text>
    </g>
    <g class="object-node">
      <title>Either e b — Right b (all steps succeeded) or Left e (first error propagated, unchanged)</title>
      <rect x="468.4" y="97" width="156.8" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="546.8" y="116" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">mb_val : Either e b</text>
    </g>
  </g>
</svg>
