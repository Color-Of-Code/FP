  <rect width="1804.1999999999998" height="252" fill="white"/>
  <text x="902.0999999999999" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">STM bind: sequence two TVar actions; atomically commits or retries the whole chain</text>
  <text x="902.0999999999999" y="35" text-anchor="middle" font-size="11" font-weight="normal" font-family="sans-serif" fill="#555">also called: &gt;&gt;=</text>
  <g transform="translate(0,44)">
