      <path d="M475.6,160.0 L489.6,160.0 Q495.6,160.0 495.6,154.0 L495.6,104.0 Q495.6,98.0 501.6,98.0 L507.6,98.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
