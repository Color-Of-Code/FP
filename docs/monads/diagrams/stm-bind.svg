      <text x="1333.6" y="140" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">commit — all writes visible atomically</text>
    </g>
    <g class="edge">
      <path d="M1309.6,164.0 L1317.6,164.0 Q1323.6,164.0 1323.6,170.0 L1323.6,192.0 Q1323.6,198.0 1329.6,198.0 L1341.6,198.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="1323.6" y="175" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">conflict — discard writes, restart entire chain</text>
    </g>
    <g class="edge">
