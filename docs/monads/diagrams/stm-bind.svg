    </g>
    <g class="edge">
      <path d="M1299.6,118.0 L1642.6,118.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="1479.1" y="112" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">commit — all writes visible atomically</text>
    </g>
    <g class="edge">
      <path d="M1299.6,136.0 L1307.6,136.0 Q1313.6,136.0 1313.6,142.0 L1313.6,164.0 Q1313.6,170.0 1319.6,170.0 L1642.6,170.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="1484.1" y="164" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">conflict — discard writes, restart entire chain</text>
    </g>
    <g class="edge">
      <path d="M314.0,72.0 L511.6,72.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowOpen)" stroke-dasharray="6,4"/>
    </g>
    <g class="edge">
      <path d="M643.6,97.0 L837.6,97.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowOpen)" stroke-dasharray="6,4"/>
    </g>
    <g class="edge">
      <path d="M969.6,117.0 L1163.6,117.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowOpen)" stroke-dasharray="6,4"/>
    </g>
    <g class="action-node">
      <title>Run sa: read/write TVars; result is tentative until atomically commits</title>
      <rect x="194" y="40" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="254" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">run_sa</text>
      <g class="pin pin-in">
        <rect x="190" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="200" y="62" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">sa</text>
      </g>
      <g class="pin pin-out">
        <rect x="310" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="308" y="62" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">a</text>
      </g>
    </g>
    <g class="action-node">
      <title>Apply f(a): build the next atomic action STM b</title>
      <rect x="523.6" y="65" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="583.6" y="87" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">build</text>
      <g class="pin pin-in">
        <rect x="519.6" y="75.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="529.6" y="79.66666666666667" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">a</text>
      </g>
      <g class="pin pin-in">
        <rect x="519.6" y="90.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="529.6" y="94.33333333333333" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="639.6" y="83" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="637.6" y="87" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">sb</text>
      </g>
    </g>
    <g class="action-node">
      <title>Run f(a): read/write TVars; all writes still tentative</title>
      <rect x="849.6" y="85" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="909.6" y="107" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">run_sb</text>
      <g class="pin pin-in">
        <rect x="845.6" y="103" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="855.6" y="107" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">sb</text>
      </g>
      <g class="pin pin-out">
        <rect x="965.6" y="103" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="963.6" y="107" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">b</text>
      </g>
    </g>
    <g class="action-node">
      <title>atomically: check for TVar conflicts.\n  No conflict  → commit all writes at once; b is visible to other threads\n  Conflict     → discard ALL tentative writes; restart the entire chain from run_sa</title>
      <rect x="1175.6" y="105" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="1235.6" y="127" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">commit</text>
      <g class="pin pin-in">
        <rect x="1171.6" y="123" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="1181.6" y="127" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">b_in</text>
      </g>
      <g class="pin pin-out">
        <rect x="1291.6" y="115.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="1289.6" y="119.66666666666667" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">b_out</text>
      </g>
      <g class="pin pin-out">
        <rect x="1291.6" y="130.33333333333334" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="1289.6" y="134.33333333333334" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">retry</text>
      </g>
    </g>
    <g class="object-node">
      <title>STM a — an atomic action that reads/writes TVars. Not yet executed.</title>
      <rect x="36" y="43" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="91" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">sa : STM a</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ STM b) — given result a, builds the next atomic action</title>
      <rect x="362" y="141" width="113.60000000000001" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="418.8" y="153" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="418.8" y="167" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ STM b</text>
    </g>
    <g class="object-node">
      <title>a — the value produced by sa (tentative)</title>
      <rect x="363.8" y="89" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="418.8" y="108" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">a : a</text>
    </g>
    <g class="object-node">
      <title>STM b — the next atomic action</title>
      <rect x="691.6" y="114" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="746.6" y="133" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">sb : STM b</text>
    </g>
    <g class="object-node">
      <title>b — the result value (still tentative, not yet committed)</title>
      <rect x="1017.5999999999999" y="134" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1072.6" y="153" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">b_raw : b</text>
    </g>
    <g class="object-node">
      <title>b — the committed result. All TVar writes from run_sa and run_sb are now atomically visible.</title>
      <rect x="1654.6" y="99" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1709.6" y="118" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">b : b</text>
    </g>
    <g class="object-node">
      <title>Retry path — the entire transaction restarts. No partial state is visible to other threads.</title>
      <rect x="1654.6" y="151" width="113.60000000000001" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1711.3999999999999" y="170" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">retry : STM b</text>
    </g>
  </g>
</svg>
