    <g class="edge">
      <path d="M973.6,101.0 L981.6,101.0 Q987.6,101.0 987.6,107.0 L987.6,147.0 Q987.6,153.0 993.6,153.0 L1005.6,153.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
