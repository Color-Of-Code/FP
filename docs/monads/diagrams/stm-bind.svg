<rect width="1449.1999999999998" height="252" fill="white"/>
<text x="724.6" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">STM bind: sequence two TVar actions; atomically commits or retries the whole chain</text>
<g transform="translate(0,28)">
  <rect x="0" y="0" width="1449.1999999999998" height="224" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
