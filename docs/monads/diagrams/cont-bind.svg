<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 879.2 287" width="879.2" height="287">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="879.2" height="287" fill="white"/>
  <text x="439.6" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Cont bind: build inner continuation k2 = (a → f(a)(k)), give k2 to m</text>
  <g transform="translate(0,28)">
    <rect x="0" y="0" width="879.2" height="259" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="activity-frame-tab">
      <path d="M0,0 L102.8,0 L102.8,12 L92.8,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="51.4" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» &gt;&gt;=</text>
    </g>
    <g class="edge hof-edge">
      <path d="M181.2,87.0 L213.2,87.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M181.2,139.0 L186.2,139.0 Q191.2,139.0 191.2,134.0 L191.2,111.0 Q191.2,105.0 197.2,105.0 L213.2,105.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M353.2,90.0 L361.2,90.0 Q367.2,90.0 367.2,96.0 L367.2,188.0 Q367.2,194.0 373.2,194.0 L385.2,194.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M507.2,142.0 L512.2,142.0 Q517.2,142.0 517.2,137.0 L517.2,123.0 Q517.2,117.0 523.2,117.0 L539.2,117.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M507.2,194.0 L521.2,194.0 Q527.2,194.0 527.2,188.0 L527.2,138.0 Q527.2,132.0 533.2,132.0 L539.2,132.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M679.2,121.0 L711.2,121.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M349.2,106.0 L543.2,106.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowOpen)" stroke-dasharray="6,4"/>
    </g>
    <g class="action-node">
      <title>Build inner continuation k2 = \\a -&gt; f(a)(k)\nThis closure captures both f and k.\nWhen called with a, it: runs f(a) to get Cont r b, then runs that with k.</title>
      <rect x="229.2" y="74" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="289.2" y="96" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">compose</text>
      <g class="pin pin-in">
        <rect x="225.2" y="84.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="235.2" y="88.66666666666667" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">f</text>
      </g>
      <g class="pin pin-in">
        <rect x="225.2" y="99.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="235.2" y="103.33333333333333" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">k</text>
      </g>
      <g class="pin pin-out">
        <rect x="345.2" y="92" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="343.2" y="96" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">k2</text>
      </g>
    </g>
    <g class="action-node">
      <title>Run m with k2: m(k2). m runs LAST — this is the inversion of control.\nIf callCC is used, k (the downstream continuation) can be captured as an escape function.</title>
      <rect x="555.2" y="99" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="615.2" y="121" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">run</text>
      <g class="pin pin-in">
        <rect x="551.2" y="109.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="561.2" y="113.66666666666667" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">m</text>
      </g>
      <g class="pin pin-in">
        <rect x="551.2" y="124.33333333333334" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="561.2" y="128.33333333333334" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">k2</text>
      </g>
      <g class="pin pin-out">
        <rect x="671.2" y="117" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="669.2" y="121" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">r</text>
      </g>
    </g>
    <g class="object-node">
      <title>Cont r a = (a ⟶ r) ⟶ r — m is waiting for its continuation. It does not run yet.</title>
      <rect x="397.2" y="123" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="452.2" y="142" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">m : Cont r a</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ Cont r b) — the continuation step; given a, produces a Cont r b action</title>
      <rect x="46" y="68" width="135.2" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="113.6" y="80" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="113.6" y="94" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ Cont r b</text>
    </g>
    <g class="object-node">
      <title>(b ⟶ r) — the downstream continuation: what happens after b is produced</title>
      <rect x="71.19999999999999" y="120" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="126.19999999999999" y="139" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">k : b ⟶ r</text>
    </g>
    <g class="object-node">
      <title>(a ⟶ r) — the composed continuation. When m eventually produces a, it calls k2(a), which runs f(a) and then k.</title>
      <rect x="397.2" y="175" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="452.2" y="194" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">k2 : a ⟶ r</text>
    </g>
    <g class="object-node">
      <title>r — the final result of the entire composed computation</title>
      <rect x="723.2" y="102" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="778.2" y="121" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">r : r</text>
    </g>
  </g>
</svg>
