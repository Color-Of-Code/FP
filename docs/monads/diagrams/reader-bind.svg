      <text x="464.8" y="142" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">a : a</text>
    </g>
    <g class="object-node">
      <title>Reader r b — the second computation (not yet run)</title>
      <rect x="755.6" y="175" width="128" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="819.6" y="194" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">rb : Reader r b</text>
    </g>
