<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 664.8 298" width="664.8" height="298">
<defs>
  <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#424242"/>
  </marker>
  <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10" fill="none" stroke="#424242" stroke-width="1.5"/>
  </marker>
  <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#00796b"/>
  </marker>
</defs>
<rect width="664.8" height="298" fill="white"/>
<text x="332.4" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">(&gt;&gt;=) :: Cont r a ⟶ (a ⟶ Cont r b) ⟶ Cont r b</text>
<g transform="translate(0,28)">
<rect x="0" y="0" width="664.8" height="270" rx="4" fill="#f8f8ff" stroke="#6666c0" stroke-width="2"/>
<text x="332.4" y="18" text-anchor="middle" font-size="12" font-weight="bold" font-family="sans-serif" fill="#333">«block» ContBindContext</text>


  <g class="edge">
    <path d="M239.6,149.3 C239.6,149.3 279.5,142.3 279.5,142.3" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge hof-edge">
    <path d="M254.0,123.2 C254.0,123.2 279.5,127.7 279.5,127.7" fill="none" stroke="#00796b" stroke-width="1.5" marker-end="url(#arrowHof)"/>
    
  </g>
  <g class="edge">
    <path d="M418.0,135.0 C418.0,135.0 443.5,135.0 443.5,135.0" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="object-node"><title>Cont r a = (a ⟶ r) ⟶ r — a suspended computation waiting for its continuation k</title>
    <rect x="104.4" y="142.0" width="135.2" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="172.0" y="161.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">m_val : Cont r a</text>
  </g>
  <g class="object-node hof"><title>(a ⟶ Cont r b) — given result a, builds the next continuation-based step</title>
    <rect x="90.0" y="90.0" width="164" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
    <text x="172.0" y="102.0" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
    <text x="172.0" y="116.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f_val : a ⟶ Cont r b</text>
  </g>
  <g class="action-node"><title>bind m f = \\k -&gt; m (\\a -&gt; f a k)\nGive m a continuation that: feeds a into f, then passes original k to the result.\nThe current step runs last — this is continuation composition.</title>
    <rect x="294.0" y="113.0" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="354.0" y="135.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bind : ContBindOp</text>
    
    
  </g>
  <g class="object-node"><title>Cont r b = (b ⟶ r) ⟶ r — the composed computation; callCC can capture k here for early exit</title>
    <rect x="454.0" y="116.0" width="120.8" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="514.4" y="135.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">res : Cont r b</text>
  </g>
</g>
</svg>