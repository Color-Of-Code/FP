<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1132 252" width="1132" height="252">
<defs>
  <marker id="arrowFilled" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#424242"/>
  </marker>
  <marker id="arrowOpen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10" fill="none" stroke="#424242" stroke-width="1.5"/>
  </marker>
  <marker id="arrowHof" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#00796b"/>
  </marker>
</defs>
<rect width="1132" height="252" fill="white"/>
<text x="566.0" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">IO bind: execute ia, feed a to f to build IO b, execute IO b</text>
<g transform="translate(0,28)">
  <rect x="0" y="0" width="1132" height="224" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
  <g class="activity-frame-tab">
    <path d="M0,0 L92.8,0 L102.8,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
    <text x="51.4" y="12.0" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» &gt;&gt;=</text>
  </g>
  <g class="edge">
    <path d="M156.0,141.0 C156.0,141.0 196.0,141.0 196.0,141.0" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge">
    <path d="M316.0,141.0 C316.0,141.0 356.0,152.6 356.0,152.6" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge">
    <path d="M466.0,146.2 C480.0,146.2 492.0,130.3 506.0,130.3" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge hof-edge">
    <path d="M466.0,99.8 C480.0,99.8 492.0,115.7 506.0,115.7" fill="none" stroke="#00796b" stroke-width="1.5" marker-end="url(#arrowHof)"/>
    
  </g>
  <g class="edge">
    <path d="M626.0,123.0 C626.0,123.0 666.0,134.6 666.0,134.6" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge">
    <path d="M776.0,134.6 C776.0,134.6 816.0,123.0 816.0,123.0" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge">
    <path d="M936.0,123.0 C936.0,123.0 976.0,123.0 976.0,123.0" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge">
    <path d="M316.0,141.0 C382.5,141.0 439.5,123.0 506.0,123.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowOpen)"/>
    
  </g>
  <g class="edge">
    <path d="M626.0,123.0 C626.0,123.0 816.0,123.0 816.0,123.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowOpen)"/>
    
  </g>
  <g class="action-node"><title>Execute ia: the runtime runs the described effect and produces value a. Real I/O happens here.</title>
    <rect x="196.0" y="119.0" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="256.0" y="141.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">exec_a</text>
    <rect x="192.0" y="137.0" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="202.0" y="141.0" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">ia</text>
    <rect x="312.0" y="137.0" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="310.0" y="141.0" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">a</text>
  </g>
  <g class="action-node"><title>Apply f(a): build the next IO action description. No effect yet — only the description is created.</title>
    <rect x="506.0" y="101.0" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="566.0" y="123.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">build</text>
    <rect x="502.0" y="111.7" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="512.0" y="115.7" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">f</text>
    <rect x="502.0" y="126.3" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="512.0" y="130.3" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">a</text>
    <rect x="622.0" y="119.0" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="620.0" y="123.0" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">ib</text>
  </g>
  <g class="action-node"><title>Execute IO b: the runtime runs the second described effect. Effects of ia happened BEFORE this.</title>
    <rect x="816.0" y="101.0" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="876.0" y="123.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">exec_b</text>
    <rect x="812.0" y="119.0" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="822.0" y="123.0" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">ib</text>
    <rect x="932.0" y="119.0" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="930.0" y="123.0" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">b</text>
  </g>
  <g class="object-node"><title>IO a — a description (recipe) of a side-effectful computation. Nothing has run yet.</title>
    <rect x="46.0" y="122.0" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="101.0" y="141.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ia : IO a</text>
  </g>
  <g class="object-node hof"><title>(a ⟶ IO b) — given result a, constructs the next IO action description</title>
    <rect x="356.0" y="68.0" width="110" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
    <text x="411.0" y="80.0" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
    <text x="411.0" y="94.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ IO b</text>
  </g>
  <g class="object-node"><title>a — the value obtained by running ia (e.g. a String read from stdin)</title>
    <rect x="356.0" y="140.0" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="411.0" y="159.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">a : a</text>
  </g>
  <g class="object-node"><title>IO b — the description of the second effect, constructed from a</title>
    <rect x="666.0" y="122.0" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="721.0" y="141.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ib : IO b</text>
  </g>
  <g class="object-node"><title>b — the final result. The sequencing of exec_a before exec_b is the entire bind contract.</title>
    <rect x="976.0" y="104.0" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="1031.0" y="123.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">b : b</text>
  </g>
</g>
</svg>