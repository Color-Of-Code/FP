  <g class="object-node"><title>[(b, pa2·pb)] — weighted outcomes for branch a2</title>
    <rect x="848.4" y="179.5" width="149.6" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="923.2" y="198.5" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">w2 : [(b, pa2·pb)]</text>
  </g>
  <g class="object-node"><title>Prob b — the marginal distribution: P(B=b) = Σ_a P(B=b|A=a)·P(A=a)</title>
    <rect x="1198.0" y="197.5" width="128" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="1262.0" y="216.5" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">dist_b : Prob b</text>
