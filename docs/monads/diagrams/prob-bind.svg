    <text x="274.4" y="94.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ Prob b</text>
  </g>
  <g class="object-node"><title>Outcome a1 from Prob a</title>
    <rect x="219.4" y="351.0" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
