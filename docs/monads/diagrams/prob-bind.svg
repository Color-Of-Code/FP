    <text x="110.0" y="292.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">dist_a : Prob a</text>
  </g>
  <g class="object-node hof"><title>(a ⟶ Prob b) — conditional distribution: given each outcome a, returns a distribution over b</title>
