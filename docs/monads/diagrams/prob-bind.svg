    <text x="591.6" y="198.5" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">sub2 : Prob b</text>
  </g>
  <g class="object-node"><title>[(b, pa1·pb)] — weighted outcomes for branch a1</title>
    <rect x="848.4" y="271.0" width="149.6" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
