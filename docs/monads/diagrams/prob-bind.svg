  </g>
  <g class="object-node"><title>P(A = a1) — probability of outcome a1</title>
    <rect x="219.4" y="299.0" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="274.4" y="318.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">pa1 : Double</text>
  </g>
  <g class="object-node"><title>Outcome a2 from Prob a</title>
