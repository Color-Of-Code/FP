<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 672 298" width="672" height="298">
<defs>
  <marker id="arrowFilled" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#424242"/>
  </marker>
  <marker id="arrowOpen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10" fill="none" stroke="#424242" stroke-width="1.5"/>
  </marker>
  <marker id="arrowHof" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#00796b"/>
  </marker>
</defs>
<rect width="672" height="298" fill="white"/>
<text x="336.0" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">(&gt;&gt;=) :: Maybe a ⟶ (a ⟶ Maybe b) ⟶ Maybe b</text>
<g transform="translate(0,28)">
<rect x="0" y="0" width="672" height="270" rx="4" fill="#f8f8ff" stroke="#6666c0" stroke-width="2"/>
<text x="336.0" y="18" text-anchor="middle" font-size="12" font-weight="bold" font-family="sans-serif" fill="#333">«block» MaybeBindContext</text>


  <g class="edge">
    <path d="M236.0,151.1 C236.0,151.1 286.8,142.3 286.8,142.3" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge hof-edge">
    <path d="M246.8,120.4 C246.8,120.4 286.8,127.7 286.8,127.7" fill="none" stroke="#00796b" stroke-width="1.5" marker-end="url(#arrowHof)"/>
    
  </g>
  <g class="edge">
    <path d="M406.8,135.0 C406.8,135.0 446.8,135.0 446.8,135.0" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="object-node"><title>Maybe a — Just a (has a value) or Nothing (absent). If Nothing, f is never called.</title>
    <rect x="100.8" y="142.0" width="135.2" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="168.4" y="161.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ma_val : Maybe a</text>
  </g>
  <g class="object-node hof"><title>(a ⟶ Maybe b) — called only when ma_val is Just a; may itself return Nothing</title>
    <rect x="90.0" y="90.0" width="156.8" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
    <text x="168.4" y="102.0" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
    <text x="168.4" y="116.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f_val : a ⟶ Maybe b</text>
  </g>
  <g class="action-node"><title>Just a  →  f a        (unwrap, apply, return result)\nNothing →  Nothing   (short-circuit: skip f, propagate Nothing)</title>
    <rect x="286.8" y="113.0" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="346.8" y="135.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bind : MaybeBindOp</text>
    
    
  </g>
  <g class="object-node"><title>Maybe b — Just b (if every step succeeded) or Nothing (first failure propagated)</title>
    <rect x="446.8" y="116.0" width="135.2" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="514.4" y="135.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">mb_val : Maybe b</text>
  </g>
</g>
</svg>