<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 628.8 298" width="628.8" height="298">
<defs>
  <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#424242"/>
  </marker>
  <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10" fill="none" stroke="#424242" stroke-width="1.5"/>
  </marker>
  <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#00796b"/>
  </marker>
</defs>
<rect width="628.8" height="298" fill="white"/>
<text x="314.4" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">(&gt;&gt;=) :: IO a ⟶ (a ⟶ IO b) ⟶ IO b</text>
<g transform="translate(0,28)">
<rect x="0" y="0" width="628.8" height="270" rx="4" fill="#f8f8ff" stroke="#6666c0" stroke-width="2"/>
<text x="314.4" y="18" text-anchor="middle" font-size="12" font-weight="bold" font-family="sans-serif" fill="#333">«block» IOBindContext</text>


  <g class="edge">
    <path d="M214.4,149.6 C214.4,149.6 250.7,142.3 250.7,142.3" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge hof-edge">
    <path d="M225.2,122.6 C225.2,122.6 250.7,127.7 250.7,127.7" fill="none" stroke="#00796b" stroke-width="1.5" marker-end="url(#arrowHof)"/>
    
  </g>
  <g class="edge">
    <path d="M389.2,135.0 C389.2,135.0 414.7,135.0 414.7,135.0" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="object-node"><title>IO a — a description of a side-effectful computation. Nothing runs yet.</title>
    <rect x="100.8" y="142.0" width="113.60000000000001" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="157.6" y="161.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ia_val : IO a</text>
  </g>
  <g class="object-node hof"><title>(a ⟶ IO b) — given the result of running ia, produces the next IO action to run</title>
    <rect x="90.0" y="90.0" width="135.2" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
    <text x="157.6" y="102.0" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
    <text x="157.6" y="116.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f_val : a ⟶ IO b</text>
  </g>
  <g class="action-node"><title>Build a new IO recipe that, when run by the runtime:\n1. executes ia to get a\n2. passes a to f to get IO b\n3. executes IO b\nOrder of effects = order of binds.</title>
    <rect x="265.2" y="113.0" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="325.2" y="135.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bind : IOBindOp</text>
    
    
  </g>
  <g class="object-node"><title>IO b — the composed recipe. Effects of ia happen before effects of f(a).</title>
    <rect x="425.2" y="116.0" width="113.60000000000001" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="482.0" y="135.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ib_val : IO b</text>
  </g>
</g>
</svg>