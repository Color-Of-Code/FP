<rect width="700.8000000000001" height="350" fill="white"/>
<text x="350.4" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">(&gt;&gt;=) :: State s a ⟶ (a ⟶ State s b) ⟶ State s b</text>
<g transform="translate(0,28)">
