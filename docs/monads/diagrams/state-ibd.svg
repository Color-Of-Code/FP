  </g>
  <g class="object-node"><title>State s a — a computation: given state s returns (a, s')</title>
    <rect x="100.8" y="194.0" width="149.6" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="175.6" y="213.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">sa_val : State s a</text>
  </g>
  <g class="object-node hof"><title>(a ⟶ State s b) — continuation: given result a, produces a new state computation</title>
    <rect x="90.0" y="142.0" width="171.20000000000002" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
    <text x="175.6" y="154.0" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
    <text x="175.6" y="168.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f_val : a ⟶ State s b</text>
  </g>
  <g class="object-node"><title>s — current state entering bind. The value side and the state side are both threaded.</title>
    <rect x="120.6" y="90.0" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="175.6" y="109.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">s_in : s</text>
  </g>
  <g class="action-node"><title>bind sa f = \\s -&gt;\n  let (a, s')  = sa(s)    -- run sa: get result a and new state s'\n      (b, s'') = f(a)(s') -- run f(a) with s': get b and final state s''\n  in  (b, s'')</title>
    <rect x="301.2" y="139.0" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="361.2" y="161.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bind : StateBindOp</text>
    
    
  </g>
  <g class="object-node"><title>State s b — the composed computation; when run it produces (b, s'')</title>
    <rect x="461.2" y="168.0" width="149.6" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="536.0" y="187.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">sb_val : State s b</text>
  </g>
  <g class="object-node"><title>s — the transformed state after both sa and f(a) have run. Different from s_in.</title>
    <rect x="481.0" y="116.0" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="536.0" y="135.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">s_out : s</text>
  </g>
</g>
