<text x="350.4" y="18" text-anchor="middle" font-size="12" font-weight="bold" font-family="sans-serif" fill="#333">«block» StateBindContext</text>


  <g class="edge">
    <path d="M243.4,194.0 C263.6,194.0 281.0,172.0 301.2,172.0" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
