<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700.8000000000001 350" width="700.8000000000001" height="350">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="700.8000000000001" height="350" fill="white"/>
  <text x="350.40000000000003" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">(&gt;&gt;=) :: State s a ⟶ (a ⟶ State s b) ⟶ State s b</text>
  <g transform="translate(0,28)">
    <rect x="0" y="0" width="700.8000000000001" height="322" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-block">
      <path d="M0,0 L164.8,0 L164.8,12 L154.8,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="82.4" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«block» StateBindContext</text>
    </g>
    <g class="edge">
      <path d="M261.2,213.0 L266.2,213.0 Q271.2,213.0 271.2,208.0 L271.2,178.0 Q271.2,172.0 277.2,172.0 L289.2,172.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge hof-edge">
      <path d="M261.2,161.0 L289.2,161.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M261.2,109.0 L266.2,109.0 Q271.2,109.0 271.2,114.0 L271.2,144.0 Q271.2,150.0 277.2,150.0 L289.2,150.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M421.2,154.0 L449.2,154.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M421.2,168.0 L426.2,168.0 Q431.2,168.0 431.2,173.0 L431.2,200.0 Q431.2,206.0 437.2,206.0 L449.2,206.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="object-node">
      <title>State s a — a computation: given state s returns (a, s')</title>
      <rect x="111.60000000000004" y="194" width="149.6" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="186.40000000000003" y="213" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">sa_val : State s a</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ State s b) — continuation: given result a, produces a new state computation</title>
      <rect x="90.00000000000001" y="142" width="171.20000000000002" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="175.60000000000002" y="154" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="175.60000000000002" y="168" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f_val : a ⟶ State s b</text>
    </g>
    <g class="object-node">
      <title>s — current state entering bind. The value side and the state side are both threaded.</title>
      <rect x="151.20000000000002" y="90" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="206.20000000000002" y="109" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">s_in : s</text>
    </g>
    <g class="action-node">
      <title>bind sa f = \\s -&gt;\n  let (a, s')  = sa(s)    -- run sa: get result a and new state s'\n      (b, s'') = f(a)(s') -- run f(a) with s': get b and final state s''\n  in  (b, s'')</title>
      <rect x="301.20000000000005" y="139" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="361.20000000000005" y="161" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bind : StateBindOp</text>
    </g>
    <g class="object-node">
      <title>State s b — the composed computation; when run it produces (b, s'')</title>
      <rect x="461.2" y="135" width="149.6" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="536" y="154" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">sb_val : State s b</text>
    </g>
    <g class="object-node">
      <title>s — the transformed state after both sa and f(a) have run. Different from s_in.</title>
      <rect x="461.20000000000005" y="187" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="516.2" y="206" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">s_out : s</text>
    </g>
  </g>
</svg>
