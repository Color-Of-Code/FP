<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 657.6 298" width="657.6" height="298">
<defs>
  <marker id="arrowFilled" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#424242"/>
  </marker>
  <marker id="arrowOpen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10" fill="none" stroke="#424242" stroke-width="1.5"/>
  </marker>
  <marker id="arrowHof" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#00796b"/>
  </marker>
</defs>
<rect width="657.6" height="298" fill="white"/>
<text x="328.8" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">(&gt;&gt;=) :: List a ⟶ (a ⟶ List b) ⟶ List b</text>
<g transform="translate(0,28)">
<rect x="0" y="0" width="657.6" height="270" rx="4" fill="#f8f8ff" stroke="#6666c0" stroke-width="2"/>
<text x="328.8" y="18" text-anchor="middle" font-size="12" font-weight="bold" font-family="sans-serif" fill="#333">«block» ListBindContext</text>


  <g class="edge">
    <path d="M228.8,151.5 C228.8,151.5 279.6,142.3 279.6,142.3" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge hof-edge">
    <path d="M239.6,120.1 C239.6,120.1 279.6,127.7 279.6,127.7" fill="none" stroke="#00796b" stroke-width="1.5" marker-end="url(#arrowHof)"/>
    
  </g>
  <g class="edge">
    <path d="M399.6,135.0 C399.6,135.0 439.6,135.0 439.6,135.0" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="object-node"><title>List a — zero or more possible values. An empty list short-circuits (no elements to process).</title>
    <rect x="100.8" y="142.0" width="128" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="164.8" y="161.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ma_val : List a</text>
  </g>
  <g class="object-node hof"><title>(a ⟶ List b) — applied to EVERY element; each call may return zero, one, or many results</title>
    <rect x="90.0" y="90.0" width="149.6" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
    <text x="164.8" y="102.0" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
    <text x="164.8" y="116.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f_val : a ⟶ List b</text>
  </g>
  <g class="action-node"><title>concatMap f: apply f to each element, concatenate all resulting lists.\nbind [a1,a2,a3] f  =  f(a1) ++ f(a2) ++ f(a3)</title>
    <rect x="279.6" y="113.0" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="339.6" y="135.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bind : ListBindOp</text>
    
    
  </g>
  <g class="object-node"><title>List b — all branches expanded and flattened into a single list</title>
    <rect x="439.6" y="116.0" width="128" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="503.6" y="135.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">mb_val : List b</text>
  </g>
</g>
</svg>