  <rect width="1234" height="294" fill="white"/>
  <text x="617" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">State bind: s0 → run sa → (a, s1) → run f(a)(s1) → (b, s2)</text>
  <g transform="translate(0,28)">
    <rect x="0" y="0" width="1234" height="266" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
