  </marker>
</defs>
<rect width="1186" height="304" fill="white"/>
<text x="593.0" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">State bind: s0 → run sa → (a, s1) → run f(a)(s1) → (b, s2)</text>
<g transform="translate(0,28)">
  <rect x="0" y="0" width="1186" height="276" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
  <g class="activity-frame-tab">
    <path d="M0,0 L92.8,0 L102.8,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
    <text x="51.4" y="12.0" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» &gt;&gt;=</text>
  </g>
  <g class="edge">
    <path d="M166.8,186.2 C166.8,186.2 206.8,182.3 206.8,182.3" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge">
    <path d="M161.4,152.7 C177.3,152.7 190.9,167.7 206.8,167.7" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge">
    <path d="M326.8,182.3 C346.5,182.3 363.3,199.4 383.0,199.4" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge">
    <path d="M326.8,167.7 C326.8,167.7 714.6,175.0 714.6,175.0" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge">
    <path d="M475.0,192.0 C500.9,192.0 523.2,130.3 549.2,130.3" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge hof-edge">
    <path d="M509.2,102.0 C509.2,102.0 549.2,115.7 549.2,115.7" fill="none" stroke="#00796b" stroke-width="1.5" marker-end="url(#arrowHof)"/>
    
  </g>
  <g class="edge">
    <path d="M669.2,123.0 C669.2,123.0 709.2,123.0 709.2,123.0" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge">
    <path d="M830.0,129.8 C830.0,129.8 870.0,133.7 870.0,133.7" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge">
    <path d="M824.6,163.3 C840.5,163.3 854.1,148.3 870.0,148.3" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge">
    <path d="M990.0,148.3 C990.0,148.3 1030.0,151.3 1030.0,151.3" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge">
    <path d="M990.0,133.7 C1004.0,133.7 1016.0,117.8 1030.0,117.8" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge">
    <path d="M326.8,175.0 C404.6,175.0 471.4,123.0 549.2,123.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowOpen)"/>
    
  </g>
  <g class="edge">
    <path d="M669.2,123.0 C739.5,123.0 799.7,141.0 870.0,141.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowOpen)"/>
    
  </g>
  <g class="action-node"><title>Run sa(s0): execute the first computation. Produces BOTH result a AND new state s1.</title>
    <rect x="206.8" y="153.0" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="266.8" y="175.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">run_sa</text>
    <rect x="202.8" y="163.7" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="212.8" y="167.7" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">s0</text>
    <rect x="202.8" y="178.3" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="212.8" y="182.3" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">sa</text>
    <rect x="322.8" y="163.7" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="320.8" y="167.7" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">s1</text>
    <rect x="322.8" y="178.3" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="320.8" y="182.3" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">a</text>
  </g>
  <g class="action-node"><title>Apply f(a): build the next computation State s b from result a</title>
    <rect x="549.2" y="101.0" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="609.2" y="123.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">apply_f</text>
    <rect x="545.2" y="111.7" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="555.2" y="115.7" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">f</text>
    <rect x="545.2" y="126.3" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="555.2" y="130.3" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">a</text>
    <rect x="665.2" y="119.0" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="663.2" y="123.0" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">sb</text>
  </g>
  <g class="action-node"><title>Run f(a)(s1): execute the second computation with the UPDATED state s1. s0 is not used here.</title>
    <rect x="870.0" y="119.0" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="930.0" y="141.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">run_sb</text>
    <rect x="866.0" y="129.7" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="876.0" y="133.7" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">sb</text>
    <rect x="866.0" y="144.3" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="876.0" y="148.3" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">s1</text>
    <rect x="986.0" y="129.7" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="984.0" y="133.7" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">s2</text>
    <rect x="986.0" y="144.3" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="984.0" y="148.3" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">b</text>
  </g>
  <g class="object-node"><title>State s a — a computation: given state s returns (a, s')</title>
    <rect x="46.0" y="174.0" width="120.8" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="106.4" y="193.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">sa : State s a</text>
  </g>
  <g class="object-node hof"><title>(a ⟶ State s b) — the continuation; given result a, builds the next state computation</title>
    <rect x="366.8" y="68.0" width="142.4" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
    <text x="438.0" y="80.0" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
    <text x="438.0" y="94.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ State s b</text>
  </g>
  <g class="object-node"><title>s — the initial state entering the bind. Flows into run_sa.</title>
    <rect x="51.4" y="122.0" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="106.4" y="141.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">s0 : s</text>
  </g>
  <g class="object-node"><title>a — the value result of sa(s0). Passed to f.</title>
    <rect x="383.0" y="192.0" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="438.0" y="211.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">a : a</text>
  </g>
  <g class="object-node"><title>s — the state AFTER running sa. This is s1 ≠ s0. It is s1 (not s0) that flows to run_sb. Critical difference from Reader.</title>
    <rect x="714.6" y="156.0" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="769.6" y="175.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">s1 : s</text>
  </g>
  <g class="object-node"><title>State s b — the second computation, not yet run</title>
    <rect x="709.2" y="104.0" width="120.8" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="769.6" y="123.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">sb : State s b</text>
  </g>
  <g class="object-node"><title>b — the final value result</title>
    <rect x="1030.0" y="138.0" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="1085.0" y="157.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">b : b</text>
  </g>
  <g class="object-node"><title>s — the final state after both steps. s0 ≠ s1 ≠ s2 in general; each step transforms the state.</title>
    <rect x="1030.0" y="86.0" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="1085.0" y="105.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">s2 : s</text>
  </g>
</g>
</svg>