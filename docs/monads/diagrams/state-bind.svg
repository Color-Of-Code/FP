    <g class="edge">
      <path d="M342.8,119.0 L356.8,119.0 Q362.8,119.0 362.8,125.0 L362.8,185.0 Q362.8,191.0 368.8,191.0 L534.2,191.0 Q535.2,191.0 535.2,190.0 L535.2,190.0 Q535.2,189.0 536.2,189.0 L566.2,189.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
