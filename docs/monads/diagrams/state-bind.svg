    <g class="edge hof-edge">
      <path d="M525.2,156.0 L530.2,156.0 Q535.2,156.0 535.2,151.0 L535.2,125.0 Q535.2,119.0 541.2,119.0 L553.2,119.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
