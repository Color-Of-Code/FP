<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 544.4 186" width="544.4" height="186">
<defs>
  <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#424242"/>
  </marker>
  <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10" fill="none" stroke="#424242" stroke-width="1.5"/>
  </marker>
  <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#00796b"/>
  </marker>
</defs>
<rect width="544.4" height="186" fill="white"/>
<text x="272.2" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">pure :: a ⟶ Maybe a   (always wraps in Just, never Nothing)</text>
<g transform="translate(0,28)">
  <rect x="0" y="0" width="544.4" height="158" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
  <g class="activity-frame-tab">
    <path d="M0,0 L109,0 L109,12 L99,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
    <text x="54.5" y="12.0" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» pure</text>
  </g>
  <g class="edge">
    <path d="M156.0,90.0 C156.0,90.0 181.5,90.0 181.5,90.0" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    
  </g>
  <g class="edge">
    <path d="M320.0,90.0 C320.0,90.0 345.5,90.0 345.5,90.0" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    <text x="332.8" y="77.0" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">Just a0</text>
  </g>
  <g class="action-node"><title>WrapInJust: place a0 inside Just. This is the only thing pure does — no logic, no failure.</title>
    <rect x="196.0" y="68.0" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
    <text x="256.0" y="90.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">wrap</text>
    <rect x="192.0" y="86.0" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="202.0" y="90.0" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">a</text>
    <rect x="312.0" y="86.0" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
    <text x="310.0" y="90.0" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">maybe_a</text>
  </g>
  <g class="object-node"><title>a0 — any plain value to be lifted into the Maybe context.</title>
    <rect x="46.0" y="71.0" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="101.0" y="90.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">a0 : a</text>
  </g>
  <g class="object-node"><title>Just a0 : Maybe a — always Just. pure never produces Nothing; that would violate the monad laws.</title>
    <rect x="356.0" y="71.0" width="142.4" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
    <text x="427.2" y="90.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">just_a0 : Maybe a</text>
  </g>
</g>
</svg>