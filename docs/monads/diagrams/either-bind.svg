<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 869.6 231" width="869.6" height="231">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="869.6" height="231" fill="white"/>
  <text x="434.8" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Either bind: pattern match — Right a0 → f(a0) | Left e0 → Left e0 (error preserved, f skipped) — also called: andThen / and_then, Bind, flatMap, &gt;&gt;=</text>
  <g transform="translate(0,28)">
    <rect x="0" y="0" width="869.6" height="203" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L109,0 L109,12 L99,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="54.5" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» bind</text>
    </g>
    <g class="edge">
      <path d="M164.0,67.0 L192.0,67.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M232.0,72.0 L237.0,72.0 Q242.0,72.0 242.0,77.0 L242.0,108.0 Q242.0,114.0 248.0,114.0 L279.8,114.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="266.9" y="108" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">Right a0</text>
    </g>
    <g class="edge">
      <path d="M401.8,114.0 L453.6,114.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge hof-edge">
      <path d="M421.6,166.0 L426.6,166.0 Q431.6,166.0 431.6,161.0 L431.6,138.0 Q431.6,132.0 437.6,132.0 L453.6,132.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M593.6,123.0 L601.6,123.0 Q607.6,123.0 607.6,117.0 L607.6,78.0 Q607.6,72.0 613.6,72.0 L625.6,72.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="607.6" y="91.5" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">f(a0) — Right b' or Left e'</text>
    </g>
    <g class="edge">
      <path d="M232.0,62.0 L279.8,62.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="261.9" y="56" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">Left e0  (f skipped)</text>
    </g>
    <g class="edge">
      <path d="M401.8,62.0 L453.6,62.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M593.6,62.0 L625.6,62.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="617.6" y="56" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">Left e0 : Either e b</text>
    </g>
    <g class="edge">
      <path d="M665.6,67.0 L693.6,67.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="action-node">
      <title>Apply f(a0).  f returns Either e b directly (Right b' or Left e').  bind does NOT inspect f's result — whatever f returned is forwarded unchanged.  This is what makes bind compositional: a Left arising inside f propagates exactly the same way as a Left arising before f.</title>
      <rect x="469.6" y="101" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="529.6" y="123" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">apply_f</text>
      <g class="pin pin-in">
        <rect x="465.6" y="111.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="475.6" y="115.66666666666667" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">a0</text>
      </g>
      <g class="pin pin-in">
        <rect x="465.6" y="126.33333333333334" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="475.6" y="130.33333333333334" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="585.6" y="119" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="583.6" y="123" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">eb</text>
      </g>
    </g>
    <g class="action-node">
      <title>Re-tag the Left constructor: the runtime VALUE Left e0 stays bit-identical, but the static type widens from Left e to Either e b so it unifies with the Right branch's output type at the merge.  No allocation, no transformation — only the type changes.</title>
      <rect x="469.6" y="40" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="529.6" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">widen</text>
      <g class="pin pin-in">
        <rect x="465.6" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="475.6" y="62" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">e0</text>
      </g>
      <g class="pin pin-out">
        <rect x="585.6" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="583.6" y="62" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">eLeft</text>
      </g>
    </g>
    <g class="object-node">
      <title>Either e a — the input.  Either Right a0 (success carrying a value of type a) or Left e0 (failure carrying an error value of type e).</title>
      <rect x="36" y="48" width="128" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="100" y="67" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ea : Either e a</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ Either e b) — the continuation.  Invoked ONLY on the Right branch.  Skipped entirely when ea is Left.</title>
      <rect x="272" y="147" width="149.6" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="346.8" y="159" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="346.8" y="173" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ Either e b</text>
    </g>
    <g class="object-node">
      <title>a0 — the unwrapped success payload, extracted by the Right pattern.  Only exists on the Right branch.</title>
      <rect x="291.8" y="95" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="346.8" y="114" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">a0 : a</text>
    </g>
    <g class="object-node">
      <title>e0 — the unwrapped error payload, extracted by the Left pattern.  Only exists on the Left branch.</title>
      <rect x="291.8" y="43" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="346.8" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">e0 : e</text>
    </g>
    <g class="object-node">
      <title>Either e b — the single result of bind.  Carries either f's output (when ea was Right) or the original error e0 (when ea was Left).</title>
      <rect x="705.6" y="48" width="128" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="769.6" y="67" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ec : Either e b</text>
    </g>
    <g class="decision-node">
      <title>Pattern match on the sum-type constructor.\n  Right a0 → a0 : a is available immediately (no separate unwrap step).\n  Left  e0 → e0 : e is available; the right branch is skipped.\nExactly one branch fires per invocation; the runtime never executes both.</title>
      <polygon points="218,53 232,67 218,81 204,67" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
    </g>
    <g class="merge-node">
      <title>Merge node — both branches produce a value of the SAME type Either e b.  Exactly one inflow fires per invocation; the merge is a control-flow join, not a runtime choice.</title>
      <polygon points="651.6,53 665.6,67 651.6,81 637.6,67" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
    </g>
  </g>
</svg>
