<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 628.8000000000001 232" width="628.8000000000001" height="232">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#424242" stroke-width="1.5"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="628.8000000000001" height="232" fill="white"/>
  <text x="314.40000000000003" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Either bind: Right a → f(a)  |  Left e → Left e  (error preserved, f skipped)</text>
  <g transform="translate(0,28)">
    <rect x="0" y="0" width="628.8000000000001" height="204" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="activity-frame-tab">
      <path d="M0,0 L102.8,0 L102.8,12 L92.8,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="51.4" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» &gt;&gt;=</text>
    </g>
    <g class="edge">
      <path d="M195.6,87.0 L225.1,87.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge hof-edge">
      <path d="M195.6,139.0 L205.6,139.0 L205.6,105.0 L225.1,105.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M371.6,87.0 L401.1,87.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="391.6" y="81" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">Right a  →  f(a)</text>
    </g>
    <g class="edge">
      <path d="M371.6,105.0 L381.6,105.0 L381.6,139.0 L401.1,139.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="381.6" y="116" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">Left e   →  Left e  (e unchanged, f skipped)</text>
    </g>
    <g class="action-node">
      <title>Pattern match on ea:\n  Right a → unwrap a, call f(a), return its result\n  Left e  → return Left e immediately — f is never called\nKey difference from Maybe: e carries the reason for failure, not just its presence.</title>
      <rect x="243.60000000000002" y="74" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="303.6" y="96" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bind</text>
      <g class="pin pin-in">
        <rect x="239.60000000000002" y="84.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="249.60000000000002" y="88.66666666666667" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">ea</text>
      </g>
      <g class="pin pin-in">
        <rect x="239.60000000000002" y="99.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="249.60000000000002" y="103.33333333333333" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="359.6" y="84.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="357.6" y="88.66666666666667" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">eb_right</text>
      </g>
      <g class="pin pin-out">
        <rect x="359.6" y="99.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="357.6" y="103.33333333333333" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">eb_left</text>
      </g>
    </g>
    <g class="object-node">
      <title>Either e a — Right a (success, has a value) or Left e (failure, carries error value e)</title>
      <rect x="67.6" y="68" width="128" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="131.6" y="87" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ea : Either e a</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ Either e b) — the continuation. Only invoked when ea is Right a.</title>
      <rect x="46" y="120" width="149.6" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="120.8" y="132" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="120.8" y="146" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ Either e b</text>
    </g>
    <g class="object-node">
      <title>Either e b — the result of f(a). May be Right b (success) or Left e (new failure from f).</title>
      <rect x="411.6" y="68" width="171.20000000000002" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="497.20000000000005" y="87" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">eb_right : Either e b</text>
    </g>
    <g class="object-node">
      <title>Left e — the original error value e propagated UNCHANGED. The error identity is preserved.</title>
      <rect x="411.6" y="120" width="135.2" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="479.20000000000005" y="139" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">eb_left : Left e</text>
    </g>
  </g>
</svg>
