<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1420 366" width="1420" height="366">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="1420" height="366" fill="white"/>
  <text x="710" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Either bind</text>
  <text x="710" y="35" text-anchor="middle" font-size="11" font-weight="normal" font-family="sans-serif" fill="#555">also called: andThen / and_then, Bind, flatMap, &gt;&gt;=</text>
  <g transform="translate(0,44)">
    <rect x="0" y="0" width="1420" height="322" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L109,0 L109,12 L99,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="54.5" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» bind</text>
    </g>
    <g class="edge">
      <path d="M220.0,166.0 L225.0,166.0 Q230.0,166.0 230.0,161.0 L230.0,129.0 Q230.0,123.0 236.0,123.0 L248.0,123.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M288.0,123.0 L293.0,123.0 Q298.0,123.0 298.0,128.0 L298.0,227.0 Q298.0,233.0 304.0,233.0 L563.5,233.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="436.75" y="227" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">Right a0</text>
    </g>
    <g class="edge">
      <path d="M685.5,233.0 L803.0,233.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge hof-edge">
      <path d="M771.0,285.0 L776.0,285.0 Q781.0,285.0 781.0,280.0 L781.0,254.0 Q781.0,248.0 787.0,248.0 L803.0,248.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M943.0,237.0 L1152.0,237.0 Q1158.0,237.0 1158.0,231.0 L1158.0,123.0 Q1158.0,117.0 1164.0,117.0 L1176.0,117.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="1052.5" y="231" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">f(a0) — Right b' or Left e'</text>
    </g>
    <g class="edge">
      <path d="M288.0,113.0 L563.5,113.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="431.75" y="107" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">Left e0  (f skipped)</text>
    </g>
    <g class="edge">
      <path d="M685.5,113.0 L803.0,113.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M943.0,107.0 L1176.0,107.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="1067.5" y="101" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333" stroke="white" stroke-width="3" paint-order="stroke fill">Left e0 : Either e b</text>
    </g>
    <g class="edge">
      <path d="M1216.0,112.0 L1244.0,112.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge note-attachment">
      <path d="M220.0,113.0 L260.0,113.0" fill="none" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="3,3" stroke-linejoin="round" stroke-linecap="round"/>
    </g>
    <g class="edge note-attachment">
      <path d="M771.0,60.0 L781.0,60.0 L781.0,97.0 L819.0,97.0" fill="none" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="3,3" stroke-linejoin="round" stroke-linecap="round"/>
    </g>
    <g class="edge note-attachment">
      <path d="M771.0,173.0 L781.0,173.0 L781.0,222.0 L819.0,222.0" fill="none" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="3,3" stroke-linejoin="round" stroke-linecap="round"/>
    </g>
    <g class="action-node">
      <title>Apply f(a0).  f returns Either e b directly (Right b' or Left e').  bind does NOT inspect f's result — whatever f returned is forwarded unchanged.  This is what makes bind compositional: a Left arising inside f propagates exactly the same way as a Left arising before f.</title>
      <rect x="819" y="215" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="879" y="237" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">apply_f</text>
      <g class="pin pin-in">
        <rect x="815" y="225.66666666666666" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="825" y="229.66666666666666" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">a0</text>
      </g>
      <g class="pin pin-in">
        <rect x="815" y="240.33333333333334" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="825" y="244.33333333333334" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="935" y="233" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="933" y="237" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">eb</text>
      </g>
    </g>
    <g class="action-node">
      <title>Re-tag the Left constructor: the runtime VALUE Left e0 stays bit-identical, but the static type widens from Left e to Either e b so it unifies with the Right branch's output type at the merge.  No allocation, no transformation — only the type changes.</title>
      <rect x="819" y="85" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="879" y="107" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">widen</text>
      <g class="pin pin-in">
        <rect x="815" y="103" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="825" y="107" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">e0</text>
      </g>
      <g class="pin pin-out">
        <rect x="935" y="103" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="933" y="107" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">eLeft</text>
      </g>
    </g>
    <g class="object-node">
      <title>Either e a — the input.  Either Right a0 (success carrying a value of type a) or Left e0 (failure carrying an error value of type e).</title>
      <rect x="92" y="147" width="128" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="156" y="166" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ea : Either e a</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ Either e b) — the continuation.  Invoked ONLY on the Right branch.  Skipped entirely when ea is Left.</title>
      <rect x="621.4" y="266" width="149.6" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="696.1999999999999" y="278" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="696.1999999999999" y="292" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ Either e b</text>
    </g>
    <g class="object-node">
      <title>a0 — the unwrapped success payload, extracted by the Right pattern.  Only exists on the Right branch.</title>
      <rect x="575.5" y="214" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="630.5" y="233" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">a0 : a</text>
    </g>
    <g class="object-node">
      <title>e0 — the unwrapped error payload, extracted by the Left pattern.  Only exists on the Left branch.</title>
      <rect x="575.5" y="94" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="630.5" y="113" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">e0 : e</text>
    </g>
    <g class="object-node">
      <title>Either e b — the single result of bind.  Carries either f's output (when ea was Right) or the original error e0 (when ea was Left).</title>
      <rect x="1256" y="93" width="128" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1320" y="112" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ec : Either e b</text>
    </g>
    <g class="decision-node">
      <title>Pattern match on the sum-type constructor.\n  Right a0 → a0 : a is available immediately (no separate unwrap step).\n  Left  e0 → e0 : e is available; the right branch is skipped.\nExactly one branch fires per invocation; the runtime never executes both.</title>
      <polygon points="274,104 288,118 274,132 260,118" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
    </g>
    <g class="merge-node">
      <title>Merge node — both branches produce a value of the SAME type Either e b.  Exactly one inflow fires per invocation; the merge is a control-flow join, not a runtime choice.</title>
      <polygon points="1202,98 1216,112 1202,126 1188,112" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
    </g>
    <g class="note-node">
      <polygon points="36,93 210,93 220,103 220,133 36,133" fill="#fffde7" stroke="#fbc02d" stroke-width="1.25"/>
      <polygon points="210,93 210,103 220,103" fill="#fff59d" stroke="#fbc02d" stroke-width="1.25"/>
      <text x="128" y="108.8" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">Pattern match short-circuits:</text>
      <text x="128" y="122.8" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">Left skips f entirely.</text>
    </g>
    <g class="note-node">
      <polygon points="490,40 761,40 771,50 771,80 490,80" fill="#fffde7" stroke="#fbc02d" stroke-width="1.25"/>
      <polygon points="761,40 761,50 771,50" fill="#fff59d" stroke="#fbc02d" stroke-width="1.25"/>
      <text x="630.5" y="55.8" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">Type widens, value preserved bit-identical.</text>
      <text x="630.5" y="69.8" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">This is what 'error preserved verbatim' means.</text>
    </g>
    <g class="note-node">
      <polygon points="525,146 761,146 771,156 771,200 525,200" fill="#fffde7" stroke="#fbc02d" stroke-width="1.25"/>
      <polygon points="761,146 761,156 771,156" fill="#fff59d" stroke="#fbc02d" stroke-width="1.25"/>
      <text x="648" y="161.8" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">Whatever f returns (Right b' or Left e')</text>
      <text x="648" y="175.8" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">is forwarded UNCHANGED — bind never</text>
      <text x="648" y="189.8" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">inspects or rewraps f's result.</text>
    </g>
  </g>
</svg>
