<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700.8 298" width="700.8" height="298">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#424242" stroke-width="1.5"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="700.8" height="298" fill="white"/>
  <text x="350.4" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">(&gt;&gt;=) :: (a, w1) ⟶ (a ⟶ (b, w2)) ⟶ (b, w1&lt;&gt;w2)</text>
  <g transform="translate(0,28)">
    <rect x="0" y="0" width="700.8" height="270" rx="4" fill="#f8f8ff" stroke="#6666c0" stroke-width="2"/>
    <text x="350.4" y="18" text-anchor="middle" font-size="12" font-weight="bold" font-family="sans-serif" fill="#333">«block» WriterBindContext</text>
    <g class="edge">
      <path d="M236.0,148.9 C236.0,148.9 272.3,142.3 272.3,142.3" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge hof-edge">
      <path d="M246.8,123.1 C246.8,123.1 272.3,127.7 272.3,127.7" fill="none" stroke="#00796b" stroke-width="1.5" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M410.8,135.0 C410.8,135.0 436.3,135.0 436.3,135.0" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="object-node">
      <title>(a, w1) — a result value a paired with a log fragment w1</title>
      <rect x="100.80000000000001" y="142" width="135.2" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="168.4" y="161" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ma_val : (a, w1)</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ (b, w2)) — given a, produces result b alongside a new log fragment w2</title>
      <rect x="90" y="90" width="156.8" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="168.4" y="102" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="168.4" y="116" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f_val : a ⟶ (b, w2)</text>
    </g>
    <g class="action-node">
      <title>extract a from (a, w1)\napply f(a) to get (b, w2)\nreturn (b, w1 &lt;&gt; w2)  ← logs combined with monoid append</title>
      <rect x="286.8" y="113" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="346.8" y="135" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bind : WriterBindOp</text>
    </g>
    <g class="object-node">
      <title>(b, w1&lt;&gt;w2) — result b with the complete log: w1 from the first step appended with w2 from f</title>
      <rect x="446.79999999999995" y="116" width="164" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="528.8" y="135" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">mb_val : (b, w1&lt;&gt;w2)</text>
    </g>
  </g>
</svg>
