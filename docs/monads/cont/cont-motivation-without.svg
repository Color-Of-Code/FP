<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1358 186" width="1358" height="186">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="1358" height="186" fill="white"/>
  <text x="679" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Without callCC: every caller must propagate the ABORT sentinel</text>
  <g transform="translate(0,28) scale(1)">
    <rect x="0" y="0" width="1358" height="158" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L140,0 L140,12 L130,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="70" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» contChain</text>
    </g>
    <g class="edge">
      <path d="M146.0,62.0 L150.0,62.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M294.0,62.0 L367.0,62.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="338.5" y="56" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">B | ABORT</text>
    </g>
    <g class="edge">
      <path d="M406.0,77.0 L406.0,114.0 Q406.0,120.0 412.0,120.0 L1154.0,120.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="410" y="98.5" text-anchor="start" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">ABORT</text>
    </g>
    <g class="edge">
      <path d="M433.0,62.0 L482.0,62.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="463.5" y="56" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">b : B</text>
    </g>
    <g class="edge">
      <path d="M626.0,62.0 L699.0,62.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="670.5" y="56" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">C | ABORT</text>
    </g>
    <g class="edge">
      <path d="M738.0,77.0 L738.0,114.0 Q738.0,120.0 744.0,120.0 L1154.0,120.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="742" y="98.5" text-anchor="start" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">ABORT</text>
    </g>
    <g class="edge">
      <path d="M765.0,62.0 L814.0,62.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="795.5" y="56" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">c : C</text>
    </g>
    <g class="edge">
      <path d="M958.0,62.0 L1035.0,62.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="1004.5" y="56" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">D | ABORT</text>
    </g>
    <g class="edge">
      <path d="M1074.0,77.0 L1074.0,114.0 Q1074.0,120.0 1080.0,120.0 L1154.0,120.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="1078" y="98.5" text-anchor="start" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">ABORT</text>
    </g>
    <g class="edge">
      <path d="M1101.0,62.0 L1200.0,62.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="1156.5" y="56" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">d : D</text>
    </g>
    <g class="edge">
      <path d="M1196.0,120.0 L1200.0,120.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="action-node">
      <title>step1 — may return ABORT. Caller must check.</title>
      <rect x="170" y="40" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="230" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">step1</text>
      <g class="pin pin-in">
        <rect x="166" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="176" y="62" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">a</text>
      </g>
      <g class="pin pin-out">
        <rect x="286" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>step2 — same protocol. Skipping the check feeds ABORT into a function expecting B.</title>
      <rect x="502" y="40" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="562" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">step2</text>
      <g class="pin pin-in">
        <rect x="498" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="508" y="62" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">b</text>
      </g>
      <g class="pin pin-out">
        <rect x="618" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>step3 — yet another check. The same boilerplate, three times.</title>
      <rect x="834" y="40" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="894" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">step3</text>
      <g class="pin pin-in">
        <rect x="830" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="840" y="62" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">c</text>
      </g>
      <g class="pin pin-out">
        <rect x="950" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="object-node">
      <title>x : A — the input to the chain.</title>
      <rect x="36" y="43" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="91" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">A</text>
    </g>
    <g class="object-node">
      <title>ABORT — produced by any step that wished to short-circuit and re-emitted by every subsequent caller.</title>
      <rect x="1212" y="101" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1267" y="120" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ABORT</text>
    </g>
    <g class="object-node">
      <title>D — the happy-path output; reached only when no step aborted.</title>
      <rect x="1212" y="43" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1267" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">D</text>
    </g>
    <g class="decision-node">
      <title>Sentinel guard #1 — pattern-matches on ABORT. The non-ABORT branch carries b to step2; ABORT joins abortRail.</title>
      <polygon points="406,48 432,62 406,76 380,62" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
      <text x="406" y="62" text-anchor="middle" font-size="9" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">ABORT?</text>
    </g>
    <g class="decision-node">
      <title>Sentinel guard #2 — same shape, different step.</title>
      <polygon points="738,48 764,62 738,76 712,62" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
      <text x="738" y="62" text-anchor="middle" font-size="9" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">ABORT?</text>
    </g>
    <g class="decision-node">
      <title>Sentinel guard #3 — yet another by-hand check.</title>
      <polygon points="1074,48 1100,62 1074,76 1048,62" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
      <text x="1074" y="62" text-anchor="middle" font-size="9" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">ABORT?</text>
    </g>
    <g class="merge-node">
      <polygon points="1181,106 1195,120 1181,134 1167,120" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
    </g>
  </g>
</svg>
