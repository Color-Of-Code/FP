<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1630.2 244" width="1630.2" height="244">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="1630.2" height="244" fill="white"/>
  <text x="815.1" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">With callCC + bind: linear steps via bind; exit short-circuits straight to runCont</text>
  <g transform="translate(0,28) scale(1)">
    <rect x="0" y="0" width="1630.2" height="216" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L140,0 L140,12 L130,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="70" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» contChain</text>
    </g>
    <g class="swimlane lane-plain">
      <rect x="6" y="28" width="810" height="85" fill="#f7f9fc" stroke="#bbbbbb" stroke-width="1" rx="4" ry="4"/>
      <rect x="6" y="28" width="810" height="18" fill="#e9eef5" stroke="#bbbbbb" stroke-width="1" rx="4" ry="4"/>
      <text x="16" y="38" text-anchor="start" font-size="10" font-weight="bold" font-family="sans-serif" dominant-baseline="middle" fill="#333">Plain values &amp; functions</text>
    </g>
    <g class="swimlane lane-monad">
      <rect x="6" y="113" width="810" height="77" fill="#f7f9fc" stroke="#bbbbbb" stroke-width="1" rx="4" ry="4"/>
      <rect x="6" y="113" width="810" height="18" fill="#e9eef5" stroke="#bbbbbb" stroke-width="1" rx="4" ry="4"/>
      <text x="16" y="123" text-anchor="start" font-size="10" font-weight="bold" font-family="sans-serif" dominant-baseline="middle" fill="#333">Cont monad</text>
    </g>
    <g class="edge">
      <path d="M160.0,156.0 L224.0,156.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="198" y="150" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">Cont r b</text>
    </g>
    <g class="edge">
      <path d="M348.0,156.0 L426.4,156.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="393.2" y="150" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">Cont r c</text>
    </g>
    <g class="edge">
      <path d="M550.4,156.0 L628.8,156.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="595.5999999999999" y="150" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">Cont r d</text>
    </g>
    <g class="edge">
      <path d="M760.8,156.0 L297.0,156.0 Q291.0,156.0 291.0,150.0 L291.0,104.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="523.9" y="150" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">runCont</text>
    </g>
    <g class="edge hof-edge">
      <path d="M292.0,92.0 L292.0,122.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge hof-edge">
      <path d="M494.4,92.0 L494.4,122.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge hof-edge">
      <path d="M696.8,92.0 L696.8,122.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M160.0,156.0 L285.0,156.0 Q291.0,156.0 291.0,150.0 L291.0,104.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="227.5" y="150" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">exit a — direct jump (skips all binds)</text>
    </g>
    <g class="action-node">
      <title>callCC : ((b → Cont r b) → Cont r b) → Cont r b. Captures the current continuation as exit and seeds the chain.</title>
      <rect x="44" y="134" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="104" y="156" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">callCC</text>
      <g class="pin pin-in">
        <rect x="40" y="152" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
      <g class="pin pin-out">
        <rect x="160" y="152" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>&gt;&gt;= : sequences step1 after callCC. Skipped if exit was already called.</title>
      <rect x="232" y="134" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="292" y="156" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bindStep1</text>
      <g class="pin pin-in">
        <rect x="228" y="152" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
      <g class="pin pin-in">
        <rect x="288" y="130" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
      <g class="pin pin-out">
        <rect x="348" y="152" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>&gt;&gt;= : sequences step2. Same pattern.</title>
      <rect x="434.4" y="134" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="494.4" y="156" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bindStep2</text>
      <g class="pin pin-in">
        <rect x="430.4" y="152" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
      <g class="pin pin-in">
        <rect x="490.4" y="130" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
      <g class="pin pin-out">
        <rect x="550.4" y="152" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>&gt;&gt;= : sequences step3. Same pattern.</title>
      <rect x="636.8" y="134" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="696.8" y="156" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bindStep3</text>
      <g class="pin pin-in">
        <rect x="632.8" y="152" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
      <g class="pin pin-in">
        <rect x="692.8" y="130" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
      <g class="pin pin-out">
        <rect x="752.8" y="152" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="object-node hof">
      <title>step1 : b → Cont r c. HOF argument — input is b, not Cont r b.</title>
      <rect x="202.8" y="54" width="178.4" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="292" y="66" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="292" y="80" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">step1Fn : b ⟶ Cont r c</text>
    </g>
    <g class="object-node hof">
      <title>step2 : c → Cont r d. HOF argument.</title>
      <rect x="405.2" y="54" width="178.4" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="494.4" y="66" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="494.4" y="80" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">step2Fn : c ⟶ Cont r d</text>
    </g>
    <g class="object-node hof">
      <title>step3 : d → Cont r e. HOF argument.</title>
      <rect x="607.5999999999999" y="54" width="178.4" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="696.8" y="66" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="696.8" y="80" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">step3Fn : d ⟶ Cont r e</text>
    </g>
    <g class="object-node">
      <title>r — the final continuation result. Reached either by completing the chain or by the exit shortcut.</title>
      <rect x="236" y="54" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="291" y="73" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">outVal : r</text>
    </g>
  </g>
</svg>
