  <rect width="1578.2" height="244" fill="white"/>
  <text x="789.1" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">With callCC + bind: linear steps via bind; exit short-circuits straight to runCont</text>
