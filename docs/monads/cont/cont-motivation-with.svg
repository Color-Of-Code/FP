<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1033 164" width="1033" height="164">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="1033" height="164" fill="white"/>
  <text x="516.5" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">With callCC: the escape function jumps directly to the runCont call site</text>
  <g transform="translate(0,28)">
    <rect x="0" y="0" width="1033" height="136" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L140,0 L140,12 L130,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="70" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» contChain</text>
    </g>
    <g class="edge">
      <path d="M168.0,96.0 L244.0,96.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="212" y="90" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">&gt;&gt;= bind</text>
    </g>
    <g class="edge">
      <path d="M384.0,96.0 L456.0,96.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="426" y="90" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">&gt;&gt;= bind</text>
    </g>
    <g class="edge">
      <path d="M596.0,96.0 L668.0,96.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="638" y="90" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">&gt;&gt;= bind</text>
    </g>
    <g class="edge">
      <path d="M808.0,96.0 L875.0,96.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="849.5" y="90" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">runCont</text>
    </g>
    <g class="edge">
      <path d="M168.0,96.0 L176.0,96.0 Q182.0,96.0 182.0,90.0 L182.0,46.0 Q182.0,40.0 188.0,40.0 L871.0,40.0 Q877.0,40.0 877.0,46.0 L877.0,96.0 L877.0,96.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="529.5" y="34" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">exit a — direct jump</text>
    </g>
    <g class="action-node">
      <title>callCC \\exit -&gt; ...  Captures the current continuation and binds it to exit.  Inside the body, calling exit a aborts the chain and returns a immediately.</title>
      <rect x="44" y="74" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="104" y="96" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">callCC</text>
      <g class="pin pin-in">
        <rect x="40" y="92" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="50" y="96" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">body</text>
      </g>
      <g class="pin pin-out">
        <rect x="160" y="92" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="158" y="96" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">cont</text>
      </g>
    </g>
    <g class="action-node">
      <title>step1 — runs only if no earlier exit has fired.  Composes via bind like any other Cont.</title>
      <rect x="260" y="74" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="320" y="96" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">step1</text>
      <g class="pin pin-in">
        <rect x="256" y="92" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="266" y="96" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">cont</text>
      </g>
      <g class="pin pin-out">
        <rect x="376" y="92" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="374" y="96" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">next</text>
      </g>
    </g>
    <g class="action-node">
      <title>step2 — likewise.  No knowledge of the escape path is required.</title>
      <rect x="472" y="74" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="532" y="96" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">step2</text>
      <g class="pin pin-in">
        <rect x="468" y="92" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="478" y="96" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">cont</text>
      </g>
      <g class="pin pin-out">
        <rect x="588" y="92" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="586" y="96" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">next</text>
      </g>
    </g>
    <g class="action-node">
      <title>step3 — likewise.</title>
      <rect x="684" y="74" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="744" y="96" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">step3</text>
      <g class="pin pin-in">
        <rect x="680" y="92" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="690" y="96" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">cont</text>
      </g>
      <g class="pin pin-out">
        <rect x="800" y="92" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="798" y="96" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">next</text>
      </g>
    </g>
    <g class="object-node">
      <title>r — the final continuation result.  Reached either by completing the chain or by the exit shortcut from callCC.</title>
      <rect x="887" y="77" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="942" y="96" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">outVal : r</text>
    </g>
  </g>
</svg>
