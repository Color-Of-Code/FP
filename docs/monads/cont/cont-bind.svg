<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 785.2 244" width="785.2" height="244">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="785.2" height="244" fill="white"/>
  <text x="392.6" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Cont bind: build inner continuation k2 = (a → f(a)(k)), give k2 to m</text>
  <text x="392.6" y="35" text-anchor="middle" font-size="11" font-weight="normal" font-family="sans-serif" fill="#555">also called: &gt;&gt;=</text>
  <g transform="translate(0,44) scale(1)">
    <rect x="0" y="0" width="785.2" height="200" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L109,0 L109,12 L99,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="54.5" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» bind</text>
    </g>
    <g class="edge hof-edge">
      <path d="M171.2,111.0 L176.2,111.0 Q181.2,111.0 181.2,106.0 L181.2,88.0 Q181.2,84.0 185.2,84.0 L189.2,84.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M171.2,163.0 L185.2,163.0 Q191.2,163.0 191.2,157.0 L191.2,102.0 L191.2,102.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M333.2,87.0 L345.2,87.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M171.2,59.0 L475.2,59.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M467.2,87.0 L472.2,87.0 Q477.2,87.0 477.2,82.0 L477.2,74.0 L477.2,74.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M619.2,63.0 L627.2,63.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M329.2,103.0 L341.2,103.0 Q347.2,103.0 347.2,97.0 L347.2,54.0 Q347.2,48.0 353.2,48.0 L483.2,48.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowOpen)" stroke-dasharray="6,4"/>
    </g>
    <g class="action-node">
      <title>Build inner continuation k2 = \\a -&gt; f(a)(k)\nThis closure captures both f and k.\nWhen called with a, it: runs f(a) to get Cont r b, then runs that with k.</title>
      <rect x="209.2" y="71" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="269.2" y="93" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">compose</text>
      <g class="pin pin-in">
        <rect x="205.2" y="81.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="215.2" y="85.66666666666667" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">f</text>
      </g>
      <g class="pin pin-in">
        <rect x="205.2" y="96.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="215.2" y="100.33333333333333" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">k</text>
      </g>
      <g class="pin pin-out">
        <rect x="325.2" y="89" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="323.2" y="93" text-anchor="end" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">k2</text>
      </g>
    </g>
    <g class="action-node">
      <title>Run m with k2: m(k2). m runs LAST — this is the inversion of control.\nIf callCC is used, k (the downstream continuation) can be captured as an escape function.</title>
      <rect x="495.20000000000005" y="41" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="555.2" y="63" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">run</text>
      <g class="pin pin-in">
        <rect x="491.20000000000005" y="51.666666666666664" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="501.20000000000005" y="55.666666666666664" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">m</text>
      </g>
      <g class="pin pin-in">
        <rect x="491.20000000000005" y="66.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="501.20000000000005" y="70.33333333333333" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">k2</text>
      </g>
      <g class="pin pin-out">
        <rect x="611.2" y="59" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="609.2" y="63" text-anchor="end" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">r</text>
      </g>
    </g>
    <g class="object-node">
      <title>Cont r a = (a ⟶ r) ⟶ r — m is waiting for its continuation. It does not run yet.</title>
      <rect x="61.19999999999999" y="40" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="116.19999999999999" y="59" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">m : Cont r a</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ Cont r b) — the continuation step; given a, produces a Cont r b action</title>
      <rect x="36" y="92" width="135.2" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="103.6" y="104" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="103.6" y="118" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ Cont r b</text>
    </g>
    <g class="object-node">
      <title>(b ⟶ r) — the downstream continuation: what happens after b is produced</title>
      <rect x="61.19999999999999" y="144" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="116.19999999999999" y="163" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">k : b ⟶ r</text>
    </g>
    <g class="object-node">
      <title>(a ⟶ r) — the composed continuation. When m eventually produces a, it calls k2(a), which runs f(a) and then k.</title>
      <rect x="357.2" y="68" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="412.2" y="87" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">k2 : a ⟶ r</text>
    </g>
    <g class="object-node">
      <title>r — the final result of the entire composed computation</title>
      <rect x="639.2" y="44" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="694.2" y="63" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">r : r</text>
    </g>
  </g>
</svg>
