<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 697 221" width="697" height="221">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="697" height="221" fill="white"/>
  <text x="348.5" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Maybe bind: pattern match unwraps Just or short-circuits Nothing</text>
  <text x="348.5" y="35" text-anchor="middle" font-size="11" font-weight="normal" font-family="sans-serif" fill="#555">also called: flatMap, andThen / and_then, SelectMany, chain, &gt;&gt;=</text>
  <g transform="translate(0,44)">
    <rect x="0" y="0" width="697" height="177" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L109,0 L109,12 L99,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="54.5" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» bind</text>
    </g>
    <g class="edge">
      <path d="M164.0,59.0 L168.0,59.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M210.0,59.0 L215.0,59.0 Q220.0,59.0 220.0,64.0 L220.0,106.0 Q220.0,112.0 226.0,112.0 L341.0,112.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="284.5" y="106" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">Just a0  (a0 : a)</text>
    </g>
    <g class="edge hof-edge">
      <path d="M164.0,140.0 L334.0,140.0 Q339.0,140.0 339.0,135.0 L339.0,131.0 Q339.0,130.0 340.0,130.0 L341.0,130.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M481.0,121.0 L489.0,121.0 Q495.0,121.0 495.0,115.0 L495.0,82.0 L495.0,82.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M195.0,74.0 L195.0,78.0 Q195.0,82.0 199.0,82.0 L493.0,82.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="199" y="78" text-anchor="start" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">Nothing (: Maybe b)</text>
    </g>
    <g class="edge">
      <path d="M535.0,82.0 L539.0,82.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="action-node">
      <title>Apply f(a0). Returns Maybe b directly — bind never re-wraps. Wrapping is pure's job.</title>
      <rect x="357" y="99" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="417" y="121" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">apply_f</text>
      <g class="pin pin-in">
        <rect x="353" y="109.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="363" y="113.66666666666667" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">a0</text>
      </g>
      <g class="pin pin-in">
        <rect x="353" y="124.33333333333334" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="363" y="128.33333333333334" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="473" y="117" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="471" y="121" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">mb</text>
      </g>
    </g>
    <g class="object-node">
      <title>Maybe a — the input value. Either Just a0 or Nothing.</title>
      <rect x="54" y="40" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="109" y="59" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ma : Maybe a</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ Maybe b) — the continuation. Only called when ma is Just a0.</title>
      <rect x="36" y="121" width="128" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="100" y="133" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="100" y="147" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ Maybe b</text>
    </g>
    <g class="object-node">
      <title>Maybe b — the single result of bind.</title>
      <rect x="551" y="63" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="606" y="82" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">mb : Maybe b</text>
    </g>
    <g class="decision-node">
      <title>Pattern match: simultaneously tests the constructor and destructures the payload.\nJust a0 → a0 (: a) flows directly to f — no separate unwrap step.\nNothing → skip f entirely.</title>
      <polygon points="195,45 209,59 195,73 181,59" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
    </g>
    <g class="merge-node">
      <title>Merge: both paths produce Maybe b (Just-path result or Nothing short-circuit).</title>
      <polygon points="520,68 534,82 520,96 506,82" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
    </g>
  </g>
</svg>
