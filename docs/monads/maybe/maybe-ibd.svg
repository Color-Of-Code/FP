<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 588 194" width="588" height="194">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="588" height="194" fill="white"/>
  <text x="294" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">bind :: Maybe a ⟶ (a ⟶ Maybe b) ⟶ Maybe b</text>
  <text x="294" y="35" text-anchor="middle" font-size="11" font-weight="normal" font-family="sans-serif" fill="#555">also called: flatMap, andThen / and_then, SelectMany, chain, &gt;&gt;=</text>
  <g transform="translate(0,44)">
    <rect x="0" y="0" width="588" height="150" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-block">
      <path d="M0,0 L164.8,0 L164.8,12 L154.8,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="82.4" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«block» MaybeBindContext</text>
    </g>
    <g class="edge">
      <path d="M226.8,101.0 L231.8,101.0 Q236.8,101.0 236.8,96.0 L236.8,63.0 L236.8,63.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge hof-edge">
      <path d="M226.8,49.0 L234.8,49.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M366.8,56.0 L370.8,56.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="object-node">
      <title>Maybe a — Just a (has a value) or Nothing (absent). If Nothing, f is never called.</title>
      <rect x="91.60000000000002" y="82" width="135.2" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="159.20000000000002" y="101" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ma_val : Maybe a</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ Maybe b) — called only when ma_val is Just a; may itself return Nothing</title>
      <rect x="70" y="30" width="156.8" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="148.4" y="42" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="148.4" y="56" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f_val : a ⟶ Maybe b</text>
    </g>
    <g class="action-node">
      <title>Just a  →  unwrap a, apply f, return Maybe b (no re-wrap)\nNothing →  short-circuit: skip f, propagate Nothing (: Maybe b)</title>
      <rect x="246.8" y="34" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="306.8" y="56" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bind : MaybeBindOp</text>
    </g>
    <g class="object-node">
      <title>Maybe b — Just b (if every step succeeded) or Nothing (first failure propagated)</title>
      <rect x="382.79999999999995" y="37" width="135.2" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="450.4" y="56" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">mb_val : Maybe b</text>
    </g>
  </g>
</svg>
