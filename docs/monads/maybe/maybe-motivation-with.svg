    </g>
    <g class="object-node hof">
      <title>find_address : User → Maybe Address. Same: supplied to bind as the continuation.</title>
      <rect x="36" y="144" width="257.6" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="164.8" y="156" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="164.8" y="170" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">findAddrFn : User ⟶ Maybe Address</text>
    </g>
    <g class="object-node hof">
      <title>find_city : Address → Maybe City. Same: supplied to bind as the continuation.</title>
      <rect x="36" y="196" width="257.6" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="164.8" y="208" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="164.8" y="222" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">findCityFn : Address ⟶ Maybe City</text>
    </g>
    <g class="object-node hof">
      <title>lift_name : City → Maybe String (= pure ∘ .name). Lifts the plain String back into Maybe.</title>
      <rect x="43.20000000000003" y="248" width="250.4" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="168.40000000000003" y="260" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="168.40000000000003" y="274" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">liftNameFn : City ⟶ Maybe String</text>
    </g>
    <g class="object-node">
      <title>Maybe String — Just city.name on success; Nothing if any step failed.\nNo explicit null checks anywhere in this chain; pure starts it, bind drives it.</title>
      <rect x="1474.6" y="198" width="185.6" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1567.3999999999999" y="217" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">cityName : Maybe String</text>
    </g>
