      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="2365.6" height="210" fill="white"/>
  <text x="1182.8" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">With pure + bind: every step has the same shape; bind is the glue</text>
  <g transform="translate(0,28) scale(1)">
    <rect x="0" y="0" width="2365.6" height="182" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L171,0 L171,12 L161,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="85.5" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» lookupUserCity</text>
    </g>
    <g class="swimlane lane-plain">
      <rect x="6" y="28" width="2353.6" height="71" fill="#f7f9fc" stroke="#bbbbbb" stroke-width="1" rx="4" ry="4"/>
      <rect x="6" y="28" width="2353.6" height="18" fill="#e9eef5" stroke="#bbbbbb" stroke-width="1" rx="4" ry="4"/>
      <text x="16" y="38" text-anchor="start" font-size="10" font-weight="bold" font-family="sans-serif" dominant-baseline="middle" fill="#333">Plain values &amp; functions</text>
    </g>
    <g class="swimlane lane-monad">
      <rect x="6" y="99" width="2353.6" height="77" fill="#f7f9fc" stroke="#bbbbbb" stroke-width="1" rx="4" ry="4"/>
      <rect x="6" y="99" width="2353.6" height="18" fill="#e9eef5" stroke="#bbbbbb" stroke-width="1" rx="4" ry="4"/>
      <text x="16" y="109" text-anchor="start" font-size="10" font-weight="bold" font-family="sans-serif" dominant-baseline="middle" fill="#333">Maybe monad</text>
    </g>
    <g class="edge">
      <path d="M164.0,59.0 L169.0,59.0 Q174.0,59.0 174.0,64.0 L174.0,141.0 Q174.0,142.0 175.0,142.0 L176.0,142.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M316.0,142.0 L602.4,142.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="465.2" y="136" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">Maybe UserId</text>
    </g>
    <g class="edge">
      <path d="M742.4,142.0 L1036.0,142.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="895.2" y="136" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">Maybe User</text>
    </g>
    <g class="edge">
      <path d="M1176.0,142.0 L1469.6,142.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="1328.8" y="136" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">Maybe Address</text>
    </g>
    <g class="edge">
      <path d="M1609.6,142.0 L1896.0,142.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="1758.8" y="136" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">Maybe City</text>
    </g>
    <g class="edge">
      <path d="M2036.0,142.0 L2044.0,142.0 Q2050.0,142.0 2050.0,136.0 L2050.0,60.0 Q2050.0,54.0 2056.0,54.0 L2131.5,54.0 Q2134.0,54.0 2134.0,56.5 L2134.0,59.0 L2134.0,59.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="2050" y="92" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">Maybe String</text>
    </g>
    <g class="edge hof-edge">
      <path d="M678.4,79.0 L678.4,104.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge hof-edge">
      <path d="M1112.0,79.0 L1112.0,104.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge hof-edge">
      <path d="M1545.6,79.0 L1545.6,104.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge hof-edge">
      <path d="M1972.0,79.0 L1972.0,104.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="action-node">
      <title>pure : UserId → Maybe UserId. Lifts the plain value into Maybe so the chain can start uniformly with bind.</title>
      <rect x="192" y="120" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="252" y="142" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">pureId</text>
      <g class="pin pin-in">
        <rect x="188" y="138" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="198" y="142" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">a</text>
      </g>
      <g class="pin pin-out">
        <rect x="308" y="138" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>&gt;&gt;= : takes Maybe UserId and (UserId → Maybe User). Unwraps Just id and applies findUser; propagates Nothing.</title>
      <rect x="618.4" y="120" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="678.4" y="142" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bindUser</text>
      <g class="pin pin-in">
        <rect x="614.4" y="138" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="624.4" y="142" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">ma</text>
      </g>
      <g class="pin pin-in">
        <rect x="674.4" y="116" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="678.4" y="114" text-anchor="middle" dominant-baseline="alphabetic" font-size="8" font-family="sans-serif" fill="#555">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="734.4" y="138" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>&gt;&gt;= : takes Maybe User and (User → Maybe Address). Same pattern.</title>
      <rect x="1052" y="120" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="1112" y="142" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bindAddr</text>
      <g class="pin pin-in">
        <rect x="1048" y="138" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="1058" y="142" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">ma</text>
      </g>
      <g class="pin pin-in">
        <rect x="1108" y="116" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="1112" y="114" text-anchor="middle" dominant-baseline="alphabetic" font-size="8" font-family="sans-serif" fill="#555">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="1168" y="138" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>&gt;&gt;= : takes Maybe Address and (Address → Maybe City). Same pattern.</title>
      <rect x="1485.6" y="120" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="1545.6" y="142" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bindCity</text>
      <g class="pin pin-in">
        <rect x="1481.6" y="138" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="1491.6" y="142" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">ma</text>
      </g>
      <g class="pin pin-in">
        <rect x="1541.6" y="116" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="1545.6" y="114" text-anchor="middle" dominant-baseline="alphabetic" font-size="8" font-family="sans-serif" fill="#555">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="1601.6" y="138" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>&gt;&gt;= : takes Maybe City and (City → Maybe String). Same pattern.</title>
      <rect x="1912" y="120" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="1972" y="142" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bindName</text>
      <g class="pin pin-in">
        <rect x="1908" y="138" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="1918" y="142" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">ma</text>
      </g>
      <g class="pin pin-in">
        <rect x="1968" y="116" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="1972" y="114" text-anchor="middle" dominant-baseline="alphabetic" font-size="8" font-family="sans-serif" fill="#555">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="2028" y="138" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="object-node">
      <title>The input: a plain UserId.</title>
      <rect x="36" y="40" width="128" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="100" y="59" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">userId : UserId</text>
    </g>
    <g class="object-node hof">
      <title>find_user : UserId → Maybe User. Passed as an argument to bind — its input type is UserId, not Maybe UserId, so it cannot sit on the main flow.</title>
      <rect x="553.1999999999999" y="40" width="250.4" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="678.4" y="52" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="678.4" y="66" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">findUserFn : UserId ⟶ Maybe User</text>
    </g>
    <g class="object-node hof">
      <title>find_address : User → Maybe Address. Same: supplied to bind as the continuation.</title>
      <rect x="983.2" y="40" width="257.6" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="1112" y="52" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="1112" y="66" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">findAddrFn : User ⟶ Maybe Address</text>
    </g>
    <g class="object-node hof">
      <title>find_city : Address → Maybe City. Same: supplied to bind as the continuation.</title>
      <rect x="1416.8" y="40" width="257.6" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="1545.6" y="52" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="1545.6" y="66" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">findCityFn : Address ⟶ Maybe City</text>
    </g>
    <g class="object-node hof">
      <title>lift_name : City → Maybe String (= pure ∘ .name). Lifts the plain String back into Maybe.</title>
      <rect x="1846.8" y="40" width="250.4" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="1972" y="52" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="1972" y="66" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">liftNameFn : City ⟶ Maybe String</text>
    </g>
    <g class="object-node">
      <title>Maybe String — Just city.name on success; Nothing if any step failed.\nNo explicit null checks anywhere in this chain; pure starts it, bind drives it.</title>
      <rect x="2144" y="40" width="185.6" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="2236.8" y="59" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">cityName : Maybe String</text>
    </g>
  </g>
</svg>
