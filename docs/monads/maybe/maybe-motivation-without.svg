      <text x="1539.8000000000002" y="120" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">nothing : null</text>
    </g>
    <g class="object-node">
      <title>city.name — the happy-path result, reached only when all three checks pass.</title>
