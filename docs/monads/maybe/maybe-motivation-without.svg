      <text x="431" y="62" text-anchor="middle" font-size="9" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">null?</text>
    </g>
    <g class="decision-node">
      <title>Null guard #2: same pattern repeated. Skipping this is a latent bug.</title>
      <polygon points="812,48 835,62 812,76 789,62" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
      <text x="812" y="62" text-anchor="middle" font-size="9" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">null?</text>
    </g>
    <g class="decision-node">
      <title>Null guard #3: yet another check. Business logic is buried in guards.</title>
      <polygon points="1212,48 1235,62 1212,76 1189,62" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
      <text x="1212" y="62" text-anchor="middle" font-size="9" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">null?</text>
    </g>
