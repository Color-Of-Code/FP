        <rect x="1297" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="1295" y="62" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">result</text>
