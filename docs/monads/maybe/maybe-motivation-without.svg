    </g>
    <g class="object-node">
      <title>The input: a user ID to look up.</title>
      <rect x="36" y="43" width="128" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="100" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">userId : UserId</text>
    </g>
    <g class="object-node">
      <title>null — returned when any step failed. Caller must also guard against this.</title>
      <rect x="1807.4" y="110" width="120.8" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1867.8000000000002" y="129" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">nothing : null</text>
    </g>
    <g class="object-node">
      <title>city.name — the happy-path result, reached only when all three checks pass.</title>
      <rect x="1625" y="43" width="142.4" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1696.2" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">cityName : String</text>
    </g>
    <g class="decision-node">
      <title>Null guard #1: pattern-matches User | null. The non-null branch carries 'user : User' to findAddress; the null branch joins earlyExit.</title>
      <polygon points="503,48 526,62 503,76 480,62" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
      <text x="503" y="62" text-anchor="middle" font-size="9" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">null?</text>
    </g>
    <g class="decision-node">
      <title>Null guard #2: same pattern repeated. Skipping this is a latent bug.</title>
      <polygon points="980,48 1003,62 980,76 957,62" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
      <text x="980" y="62" text-anchor="middle" font-size="9" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">null?</text>
    </g>
    <g class="decision-node">
      <title>Null guard #3: yet another check. Business logic is buried in guards.</title>
      <polygon points="1472,48 1495,62 1472,76 1449,62" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
      <text x="1472" y="62" text-anchor="middle" font-size="9" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">null?</text>
    </g>
    <g class="merge-node">
      <title>Any null terminates the chain here — three separate null paths converge.</title>
      <polygon points="1696.2,115 1710.2,129 1696.2,143 1682.2,129" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
