<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1396.4 210" width="1396.4" height="210">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="1396.4" height="210" fill="white"/>
  <text x="698.2" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">With pure + bind: effects in the type, sequenced explicitly through bind</text>
  <g transform="translate(0,28) scale(1)">
    <rect x="0" y="0" width="1396.4" height="182" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L127.60000000000001,0 L127.60000000000001,12 L117.60000000000001,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="63.800000000000004" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» compute</text>
    </g>
    <g class="swimlane lane-plain">
      <rect x="6" y="28" width="1384.4" height="71" fill="#f7f9fc" stroke="#bbbbbb" stroke-width="1" rx="4" ry="4"/>
      <rect x="6" y="28" width="1384.4" height="18" fill="#e9eef5" stroke="#bbbbbb" stroke-width="1" rx="4" ry="4"/>
      <text x="16" y="38" text-anchor="start" font-size="10" font-weight="bold" font-family="sans-serif" dominant-baseline="middle" fill="#333">Plain values &amp; functions</text>
    </g>
    <g class="swimlane lane-monad">
      <rect x="6" y="99" width="1384.4" height="77" fill="#f7f9fc" stroke="#bbbbbb" stroke-width="1" rx="4" ry="4"/>
      <rect x="6" y="99" width="1384.4" height="18" fill="#e9eef5" stroke="#bbbbbb" stroke-width="1" rx="4" ry="4"/>
      <text x="16" y="109" text-anchor="start" font-size="10" font-weight="bold" font-family="sans-serif" dominant-baseline="middle" fill="#333">IO monad</text>
    </g>
    <g class="edge">
      <path d="M164.0,59.0 L169.0,59.0 Q174.0,59.0 174.0,64.0 L174.0,141.0 Q174.0,142.0 175.0,142.0 L176.0,142.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M316.0,142.0 L609.6,142.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="468.8" y="136" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">IO FilePath</text>
    </g>
    <g class="edge">
      <path d="M749.6,142.0 L1000.0,142.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="880.8" y="136" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">IO Config</text>
    </g>
    <g class="edge">
      <path d="M1140.0,142.0 L1148.0,142.0 Q1154.0,142.0 1154.0,136.0 L1154.0,60.0 Q1154.0,54.0 1160.0,54.0 L1205.5,54.0 Q1208.0,54.0 1208.0,56.5 L1208.0,59.0 L1208.0,59.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="1154" y="92" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">IO Int</text>
    </g>
    <g class="edge hof-edge">
      <path d="M685.6,79.0 L685.6,104.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge hof-edge">
      <path d="M1076.0,79.0 L1076.0,104.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="action-node">
      <title>pure : FilePath → IO FilePath. Lifts the plain path so the chain can start uniformly with bind.</title>
      <rect x="192" y="120" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="252" y="142" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">purePath</text>
      <g class="pin pin-in">
        <rect x="188" y="138" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="198" y="142" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">a</text>
      </g>
      <g class="pin pin-out">
        <rect x="308" y="138" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>&gt;&gt;= : sequences readFile after pure. The runtime guarantees this effect happens before the next bind.</title>
      <rect x="625.6" y="120" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="685.6" y="142" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bindRead</text>
      <g class="pin pin-in">
        <rect x="621.6" y="138" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="631.6" y="142" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">ma</text>
      </g>
      <g class="pin pin-in">
        <rect x="681.6" y="116" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="685.6" y="114" text-anchor="middle" dominant-baseline="alphabetic" font-size="8" font-family="sans-serif" fill="#555">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="741.6" y="138" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>&gt;&gt;= : sequences the (logMessage cfg &gt;&gt; compute cfg) continuation. Effect order is deterministic.</title>
      <rect x="1016" y="120" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="1076" y="142" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bindLogComp</text>
      <g class="pin pin-in">
        <rect x="1012" y="138" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="1022" y="142" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">ma</text>
      </g>
      <g class="pin pin-in">
        <rect x="1072" y="116" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="1076" y="114" text-anchor="middle" dominant-baseline="alphabetic" font-size="8" font-family="sans-serif" fill="#555">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="1132" y="138" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="object-node">
      <title>FilePath — plain input. Pure callers see only this in the API.</title>
      <rect x="36" y="40" width="128" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="100" y="59" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">path : FilePath</text>
    </g>
    <g class="object-node hof">
      <title>readFile : FilePath → IO Config. HOF argument — its input is FilePath, not IO FilePath, so it cannot sit on the main flow.</title>
      <rect x="556.8" y="40" width="257.6" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="685.6" y="52" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="685.6" y="66" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">readFileFn : FilePath ⟶ IO Config</text>
    </g>
    <g class="object-node hof">
      <title>λcfg. logMessage cfg &gt;&gt; compute cfg : Config → IO Int. HOF argument — runs both side-effects in order, both seeing cfg.</title>
      <rect x="968.8" y="40" width="214.4" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="1076" y="52" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="1076" y="66" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">logCompFn : Config ⟶ IO Int</text>
    </g>
    <g class="object-node">
      <title>IO Int — the final described program. The runtime (main) is the only thing that actually executes it.</title>
      <rect x="1218" y="40" width="142.4" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1289.2" y="59" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ioResult : IO Int</text>
    </g>
  </g>
</svg>
