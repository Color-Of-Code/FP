    </g>
    <g class="action-node">
      <title>pure : FilePath → IO FilePath. Lifts the plain path so the chain can start uniformly with bind.</title>
      <rect x="331.6" y="40" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="391.6" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">purePath</text>
      <g class="pin pin-in">
        <rect x="327.6" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="337.6" y="62" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">a</text>
      </g>
      <g class="pin pin-out">
        <rect x="447.6" y="58" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>&gt;&gt;= : sequences readFile after pure. The runtime guarantees this effect happens before the next bind.</title>
      <rect x="562.6" y="51" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="622.6" y="73" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bindRead</text>
      <g class="pin pin-in">
        <rect x="558.6" y="61.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="568.6" y="65.66666666666667" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">ma</text>
      </g>
      <g class="pin pin-in">
        <rect x="558.6" y="76.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="568.6" y="80.33333333333333" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="678.6" y="69" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>&gt;&gt;= : sequences the (logMessage cfg &gt;&gt; compute cfg) continuation. Effect order is deterministic.</title>
      <rect x="783.6" y="62" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="843.6" y="84" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bindLogComp</text>
      <g class="pin pin-in">
        <rect x="779.6" y="72.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="789.6" y="76.66666666666667" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">ma</text>
      </g>
      <g class="pin pin-in">
        <rect x="779.6" y="87.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="789.6" y="91.33333333333333" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="899.6" y="80" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="object-node">
      <title>FilePath — plain input. Pure callers see only this in the API.</title>
      <rect x="165.60000000000002" y="43" width="128" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="229.60000000000002" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">path : FilePath</text>
    </g>
    <g class="object-node hof">
      <title>readFile : FilePath → IO Config. HOF argument — its input is FilePath, not IO FilePath, so it cannot sit on the main flow.</title>
      <rect x="36" y="95" width="257.6" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="164.8" y="107" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="164.8" y="121" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">readFileFn : FilePath ⟶ IO Config</text>
    </g>
    <g class="object-node hof">
      <title>λcfg. logMessage cfg &gt;&gt; compute cfg : Config → IO Int. HOF argument — runs both side-effects in order, both seeing cfg.</title>
      <rect x="79.20000000000003" y="147" width="214.4" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="186.40000000000003" y="159" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="186.40000000000003" y="173" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">logCompFn : Config ⟶ IO Int</text>
    </g>
    <g class="object-node">
      <title>IO Int — the final described program. The runtime (main) is the only thing that actually executes it.</title>
      <rect x="977.5999999999999" y="65" width="142.4" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1048.8" y="84" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ioResult : IO Int</text>
    </g>
  </g>
