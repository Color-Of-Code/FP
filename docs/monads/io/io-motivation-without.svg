<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 524 240" width="524" height="240">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="524" height="240" fill="white"/>
  <text x="262" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Without IO: side effects hidden inside a pure-looking type</text>
  <g transform="translate(0,28) scale(1)">
    <rect x="0" y="0" width="524" height="212" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L127.60000000000001,0 L127.60000000000001,12 L117.60000000000001,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="63.800000000000004" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» compute</text>
    </g>
    <g class="edge">
      <path d="M146.0,114.0 L154.0,114.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M294.0,114.0 L302.0,114.0 Q308.0,114.0 308.0,108.0 L308.0,65.0 Q308.0,59.0 314.0,59.0 L356.0,59.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M294.0,114.0 L356.0,114.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="333" y="108" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">hidden</text>
    </g>
    <g class="edge">
      <path d="M294.0,114.0 L302.0,114.0 Q308.0,114.0 308.0,120.0 L308.0,166.0 Q308.0,172.0 314.0,172.0 L356.0,172.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="338" y="166" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">hidden</text>
    </g>
    <g class="action-node">
      <title>compute :: Int → Int — the type promises a pure function. The implementation breaks that promise.</title>
      <rect x="170" y="92" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="230" y="114" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">compute</text>
      <g class="pin pin-in">
        <rect x="166" y="110" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="176" y="114" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">x</text>
      </g>
      <g class="pin pin-out">
        <rect x="286" y="110" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>Hidden effect: reads config.txt during execution. Not visible in the type.</title>
      <rect x="368" y="92" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="428" y="114" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">hiddenReadConfig</text>
    </g>
    <g class="action-node">
      <title>Hidden effect: writes to a log during execution. Not visible in the type.</title>
      <rect x="368" y="150" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="428" y="172" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">hiddenWriteLog</text>
    </g>
    <g class="object-node">
      <title>x : Int — the only input the caller sees.</title>
      <rect x="36" y="95" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="91" y="114" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">x : Int</text>
    </g>
    <g class="object-node">
      <title>result : Int — looks like a pure return, but its computation depended on a file and a log call.</title>
      <rect x="368" y="40" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="423" y="59" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">result : Int</text>
    </g>
  </g>
</svg>
