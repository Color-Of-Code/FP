<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 930.4 279" width="930.4" height="279">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="930.4" height="279" fill="white"/>
  <text x="465.2" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">State bind: s0 → run sa → (a, s1) → run f(a)(s1) → (b, s2)</text>
  <text x="465.2" y="35" text-anchor="middle" font-size="11" font-weight="normal" font-family="sans-serif" fill="#555">also called: flatMap, &gt;&gt;=</text>
  <g transform="translate(0,44) scale(1)">
    <rect x="0" y="0" width="930.4" height="235" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L109,0 L109,12 L99,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="54.5" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» bind</text>
    </g>
    <g class="edge">
      <path d="M178.4,59.0 L183.4,59.0 Q188.4,59.0 188.4,64.0 L188.4,92.0 Q188.4,93.0 189.4,93.0 L190.4,93.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M178.4,111.0 L190.4,111.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M330.4,91.0 L358.4,91.0 Q364.4,91.0 364.4,97.0 L364.4,120.0 Q364.4,126.0 370.4,126.0 L395.4,126.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="383.9" y="120" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">a</text>
    </g>
    <g class="edge">
      <path d="M330.4,106.0 L338.4,106.0 Q344.4,106.0 344.4,112.0 L344.4,159.0 Q344.4,165.0 350.4,165.0 L387.4,165.0 Q393.4,165.0 393.4,171.0 L393.4,179.5 Q393.4,185.0 398.9,185.0 L404.4,185.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge hof-edge">
      <path d="M178.4,163.0 L183.9,163.0 Q188.4,163.0 188.4,158.5 L188.4,158.5 Q188.4,154.0 192.9,154.0 L387.4,154.0 Q393.4,154.0 393.4,148.0 L393.4,142.0 Q393.4,141.0 394.4,141.0 L395.4,141.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M535.4,124.0 L543.4,124.0 Q549.4,124.0 549.4,130.0 L549.4,143.0 Q549.4,149.0 555.4,149.0 L617.4,149.0 Q618.4,149.0 618.4,150.0 L618.4,150.0 Q618.4,151.0 619.4,151.0 L620.4,151.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="583.9" y="143" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">State s b</text>
    </g>
    <g class="edge">
      <path d="M526.4,185.0 L545.4,185.0 Q549.4,185.0 549.4,181.0 L549.4,181.0 Q549.4,177.0 553.4,177.0 L612.9,177.0 Q618.4,177.0 618.4,171.5 L618.4,167.0 Q618.4,166.0 619.4,166.0 L620.4,166.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M760.4,146.0 L772.4,146.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M760.4,164.0 L768.4,164.0 Q774.4,164.0 774.4,170.0 L774.4,198.0 L774.4,198.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M326.4,117.0 L353.4,117.0 Q354.4,117.0 354.4,116.0 L354.4,116.0 Q354.4,115.0 355.4,115.0 L399.4,115.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowOpen)" stroke-dasharray="6,4"/>
    </g>
    <g class="edge">
      <path d="M531.4,140.0 L624.4,140.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowOpen)" stroke-dasharray="6,4"/>
    </g>
    <g class="action-node">
      <title>Run sa(s0): execute the first computation. Produces BOTH result a AND new state s1.</title>
      <rect x="206.39999999999998" y="80" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="266.4" y="102" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">run_sa</text>
      <g class="pin pin-in">
        <rect x="202.39999999999998" y="90.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="212.39999999999998" y="94.66666666666667" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">sa</text>
      </g>
      <g class="pin pin-in">
        <rect x="202.39999999999998" y="105.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="212.39999999999998" y="109.33333333333333" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">s0</text>
      </g>
      <g class="pin pin-out">
        <rect x="322.4" y="90.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="320.4" y="94.66666666666667" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">a</text>
      </g>
      <g class="pin pin-out">
        <rect x="322.4" y="105.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="320.4" y="109.33333333333333" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">s1</text>
      </g>
    </g>
    <g class="action-node">
      <title>Apply f(a): build the next computation State s b — a function not yet run, applied to s1 by run_sb.</title>
      <rect x="411.4" y="108" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="471.4" y="130" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">apply_f</text>
      <g class="pin pin-in">
        <rect x="407.4" y="118.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="417.4" y="122.66666666666667" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">a</text>
      </g>
      <g class="pin pin-in">
        <rect x="407.4" y="133.33333333333334" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="417.4" y="137.33333333333334" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="527.4" y="126" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="525.4" y="130" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">sb</text>
      </g>
    </g>
    <g class="action-node">
      <title>Run f(a)(s1): execute the second computation with the UPDATED state s1. s0 is not used here.</title>
      <rect x="636.4" y="133" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="696.4" y="155" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">run_sb</text>
      <g class="pin pin-in">
        <rect x="632.4" y="143.66666666666666" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="642.4" y="147.66666666666666" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">sb</text>
      </g>
      <g class="pin pin-in">
        <rect x="632.4" y="158.33333333333334" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="642.4" y="162.33333333333334" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">s1</text>
      </g>
      <g class="pin pin-out">
        <rect x="752.4" y="143.66666666666666" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="750.4" y="147.66666666666666" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">b</text>
      </g>
      <g class="pin pin-out">
        <rect x="752.4" y="158.33333333333334" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="750.4" y="162.33333333333334" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">s2</text>
      </g>
    </g>
    <g class="object-node">
      <title>State s a — a computation: given state s returns (a, s')</title>
      <rect x="57.6" y="40" width="120.8" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="118" y="59" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">sa : State s a</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ State s b) — the continuation; given result a, builds the next state computation</title>
      <rect x="36" y="144" width="142.4" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="107.2" y="156" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="107.2" y="170" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ State s b</text>
    </g>
    <g class="object-node">
      <title>s — the initial state entering the bind. Flows into run_sa.</title>
      <rect x="68.4" y="92" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="123.4" y="111" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">s0 : s</text>
    </g>
    <g class="object-node">
      <title>s — the state AFTER running sa. This is s1 ≠ s0. It is s1 (not s0) that flows to run_sb. Critical difference from Reader.</title>
      <rect x="416.4" y="166" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="471.4" y="185" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">s1 : s</text>
    </g>
    <g class="object-node">
      <title>b — the final value result</title>
      <rect x="784.4" y="127" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="839.4" y="146" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">b : b</text>
    </g>
    <g class="object-node">
      <title>s — the final state after both steps. s0 ≠ s1 ≠ s2 in general; each step transforms the state.</title>
      <rect x="784.4" y="179" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="839.4" y="198" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">s2 : s</text>
    </g>
  </g>
</svg>
