  <rect width="1209" height="203" fill="white"/>
  <text x="604.5" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Without bind: state threaded as explicit s0/s1/s2/s3 variables</text>
  <g transform="translate(0,28) scale(1)">
    <rect x="0" y="0" width="1209" height="175" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L146.20000000000002,0 L146.20000000000002,12 L136.20000000000002,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="73.10000000000001" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» stateChain</text>
    </g>
    <g class="edge">
      <path d="M146.0,59.0 L154.0,59.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
