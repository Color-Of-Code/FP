    <g class="edge">
      <path d="M483.0,68.0 L487.0,68.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M631.0,77.0 L694.0,77.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="670.5" y="71" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">(c, s2)</text>
