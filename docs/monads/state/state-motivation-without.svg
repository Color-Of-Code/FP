      <text x="1015.5" y="80" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">(d, sFinal)</text>
    </g>
    <g class="edge">
      <path d="M964.0,86.0 L972.0,86.0 Q978.0,86.0 978.0,92.0 L978.0,132.0 Q978.0,138.0 984.0,138.0 L1051.0,138.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="action-node">
      <title>step1(a, s0) → (b, s1). Returns a new state alongside the value.</title>
      <rect x="174" y="46" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="234" y="68" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">step1</text>
      <g class="pin pin-in">
        <rect x="170" y="56.666666666666664" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="180" y="60.666666666666664" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">a</text>
      </g>
      <g class="pin pin-in">
        <rect x="170" y="71.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="180" y="75.33333333333333" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">sIn</text>
      </g>
      <g class="pin pin-out">
        <rect x="290" y="64" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>step2(b, s1) → (c, s2). Must be called with the freshest state — easy to get wrong.</title>
      <rect x="507" y="55" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="567" y="77" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">step2</text>
      <g class="pin pin-in">
        <rect x="503" y="65.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="513" y="69.66666666666667" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">b</text>
      </g>
      <g class="pin pin-in">
        <rect x="503" y="80.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="513" y="84.33333333333333" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">sIn</text>
      </g>
      <g class="pin pin-out">
        <rect x="623" y="73" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>step3(c, s2) → (d, s3). Same plumbing, repeated.</title>
      <rect x="840" y="64" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="900" y="86" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">step3</text>
      <g class="pin pin-in">
        <rect x="836" y="74.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="846" y="78.66666666666667" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">c</text>
      </g>
      <g class="pin pin-in">
        <rect x="836" y="89.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="846" y="93.33333333333333" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">sIn</text>
      </g>
      <g class="pin pin-out">
        <rect x="956" y="82" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="object-node">
      <title>Plain input value of type A.</title>
      <rect x="36" y="40" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="91" y="59" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">A</text>
    </g>
    <g class="object-node">
      <title>Initial state, passed in by the caller.</title>
      <rect x="36" y="92" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="91" y="111" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">s0 (initial)</text>
    </g>
    <g class="object-node">
      <title>Intermediate state — must be threaded into step2 by hand.</title>
      <rect x="373" y="49" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="428" y="68" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">s1</text>
    </g>
    <g class="object-node">
      <title>Intermediate state — passing s1 here instead of s2 compiles fine but is a silent bug.</title>
      <rect x="706" y="58" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="761" y="77" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">s2</text>
    </g>
    <g class="object-node">
      <title>Final state — caller is also responsible for receiving and forwarding it.</title>
      <rect x="1063" y="67" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1118" y="86" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">s3 (final)</text>
    </g>
    <g class="object-node">
      <title>(d, sFinal) — caller unpacks both.</title>
      <rect x="1063" y="119" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="1118" y="138" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">(D, sFinal)</text>
    </g>
  </g>
