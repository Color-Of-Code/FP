        <text x="150" y="62" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555">gs</text>
      </g>
    </g>
    <g class="object-node">
      <title>State s s — a stateful computation that observes s without modifying it.</title>
      <rect x="265" y="43" width="120.8" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="325.4" y="62" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">gs : State s s</text>
