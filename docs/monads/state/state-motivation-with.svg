    </g>
    <g class="object-node hof">
      <title>step2 : B → State s C. Same: supplied to bind as the continuation.</title>
      <rect x="864.4000000000001" y="40" width="185.6" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="957.2" y="52" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="957.2" y="66" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">step2Fn : B ⟶ State s C</text>
    </g>
