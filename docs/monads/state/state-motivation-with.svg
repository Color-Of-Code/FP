      <g class="pin pin-out">
        <rect x="651.6" y="138" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
      </g>
    </g>
    <g class="action-node">
      <title>&gt;&gt;= : threads the latest state into step2 automatically. No way to supply the wrong state.</title>
