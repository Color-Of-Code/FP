  <rect width="750" height="232" fill="white"/>
  <text x="375" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Monad: Ma &gt;&gt;= (a ⟶ Mb) &gt;&gt;= (b ⟶ Mc)</text>
  <g transform="translate(0,28)">
