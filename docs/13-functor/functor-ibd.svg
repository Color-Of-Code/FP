    </g>
    <g class="edge hof-edge">
      <path d="M183.6,101.0 L188.6,101.0 Q193.6,101.0 193.6,96.0 L193.6,69.0 Q193.6,63.0 199.6,63.0 L211.6,63.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
