      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="548.4" height="178" fill="white"/>
  <text x="274.2" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">(&lt;*&gt;) :: F(a ⟶ b) ⟶ Fa ⟶ Fb</text>
  <g transform="translate(0,28)">
    <rect x="0" y="0" width="548.4" height="150" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-block">
      <path d="M0,0 L121.4,0 L121.4,12 L111.4,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="60.7" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«block» ApContext</text>
    </g>
    <g class="edge hof-edge">
      <path d="M212.4,101.0 L217.4,101.0 Q222.4,101.0 222.4,96.0 L222.4,63.0 L222.4,63.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M212.4,49.0 L220.4,49.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M352.4,56.0 L356.4,56.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="object-node hof">
      <title>F(a ⟶ b) — a function already lifted into the applicative context</title>
      <rect x="69.99999999999999" y="82" width="142.4" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="141.2" y="94" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="141.2" y="108" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ff_val : F(a ⟶ b)</text>
    </g>
    <g class="object-node">
      <title>Fa — value inside the same context F</title>
      <rect x="102.4" y="30" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="157.4" y="49" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">fa_val : Fa</text>
    </g>
    <g class="action-node">
      <title>&lt;*&gt;: applies a wrapped function to a wrapped value</title>
      <rect x="232.39999999999998" y="34" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="292.4" y="56" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ap : ApOp</text>
    </g>
    <g class="object-node">
      <title>Fb — result in context F</title>
      <rect x="368.4" y="37" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="423.4" y="56" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">fb_val : Fb</text>
