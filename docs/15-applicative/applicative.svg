      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="474.8" height="176" fill="white"/>
  <text x="237.4" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Applicative: (&lt;*&gt;) :: F(a ⟶ b) ⟶ Fa ⟶ Fb</text>
  <g transform="translate(0,28) scale(1)">
    <rect x="0" y="0" width="474.8" height="148" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L102.8,0 L102.8,12 L92.8,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="51.4" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» &lt;*&gt;</text>
    </g>
    <g class="edge hof-edge">
      <path d="M156.8,59.0 L168.8,59.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M156.8,111.0 L161.8,111.0 Q166.8,111.0 166.8,106.0 L166.8,78.0 Q166.8,77.0 167.8,77.0 L168.8,77.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M308.8,68.0 L316.8,68.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="action-node">
      <title>(&lt;*&gt;) — applies the wrapped function to the wrapped argument</title>
      <rect x="184.8" y="46" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="244.8" y="68" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">apStar</text>
      <g class="pin pin-in">
        <rect x="180.8" y="56.666666666666664" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="190.8" y="60.666666666666664" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">fff</text>
      </g>
      <g class="pin pin-in">
        <rect x="180.8" y="71.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="190.8" y="75.33333333333333" text-anchor="start" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">fa</text>
      </g>
      <g class="pin pin-out">
        <rect x="300.8" y="64" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="298.8" y="68" text-anchor="end" dominant-baseline="middle" font-size="8" font-family="sans-serif" fill="#555">fb</text>
      </g>
    </g>
    <g class="object-node hof">
      <title>F(a ⟶ b) — a function wrapped in context F, flowing in as a value (HOF)</title>
      <rect x="36.00000000000001" y="40" width="120.8" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="96.4" y="52" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="96.4" y="66" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">fff : F(a ⟶ b)</text>
    </g>
    <g class="object-node">
      <title>Fa — the argument value, also wrapped in the same context F</title>
      <rect x="46.8" y="92" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="101.8" y="111" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">fa : Fa</text>
    </g>
    <g class="object-node">
      <title>Fb — result in context F; same context shape as input</title>
      <rect x="328.8" y="49" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="383.8" y="68" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">fb : Fb</text>
