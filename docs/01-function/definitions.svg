<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 501 177" width="501" height="177">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="501" height="177" fill="white"/>
  <text x="250.5" y="18" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Total vs partial</text>
  <g transform="translate(0,28) scale(1)">
    <rect x="0" y="0" width="501" height="149" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="diagram-frame-tab tab-activity">
      <path d="M0,0 L133.8,0 L133.8,12 L123.80000000000001,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="66.9" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» totality</text>
    </g>
    <g class="edge">
      <path d="M146.0,64.0 L150.0,64.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M300.0,59.0 L343.0,59.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="327.5" y="53" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">yes</text>
    </g>
    <g class="edge">
      <path d="M300.0,70.0 L305.0,70.0 Q310.0,70.0 310.0,75.0 L310.0,105.0 Q310.0,111.0 316.0,111.0 L343.0,111.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
      <text x="332.5" y="105" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="sans-serif" fill="#333">no</text>
    </g>
    <g class="object-node">
      <title>A function under discussion.</title>
      <rect x="36" y="45" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="91" y="64" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f :: a ⟶ b</text>
    </g>
    <g class="object-node">
      <title>Total — defined for all values of type a.</title>
      <rect x="355" y="40" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="410" y="59" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">total</text>
    </g>
    <g class="object-node">
      <title>Partial — undefined for some values of type a.</title>
      <rect x="355" y="92" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="410" y="111" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">partial</text>
    </g>
    <g class="decision-node">
      <title>A total function returns a result for every input in the domain.</title>
      <polygon points="231,50 299,64 231,78 163,64" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
      <text x="231" y="64" text-anchor="middle" font-size="9" font-family="sans-serif" dominant-baseline="middle" fill="#5d4037">defined for every a?</text>
    </g>
  </g>
</svg>
