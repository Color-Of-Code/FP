    <text x="101.0" y="139.0" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">Ma : Ma</text>
  </g>
  <g class="object-node hof"><title>(a ⟶ Mb) — effectful function, passed as a data token (HOF)</title>
    <rect x="46.0" y="68.0" width="110" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
    <text x="101.0" y="80.0" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
