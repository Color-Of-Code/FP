      <text x="66.9" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«block» FmapContext</text>
    </g>
    <g class="edge hof-edge">
      <path d="M203.6,161.0 L208.6,161.0 Q213.6,161.0 213.6,156.0 L213.6,129.0 Q213.6,123.0 219.6,123.0 L231.6,123.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
