<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 186" width="512" height="186">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#424242" stroke-width="1.5"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="512" height="186" fill="white"/>
  <text x="256" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">sequence :: T(Fa) ⟶ F(Ta)  (= traverse id)</text>
  <g transform="translate(0,28)">
    <rect x="0" y="0" width="512" height="158" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="activity-frame-tab">
      <path d="M0,0 L133.8,0 L133.8,12 L123.80000000000001,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="66.9" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» sequence</text>
    </g>
    <g class="edge">
      <path d="M156.0,90.0 C156.0,90.0 181.5,90.0 181.5,90.0" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M320.0,90.0 C320.0,90.0 345.5,90.0 345.5,90.0" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="action-node">
      <title>sequence: swaps T and F — collects all effects into one outer F</title>
      <rect x="196" y="68" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="256" y="90" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">seq</text>
      <g class="pin pin-in">
        <rect x="192" y="86" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="202" y="90" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">tfa</text>
      </g>
      <g class="pin pin-out">
        <rect x="312" y="86" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="310" y="90" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">fta</text>
      </g>
    </g>
    <g class="object-node">
      <title>T(Fa) — a container of effects (e.g. [Maybe a, Maybe a, ...])</title>
      <rect x="46" y="71" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="101" y="90" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">Tfa : T(Fa)</text>
    </g>
    <g class="object-node">
      <title>F(Ta) — one effect wrapping the whole container (e.g. Maybe [a, a, ...])</title>
      <rect x="356" y="71" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="411" y="90" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">Fta : F(Ta)</text>
    </g>
  </g>
</svg>
