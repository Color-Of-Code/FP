<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 522.8 232" width="522.8" height="232">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#424242" stroke-width="1.5"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="522.8" height="232" fill="white"/>
  <text x="261.4" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Applicative: (&lt;*&gt;) :: F(a ⟶ b) ⟶ Fa ⟶ Fb</text>
  <g transform="translate(0,28)">
    <rect x="0" y="0" width="522.8" height="204" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="activity-frame-tab">
      <path d="M0,0 L102.8,0 L102.8,12 L92.8,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="51.4" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» &lt;*&gt;</text>
    </g>
    <g class="edge hof-edge">
      <path d="M155.4,120.0 C155.4,120.0 192.3,105.7 192.3,105.7" fill="none" stroke="#00796b" stroke-width="1.5" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M155.4,106.0 C155.4,106.0 192.3,120.3 192.3,120.3" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge">
      <path d="M330.8,113.0 C330.8,113.0 356.3,113.0 356.3,113.0" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="action-node">
      <title>(&lt;*&gt;) — applies the wrapped function to the wrapped argument</title>
      <rect x="206.8" y="91" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="266.8" y="113" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">apStar</text>
      <g class="pin pin-in">
        <rect x="202.8" y="101.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="212.8" y="105.66666666666667" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">fff</text>
      </g>
      <g class="pin pin-in">
        <rect x="202.8" y="116.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="212.8" y="120.33333333333333" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">fa</text>
      </g>
      <g class="pin pin-out">
        <rect x="322.8" y="109" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="320.8" y="113" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">fb</text>
      </g>
    </g>
    <g class="object-node hof">
      <title>F(a ⟶ b) — a function wrapped in context F, flowing in as a value (HOF)</title>
      <rect x="46.00000000000001" y="120" width="120.8" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="106.4" y="132" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="106.4" y="146" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">fff : F(a ⟶ b)</text>
    </g>
    <g class="object-node">
      <title>Fa — the argument value, also wrapped in the same context F</title>
      <rect x="51.400000000000006" y="68" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="106.4" y="87" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">fa : Fa</text>
    </g>
    <g class="object-node">
      <title>Fb — result in context F; same context shape as input</title>
      <rect x="366.8" y="94" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="421.8" y="113" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">fb : Fb</text>
    </g>
  </g>
</svg>
