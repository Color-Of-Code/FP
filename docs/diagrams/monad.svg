  <rect width="822" height="260" fill="white"/>
  <text x="411" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Monad: Ma &gt;&gt;= (a ⟶ Mb) &gt;&gt;= (b ⟶ Mc)</text>
