    <text x="314.4" y="18" text-anchor="middle" font-size="12" font-weight="bold" font-family="sans-serif" fill="#333">«block» TraverseContext</text>
    <g class="edge hof-edge">
      <path d="M210.8,161.0 L215.8,161.0 Q220.8,161.0 220.8,156.0 L220.8,129.0 Q220.8,123.0 226.8,123.0 L238.8,123.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
