      <text x="66.9" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«block» BindContext</text>
    </g>
    <g class="edge">
      <path d="M190.8,101.0 L195.8,101.0 Q200.8,101.0 200.8,96.0 L200.8,69.0 Q200.8,63.0 206.8,63.0 L218.8,63.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
