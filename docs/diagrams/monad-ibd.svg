<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 610.8 298" width="610.8" height="298">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5" fill="none" stroke="#424242" stroke-width="1.25"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 L2.5,5 Z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="610.8" height="298" fill="white"/>
  <text x="305.4" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">(&gt;&gt;=) :: Ma ⟶ (a ⟶ Mb) ⟶ Mb</text>
  <g transform="translate(0,28)">
    <rect x="0" y="0" width="610.8" height="270" rx="4" fill="#f8f8ff" stroke="#6666c0" stroke-width="2"/>
    <text x="305.4" y="18" text-anchor="middle" font-size="12" font-weight="bold" font-family="sans-serif" fill="#333">«block» BindContext</text>
    <g class="edge">
      <path d="M210.8,161.0 L215.8,161.0 Q220.8,161.0 220.8,156.0 L220.8,129.0 Q220.8,123.0 226.8,123.0 L238.8,123.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge hof-edge">
      <path d="M210.8,109.0 L238.8,109.0" fill="none" stroke="#00796b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M370.8,116.0 L398.8,116.0" fill="none" stroke="#424242" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="object-node">
      <title>Ma — monadic value, provides unwrapped a to the continuation</title>
      <rect x="100.80000000000001" y="142" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="155.8" y="161" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ma_val : Ma</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ Mb) — the continuation: maps each a to a new monadic Mb</title>
      <rect x="90" y="90" width="120.8" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="150.4" y="102" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="150.4" y="116" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f_val : a ⟶ Mb</text>
    </g>
    <g class="action-node">
      <title>&gt;&gt;= (bind): sequences two monadic actions, threading the value</title>
      <rect x="250.8" y="94" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="310.8" y="116" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bind : BindOp</text>
    </g>
    <g class="object-node">
      <title>Mb — final monadic result</title>
      <rect x="410.8" y="97" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="465.8" y="116" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">mb_val : Mb</text>
    </g>
  </g>
