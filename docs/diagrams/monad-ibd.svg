<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 610.8 298" width="610.8" height="298">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#424242" stroke-width="1.5"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="610.8" height="298" fill="white"/>
  <text x="305.4" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">(&gt;&gt;=) :: Ma ⟶ (a ⟶ Mb) ⟶ Mb</text>
  <g transform="translate(0,28)">
    <rect x="0" y="0" width="610.8" height="270" rx="4" fill="#f8f8ff" stroke="#6666c0" stroke-width="2"/>
    <text x="305.4" y="18" text-anchor="middle" font-size="12" font-weight="bold" font-family="sans-serif" fill="#333">«block» BindContext</text>
    <g class="edge">
      <path d="M205.4,149.0 C205.4,149.0 236.3,142.3 236.3,142.3" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge hof-edge">
      <path d="M210.8,122.1 C210.8,122.1 236.3,127.7 236.3,127.7" fill="none" stroke="#00796b" stroke-width="1.5" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M374.8,135.0 C374.8,135.0 400.3,135.0 400.3,135.0" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="object-node">
      <title>Ma — monadic value, provides unwrapped a to the continuation</title>
      <rect x="95.4" y="142" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="150.4" y="161" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">ma_val : Ma</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ Mb) — the continuation: maps each a to a new monadic Mb</title>
      <rect x="90" y="90" width="120.8" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="150.4" y="102" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="150.4" y="116" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f_val : a ⟶ Mb</text>
    </g>
    <g class="action-node">
      <title>&gt;&gt;= (bind): sequences two monadic actions, threading the value</title>
      <rect x="250.8" y="113" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="310.8" y="135" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bind : BindOp</text>
    </g>
    <g class="object-node">
      <title>Mb — final monadic result</title>
      <rect x="410.8" y="116" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="465.8" y="135" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">mb_val : Mb</text>
    </g>
  </g>
</svg>
