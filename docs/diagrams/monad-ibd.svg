  <rect width="570.8" height="178" fill="white"/>
  <text x="285.4" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">(&gt;&gt;=) :: Ma ⟶ (a ⟶ Mb) ⟶ Mb</text>
  <g transform="translate(0,28)">
