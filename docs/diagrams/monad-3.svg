<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 530 232" width="530" height="232">
  <defs>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#424242"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#424242" stroke-width="1.5"/>
    </marker>
    <marker id="arrowHof" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#00796b"/>
    </marker>
  </defs>
  <rect width="530" height="232" fill="white"/>
  <text x="265" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Maybe Monad: bind :: Maybe a ⟶ (a ⟶ Maybe b) ⟶ Maybe b</text>
  <g transform="translate(0,28)">
    <rect x="0" y="0" width="530" height="204" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
    <g class="activity-frame-tab">
      <path d="M0,0 L109,0 L109,12 L99,22 L0,22 Z" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="1"/>
      <text x="54.5" y="12" text-anchor="middle" font-size="10" font-family="sans-serif" dominant-baseline="middle" fill="#333">«activity» bind</text>
    </g>
    <g class="edge">
      <path d="M161.0,120.0 C161.0,120.0 199.5,105.7 199.5,105.7" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="edge hof-edge">
      <path d="M161.0,106.0 C161.0,106.0 199.5,120.3 199.5,120.3" fill="none" stroke="#00796b" stroke-width="1.5" marker-end="url(#arrowHof)"/>
    </g>
    <g class="edge">
      <path d="M338.0,113.0 C338.0,113.0 363.5,113.0 363.5,113.0" fill="none" stroke="#424242" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
    </g>
    <g class="action-node">
      <title>&gt;&gt;= : Nothing → Nothing ; Just a → f a</title>
      <rect x="214" y="91" width="120" height="44" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
      <text class="action-label" x="274" y="113" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">bind</text>
      <g class="pin pin-in">
        <rect x="210" y="101.66666666666667" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="220" y="105.66666666666667" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">ma</text>
      </g>
      <g class="pin pin-in">
        <rect x="210" y="116.33333333333333" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="220" y="120.33333333333333" text-anchor="start" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">f</text>
      </g>
      <g class="pin pin-out">
        <rect x="330" y="109" width="8" height="8" fill="#e0e0e0" stroke="#424242" stroke-width="1"/>
        <text x="328" y="113" text-anchor="end" font-size="8" font-family="sans-serif" dominant-baseline="middle" fill="#555" stroke="white" stroke-width="2" paint-order="stroke fill">mb</text>
      </g>
    </g>
    <g class="object-node">
      <title>Maybe&lt;a&gt; — Nothing propagates automatically (short-circuit)</title>
      <rect x="55" y="120" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="110" y="139" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">Ma : MaybeA</text>
    </g>
    <g class="object-node hof">
      <title>(a ⟶ Maybe&lt;b&gt;) — effectful function, applied only if Ma is Just</title>
      <rect x="46" y="68" width="128" height="38" fill="#e0f2f1" stroke="#00796b" stroke-width="1.5"/>
      <text x="110" y="80" text-anchor="middle" font-size="9" font-style="italic" font-family="sans-serif" dominant-baseline="middle" fill="#00796b">«function»</text>
      <text x="110" y="94" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">f : a ⟶ Maybe b</text>
    </g>
    <g class="object-node">
      <title>Maybe&lt;b&gt; — Nothing or Just (result of f a)</title>
      <rect x="374" y="94" width="110" height="38" fill="#f5f5f5" stroke="#616161" stroke-width="1.5"/>
      <text x="429" y="113" text-anchor="middle" font-size="11" font-family="sans-serif" dominant-baseline="middle" fill="#333">Mb : MaybeB</text>
    </g>
  </g>
</svg>
