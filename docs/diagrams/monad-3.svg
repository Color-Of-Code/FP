<rect width="530" height="232" fill="white"/>
<text x="265.0" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Maybe Monad: bind :: Maybe a ⟶ (a ⟶ Maybe b) ⟶ Maybe b</text>
<g transform="translate(0,28)">
  <rect x="0" y="0" width="530" height="204" rx="8" fill="#fafafa" stroke="#9e9e9e" stroke-width="1.5"/>
