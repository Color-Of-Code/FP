  <rect width="906" height="225" fill="white"/>
  <text x="453" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Currying: (a,b) ⟶ c  ⟹  a ⟶ (b ⟶ c)</text>
  <g transform="translate(0,28)">
