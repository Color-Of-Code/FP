  <rect width="894" height="235" fill="white"/>
  <text x="447" y="20" text-anchor="middle" font-size="14" font-weight="bold" font-family="sans-serif" fill="#222">Currying: (a,b) ⟶ c  ⟹  a ⟶ (b ⟶ c)</text>
